    { id: 701, tag: "C언어", difficulty: "Lv.4", question: "int a[3] = {10, 20, 30}; printf('%d', *(a) + *(a+2)); 의 결과값은?", answer: "40", explanation: "*(a)는 0번 인덱스 값인 10, *(a+2)는 2번 인덱스 값인 30입니다. 10 + 30 = 40이 됩니다." },
    { id: 702, tag: "C언어", difficulty: "Lv.5", question: "int f(int n) { if(n<=1) return 1; return n * f(n-1); }\nMain에서 f(4) 호출 시 최종 반환되는 값은?", answer: "24", explanation: "팩토리얼을 구하는 재귀 함수 알고리즘입니다. 4 * 3 * 2 * 1 = 24가 반환됩니다." },
    { id: 703, tag: "C언어", difficulty: "Lv.3", question: "포인터 변수가 가리키는 메모리 주소 자체의 크기는 32비트 운영체제 환경에서 몇 바이트인가?", answer: "4", explanation: "주소 공간의 크기는 32비트 환경에서는 4바이트, 64비트 환경에서는 8바이트로 고정됩니다." },
    { id: 704, tag: "C언어", difficulty: "Lv.4", question: "int a = 5, b = 3; printf('%d', a & b); 의 실행 결과값은?", answer: "1", explanation: "5(0101)와 3(0011)을 비트 AND 연산하면 1(0001)이 됩니다." },
    { id: 705, tag: "C언어", difficulty: "Lv.5", question: "int arr[2][2] = {{1, 2}, {3, 4}}; int (*p)[2] = arr; printf('%d', *(*(p+1)+1)); 의 결과는?", answer: "4", explanation: "배열 포인터 p를 이용한 2차원 배열 접근입니다. 1행 1열의 원소인 4를 가리킵니다." },
    { id: 706, tag: "C언어", difficulty: "Lv.2", question: "조건식의 결과가 참인 동안 블록을 실행하되, 무조건 한 번은 실행을 보장하는 반복 구문 키워드는?", answer: "do-while", explanation: "do 블록을 먼저 실행한 후 하단에서 조건을 검사하므로 최소 1회 실행이 보장됩니다." },
    { id: 707, tag: "C언어", difficulty: "Lv.4", question: "int i=0, sum=0; while(i<5) { i++; if(i%2!=0) continue; sum+=i; } printf('%d', sum); 의 결과는?", answer: "6", explanation: "1부터 5 사이의 짝수(2, 4)의 합을 구하는 구조이므로 결과는 6입니다." },
    { id: 708, tag: "C언어", difficulty: "Lv.3", question: "표준 입력 함수 scanf에서 변수의 메모리 주소를 지정하기 위해 변수명 앞에 붙이는 기호는?", answer: "&", explanation: "앰퍼샌드(&) 기호는 변수의 주소 연산자입니다." },
    { id: 709, tag: "C언어", difficulty: "Lv.4", question: "char *p = 'Icheon'; printf('%c', *(p + 3)); 의 출력 결과는?", answer: "e", explanation: "0번:I, 1번:c, 2번:h, 3번:e 이므로 문자 e가 출력됩니다." },
    { id: 710, tag: "C언어", difficulty: "Lv.5", question: "int a = 20; printf('%d', a >> 2); 의 실행 결과값을 쓰시오.", answer: "5", explanation: "오른쪽으로 2비트 밀면 2의 2제곱(4)으로 나눈 몫과 같습니다. 20 / 4 = 5가 됩니다." },
    { id: 711, tag: "C언어", difficulty: "Lv.3", question: "문자열을 서로 연결하여 붙여주는 표준 함수명은? (string.h)", answer: "strcat", explanation: "String Concatenate의 약자입니다." },
    { id: 712, tag: "C언어", difficulty: "Lv.4", question: "int a=10; int *p = &a; (*p) += 5; printf('%d', a); 의 결과값은?", answer: "15", explanation: "포인터 간접 참조를 통해 원본 변수 a의 값을 5 증가시켰습니다." },
    { id: 713, tag: "C언어", difficulty: "Lv.1", question: "C언어에서 참(True)을 나타내는 소스 코드 상의 기본 정수 수치는?", answer: "1", explanation: "C언어는 0은 거짓(False), 0이 아닌 모든 값(기본값 1)은 참으로 인식합니다." },
    { id: 714, tag: "C언어", difficulty: "Lv.2", question: "서식 지정자 중 정수형 데이터를 8진수 정수 형태로 출력하기 위한 기호 표기는?", answer: "%o", explanation: "Octal의 약자인 %o를 사용합니다." },
    { id: 715, tag: "C언어", difficulty: "Lv.5", question: "struct Student { int id; char grade; } s = {1, 'A'}; struct Student *p = &s; printf('%c', p->grade); 의 결과는?", answer: "A", explanation: "구조체 포인터 변수로 멤버 변수에 접근할 때는 화살표 연산자(->)를 사용합니다." },
    { id: 716, tag: "C언어", difficulty: "Lv.4", question: "int a=5, b=5; printf('%d', a++ + ++b); 의 실행 결과값은?", answer: "11", explanation: "a++는 후위 연산(5 적용), ++b는 전위 연산(6 적용)이므로 5 + 6 = 11이 출력됩니다." },
    { id: 717, tag: "C언어", difficulty: "Lv.3", question: "메모리를 할당하는 동적 할당 함수 malloc()이 선언되어 있는 표준 라이브러리 헤더 파일은?", answer: "stdlib.h", explanation: "standard library의 약자인 stdlib.h 헤더에 정의되어 있습니다." },
    { id: 718, tag: "C언어", difficulty: "Lv.4", question: "int arr[5] = {1, 2}; 배열 선언 후 초기화되지 않은 arr[2]의 값은 자동으로 무엇으로 채워지는가?", answer: "0", explanation: "배열 선언 시 일부 요소만 명시적으로 초기화하면, 나머지 요소는 자동으로 0으로 초기화됩니다." },
    { id: 719, tag: "C언어", difficulty: "Lv.2", question: "서식 지정자 중 문자열(String) 데이터를 출력하기 위해 사용하는 기호 표기는?", answer: "%s", explanation: "문자는 %c, 문자열은 %s를 지정합니다." },
    { id: 720, tag: "C언어", difficulty: "Lv.5", question: "동적 메모리 할당 함수인 calloc()과 malloc()의 가장 큰 차이점 중 하나로, calloc은 할당된 공간을 자동으로 무엇으로 초기화하는가?", answer: "0", explanation: "calloc은 메모리 할당과 동시에 모든 공간을 0으로 깨끗하게 초기화합니다." },
    { id: 721, tag: "C언어", difficulty: "Lv.3", question: "조건식의 참/거짓 분기에 따라 세 피연산자를 취하는 연산자로 '조건 ? 참값 : 거짓값'의 형태를 갖는 연산자는?", answer: "삼항 연산자", explanation: "조건 연산자 또는 삼항 연산자라고 부릅니다." },
    { id: 722, tag: "C언어", difficulty: "Lv.4", question: "int x = 5; int y = x-- * 2; printf('%d', y); 의 결과값은?", answer: "10", explanation: "후위 연산이므로 연산을 먼저 수행(5 * 2 = 10)하여 y에 대입한 후 x의 값이 감소합니다." },
    { id: 723, tag: "C언어", difficulty: "Lv.5", question: "함수 호출 시 변수의 참조나 주소가 아닌 '실제 값 자체'를 복사하여 넘겨주는 표준 호출 방식명은?", answer: "Call by Value", explanation: "값에 의한 호출 방식으로, 함수 내부에서 매개변수를 바꿔도 외부 원본은 변하지 않습니다." },
    { id: 724, tag: "C언어", difficulty: "Lv.1", question: "C언어 프로그램 소스 코드에서 한 라인 전체를 주석으로 처리하기 위해 문두에 붙이는 기호는?", answer: "//", explanation: "단일 행 주석 기호는 // 입니다." },
    { id: 725, tag: "C언어", difficulty: "Lv.4", question: "int a = 10; float b = 3.0; printf('%.1f', a / b); 의 실행 결과값을 쓰시오.", answer: "3.3", explanation: "정수와 실수의 연산은 자동으로 큰 자료형인 실수형으로 형변환되어 소수점까지 계산됩니다." },

    // --- [726~750: Java 인터페이스 및 객체지향 다형성] ---
    { id: 726, tag: "Java", difficulty: "Lv.4", question: "클래스 상속 구조에서 자식 클래스가 부모 클래스의 메서드를 호출할 때 사용하는 키워드 구조는? (괄호 포함)", answer: "super()", explanation: "부모 클래스의 상위 멤버나 생성자를 명시적으로 대행 호출할 때 씁니다." },
    { id: 727, tag: "Java", difficulty: "Lv.5", question: "인터페이스를 상속받아 온전한 클래스 형태로 구현할 때 클래스 선언부 뒤에 사용하는 예약어는?", answer: "implements", explanation: "일반 클래스 상속은 extends, 인터페이스 구현은 implements를 씁니다." },
    { id: 728, tag: "Java", difficulty: "Lv.3", question: "자바 예외 처리 문법 중 예외 발생 유무와 무관하게 언제나 마지막에 확실히 구동되는 제어 블록은?", answer: "finally", explanation: "try-catch 구조 끝에 배치되어 자원 해제 등의 무결성 마무리를 담당합니다." },
    { id: 729, tag: "Java", difficulty: "Lv.4", question: "String a = 'CBT'; String b = new String('CBT'); 변수 내용 자체를 비교하기 위한 제어 메서드는?", answer: "equals", explanation: "문자열 인스턴스의 주소가 아닌 내부 데이터 텍스트 값 비교는 equals() 메서드를 씁니다." },
    { id: 730, tag: "Java", difficulty: "Lv.5", question: "자바 가상 머신(JVM) 구조 내에서 모든 인스턴스화된 객체 데이터가 동적으로 상주하는 메모리 구역 명칭은?", answer: "힙", explanation: "new 연산자로 생성된 모든 객체 인스턴스는 Heap 영역에 할당됩니다." },
    { id: 731, tag: "Java", difficulty: "Lv.2", question: "클래스 내부에서 외부의 무분별한 직접 접근을 완벽히 차단하고 은닉화하기 위해 지정하는 제한 제어자는?", answer: "private", explanation: "private 제어자는 선언된 해당 클래스 내부에서만 접근을 허용합니다." },
    { id: 732, tag: "Java", difficulty: "Lv.4", question: "String s = 'ssumer'; System.out.print(s.substring(2, 5)); 의 실행 결과를 쓰시오.", answer: "ume", explanation: "인덱스 2번(u)부터 5번 전인 4번(e)까지 잘라내어 출력하므로 ume 입니다." },
    { id: 733, tag: "Java", difficulty: "Lv.3", question: "String s = 'Able'; System.out.print(s.indexOf('l')); 의 결과 숫자는?", answer: "2", explanation: "0번:A, 1번:b, 2번:l 이므로 인덱스 위치 값인 2가 반환됩니다." },
    { id: 734, tag: "Java", difficulty: "Lv.5", question: "부모 클래스 타입의 참조 변수로 자식 객체를 가리키는 설계 방식으로, 하나의 타입으로 여러 인스턴스 형태를 제어하는 성질은?", answer: "다형성", explanation: "객체지향 핵심 개념 중 하나인 다형성(Polymorphism)에 대한 정의입니다." },
    { id: 735, tag: "Java", difficulty: "Lv.4", question: "동일한 클래스 구역 내부에서 메서드 명칭은 일치시키되 매개변수의 개수나 데이터 타입을 다르게 가져가는 중복 정의 기술은?", answer: "오버로딩", explanation: "한 클래스 내의 다중 적재 정의 기법인 오버로딩(Overloading)입니다." },
    { id: 736, tag: "Java", difficulty: "Lv.3", question: "자바에서 객체가 아예 없는 빈 상태의 레퍼런스를 가리킬 때 사용하는 예약어 키워드는?", answer: "null", explanation: "참조형 변수가 아무런 주소도 가리키고 있지 않음을 명시하는 리터럴입니다." },
    { id: 737, tag: "Java", difficulty: "Lv.2", question: "자바에서 한 번 생성하면 그 내용을 절대 수정할 수 없는 고정 상수형 변수를 선언할 때 선두에 붙이는 키워드는?", answer: "final", explanation: "final 필드는 초기화 완료 후 데이터 변경이 완전히 불가능합니다." },
    { id: 738, tag: "Java", difficulty: "Lv.4", question: "Math.round(4.6); 의 최종 연산 결과값을 정수로 쓰시오.", answer: "5", explanation: "round() 메서드는 소수점 첫째 자리에서 반올림을 수행하므로 5가 됩니다." },
    { id: 739, tag: "Java", difficulty: "Lv.5", question: "클래스 생성자가 다른 오버로딩 생성자를 객체 내부에서 상호 연쇄 호출할 때 첫 줄에 배치하는 함수 구조는?", answer: "this()", explanation: "자신의 또 다른 생성자를 지칭하는 구조적 제어 예약어입니다." },
    { id: 740, tag: "Java", difficulty: "Lv.1", question: "자바 프로그램이 운영체제 위에서 구동되기 위해 가상화 런타임을 제공하는 실행 환경 엔진의 영어 약어는?", answer: "JVM", explanation: "Java Virtual Machine의 약자입니다." },
    { id: 741, tag: "Java", difficulty: "Lv.3", question: "String s = 'Java'; System.out.print(s.toLowerCase()); 의 결과물 텍스트를 쓰시오.", answer: "java", explanation: "문자열 내의 모든 대문자를 소문자로 안전하게 변환 송출합니다." },
    { id: 742, tag: "Java", difficulty: "Lv.4", question: "배열 개체 구조 내에서 전체 저장 공간의 자릿수 크기를 즉시 확인하기 위해 사용하는 속성 명칭은? (괄호 없음)", answer: "length", explanation: "자바 배열의 length 속성은 크기를 정수로 반환합니다. (String은 length() 메서드임)" },
    { id: 743, tag: "Java", difficulty: "Lv.5", question: "자바의 예외 클래스 계층 구조 중, 개발자가 예측하기 힘든 런타임 환경에서 주로 발생하며 예외 처리를 강제하지 않는 체크 예외의 상위 클래스는?", answer: "RuntimeException", explanation: "런타임 예외 계층군으로, 예외 처리를 명시적으로 강제하지 않는 Unchecked Exception 입니다." },
    { id: 744, tag: "Java", difficulty: "Lv.2", question: "숫자 형식의 문자열 '500'을 순수 정수형 수치 데이터로 변환할 때 사용하는 메서드는? (Integer.____)", answer: "parseInt", explanation: "Integer.parseInt('500') 구성을 통해 정수 500으로 변경 완료합니다." },
    { id: 745, tag: "Java", difficulty: "Lv.4", question: "자바 클래스 명칭과 완벽하게 일치하며, 리턴 타입 제어 인자가 전혀 존재하지 않는 객체 초기화용 특수 메서드 분류는?", answer: "생성자", explanation: "Constructor(생성자)는 new 연산 시 자동 구동되어 초기화를 행합니다." },
    { id: 746, tag: "Java", difficulty: "Lv.3", question: "동일 패키지 내부 및 상속으로 연결된 하위 자식 클래스 구역까지만 데이터 변수 접근을 허용하는 보호 제어 키워드는?", answer: "protected", explanation: "상속 연계 접근을 조율하는 protected 접근 제한자입니다." },
    { id: 747, tag: "Java", difficulty: "Lv.5", question: "자바 상속 연계 구조 하에서, 부모 클래스가 정의한 추상 메서드를 자식이 온전히 물려받아 구조 내용을 덮어써 구현하는 기술은?", answer: "오버라이딩", explanation: "메서드 재정의인 오버라이딩(Overriding)에 대한 명확한 원리 구문입니다." },
    { id: 748, tag: "Java", difficulty: "Lv.1", question: "클래스 구조 명세서를 바탕으로 실제 메모리 힙 공간에 실체화된 독립 데이터 인스턴스를 일컫는 용어는?", answer: "객체", explanation: "Object 또는 객체라고 부르며 실체화된 결과물을 뜻합니다." },
    { id: 749, tag: "Java", difficulty: "Lv.4", question: "자바 예외 처리 문맥에서 시스템 결함 조건이 감지되었을 때 수동으로 직접 예외 객체를 상위로 던지기 위해 쓰는 키워드는?", answer: "throw", explanation: "예외를 인위적으로 발생시켜 던질 때는 단수형 키워드 throw를 씁니다." },
    { id: 750, tag: "Java", difficulty: "Lv.3", question: "자바에서 단 하나의 클래스도 상속받지 않은 순수 클래스를 생성하더라도 묵시적으로 최상위에 자동 상속 구조 마킹이 완료되는 클래스명은?", answer: "Object", explanation: "java.lang.Object는 자바 내부 모든 객체 생태계의 최상위 루트 클래스입니다." },

    // --- [751~775: Python 고난도 슬라이싱 및 내장 함수] ---
    { id: 751, tag: "Python", difficulty: "Lv.4", question: "a = 'Icheon'; print(a[-1:-4:-1]); 의 실행 출력 결과물 텍스트를 적으시오.", answer: "noh", explanation: "인덱스 -1(n)부터 -3(h)까지 역순 역방향 슬라이싱 추출하므로 n, o, h가 순서대로 정렬 송출됩니다." },
    { id: 752, tag: "Python", difficulty: "Lv.3", question: "문자 'A'를 넘겨주었을 때 아스키코드 십진수 값인 65로 즉시 변환 디코딩해주는 파이썬 내장 함수명은?", answer: "ord", explanation: "ord('A')는 65를 산출합니다. (2026 기출 핵심)" },
    { id: 753, tag: "Python", difficulty: "Lv.5", question: "a = [x * 2 for x in range(4) if x % 2 != 0]; print(sum(a)); 의 최종 결과 수치는?", answer: "8", explanation: "range(4) 중 홀수는 1과 3입니다. 컴프리헨션 가공 시 [2, 6]이 되며, 이들의 sum 합계는 8이 됩니다." },
    { id: 754, tag: "Python", difficulty: "Lv.4", question: "리스트 컬렉션 내의 순서 구조는 고정하되 데이터를 내림차순 등으로 역순 일괄 뒤집기 변환을 행하는 내장 메서드는?", answer: "reverse", explanation: "list.reverse()는 내부 구조 요소 순서를 정밀하게 역방향 반전시킵니다." },
    { id: 755, tag: "Python", difficulty: "Lv.2", question: "리스트 구조 내의 맨 마지막 데이터 원소를 완전히 추출 소거해내어 반환해주는 전용 메서드는?", answer: "pop", explanation: "pop() 메서드는 기본적으로 가장 꼬리 칸의 요소를 탈출시킵니다." },
    { id: 756, tag: "Python", difficulty: "Lv.3", question: "a = ['the', 'hada']; print(' '.join(a)); 의 실행 연산 결과 텍스트를 쓰시오.", answer: "the hada", explanation: "join() 메서드는 리스트 인자 문자열 사이에 지정한 공백 문자를 끼워 합산 처리합니다." },
    { id: 757, tag: "Python", difficulty: "Lv.4", question: "def cross(n): return 1 if n<=1 else n * cross(n-1)\nprint(cross(3)); 의 최종 결과값을 적으시오.", answer: "6", explanation: "재귀 호출 스택 연산 유도로 3 * 2 * 1 = 6을 최종 도출해냅니다." },
    { id: 758, tag: "Python", difficulty: "Lv.5", question: "수정 불가능한 불변 특성을 지닌 튜플 자료형 a = (10, 20)이 상주할 때, 데이터 타입을 확인하는 type(a) == tuple 의 결과는?", answer: "True", explanation: "소괄호 할당 형태는 파이썬에서 튜플 객체 무결성이 성립되므로 참인 True 신호가 반환됩니다." },
    { id: 759, tag: "Python", difficulty: "Lv.2", question: "텍스트 문자열 데이터 양 끝단에 상주하는 모든 화이트스페이스 공백 문자열을 깨끗하게 소거해주는 메서드는?", answer: "strip", explanation: "strip() 연산은 문자열 좌우 공백 제거에 특화되어 있습니다." },
    { id: 760, tag: "Python", difficulty: "Lv.3", question: "a = [4, 1, 3]; b = sorted(a); 원본 리스트 변수 인자 데이터인 a[0]의 현재 값은?", answer: "4", explanation: "sorted() 함수는 정렬된 완전히 새로운 사본 리스트를 반환하므로, 원본 리스트 a는 오염되지 않고 4를 유지합니다." },
    { id: 761, tag: "Python", difficulty: "Lv.1", question: "리스트 컬렉션 내부 구조에 상주하는 데이터 원소 개수(길이)를 즉시 정수로 구하는 내장 함수는?", answer: "len", explanation: "length의 약자 형태인 len() 내장 함수 기출 연계입니다." },
    { id: 762, tag: "Python", difficulty: "Lv.4", question: "print('ssumer'.replace('m', 'z')); 실행 시 하드웨어 화면에 송출되는 텍스트 결과는?", answer: "ssuzer", explanation: "문자열 내의 타겟 인자 패턴을 변환 치환 완료합니다." },
    { id: 763, tag: "Python", difficulty: "Lv.3", question: "a = [10, 20, 30]; print(a.index(20)); 의 최종 연산 출력값은?", answer: "1", explanation: "원소 데이터 20이 위치한 방 번호 색인 수치인 1이 정상 반환됩니다." },
    { id: 764, tag: "Python", difficulty: "Lv.5", question: "이름 인자가 존재하지 않는 1회성 익명 함수 구조를 간결하게 수립 정의할 때 배치하는 키워드는?", answer: "lambda", explanation: "익명 람다식 표현 선언 구문 키워드입니다." },
    { id: 765, tag: "Python", difficulty: "Lv.2", question: "문자열 구조인 '100' 데이터를 순수 산술 사칙연산 처리가 가능한 정수형 데이터로 바꾸는 함수는?", answer: "int", explanation: "정수형 강제 데이터 변환 유도 함수입니다." },
    { id: 766, tag: "Python", difficulty: "Lv.4", question: "정수형 십진수 아스크코드 번호인 66 수치를 넘겼을 때 이에 부합하는 문자 'B'로 되돌려주는 함수는?", answer: "chr", explanation: "character 디코딩 복원 함수인 chr() 명칭입니다." },
    { id: 767, tag: "Python", difficulty: "Lv.3", question: "a = 'ABLE'; print(a.lower()); 의 연산 결과 텍스트를 적으시오.", answer: "able", explanation: "영문 대문자 시그널 전체를 소문자로 압축 변환합니다." },
    { id: 768, tag: "Python", difficulty: "Lv.1", question: "데이터 요소의 중복을 원천 불허하며 데이터 저장 배치 순서성이 존재하지 않는 특화 집합 컬렉션 키워드는?", answer: "set", explanation: "파이썬 셋(set) 집합 자료형 규칙 명칭입니다." },
    { id: 769, tag: "Python", difficulty: "Lv.4", question: "a = [1, 2, 3]; a.insert(1, 9); print(a[1]); 의 실행 연산 결과값은?", answer: "9", explanation: "1번 인덱스 위치방에 데이터 9를 강제 삽입 배치 완료했습니다." },
    { id: 770, tag: "Python", difficulty: "Lv.5", question: "a = [10, 20, 30]; b = a; b[0] = 99; print(a[0]); 의 최종 출력값은?", answer: "99", explanation: "단순 대입은 참조 주소 메모리를 완전히 공유하므로 복사본 b를 오염시키면 원본 a도 99로 변합니다." },
    { id: 771, tag: "Python", difficulty: "Lv.3", question: "print('A' * 4); 구문 실행 시 하드웨어 터미널 창에 표출되는 결과 문자열은?", answer: "AAAA", explanation: "문자열 곱셈 배수를 유도하여 일괄 연속 반복 출력 처리를 완공합니다." },
    { id: 772, tag: "Python", difficulty: "Lv.2", question: "조건 제어문 흐름 구역 내부에서 기술적 빈 껍데기 자리 채우기용으로 배치하는 아무런 동작 없는 예약어는?", answer: "pass", explanation: "패스(pass) 실행 구문 키워드 명칭입니다." },
    { id: 773, tag: "Python", difficulty: "Lv.4", question: "a = 'Icheon-si'; print(a.split('-')[0]); 의 단독 결과 텍스트를 적으시오.", answer: "Icheon", explanation: "구분자를 바탕으로 쪼개어 가공 완료한 0순위 인덱스 문자열 영역입니다." },
    { id: 774, tag: "Python", difficulty: "Lv.3", question: "리스트 내부 꼬리 공간에 단일 원소 인자 데이터 값을 안전하게 밀어넣어 추가하는 메서드는?", answer: "append", explanation: "어펜드 리스트 추가 메서드 명칭입니다." },
    { id: 775, tag: "Python", difficulty: "Lv.5", question: "a = (1, 2, 3); a[0] = 5; 실행 시 파이썬 인터프리터 컴파일 환경에서 표출되는 현상은?", answer: "에러", explanation: "불변 인스턴스인 튜플 객체는 강제 데이터 덮어쓰기 갱신 시 예외 에러를 송출합니다. (2026 기출)" },

    // --- [776~800: SQL 제약조건 및 고급 서브쿼리 완공] ---
    { id: 776, tag: "SQL", difficulty: "Lv.4", question: "서브쿼리 결과 릴레이션 데이터 셋 내에 일치하는 행 데이터가 최소 '하나라도 존재하면' 참을 반환하는 조건 연산자는?", answer: "EXISTS", explanation: "2026년 1회 실기 시험에 완벽하게 출제된 단답형 연산자 문항입니다." },
    { id: 777, tag: "SQL", difficulty: "Lv.5", question: "두 테이블 결과 합산을 도출하되 중복 데이터 행을 소거 연산 처리하지 않고 모두 노출 출력하는 집합 연산자는?", answer: "UNION ALL", explanation: "중복 압축 정렬 처리를 배제하여 연산 속도가 매우 탁월한 합집합 연산자입니다. (기출 연계)" },
    { id: 778, tag: "SQL", difficulty: "Lv.3", question: "특정 데이터 속성 컬럼 행 구역의 데이터가 비어있는 NULL 조건 상태인지 검사할 때 쓰는 연산자는?", answer: "IS NULL", explanation: "이퀄 기호 대신 전용 IS NULL 제어 키워드를 적용 유도해야 무결성이 유지됩니다." },
    { id: 779, tag: "SQL", difficulty: "Lv.4", question: "LIKE 패턴 매칭 연산에서 임의의 단일 문자 딱 '한 글자 공간' 자릿수만을 강제 매칭 대행시키는 와일드카드 기호는?", answer: "_", explanation: "언더바(_) 기호는 1개의 문자 자릿수를 상징 고정 제어합니다." },
    { id: 780, tag: "SQL", difficulty: "Lv.5", question: "릴레이션 무결성 원칙 중, '외래키 값은 참조하는 상위 테이블의 기본키 값과 무조건 연동 일치하거나 완전히 비어있어야 한다'는 규칙은?", answer: "참조 무결성", explanation: "테이블 간 릴레이션십 신뢰도를 방어하는 참조 무결성(Referential Integrity) 제약입니다." },
    { id: 781, tag: "SQL", difficulty: "Lv.3", question: "이미 완성된 테이블 스키마의 물리적 컬럼 속성 구조를 변경 보정하고자 할 때 호출하는 DDL 명령어는?", answer: "ALTER TABLE", explanation: "테이블 구조 변경의 기본 Definition 구문 명령어입니다." },
    { id: 782, tag: "SQL", difficulty: "Lv.4", question: "기존 릴레이션에 안착 상주 중인 특정 데이터 행 속성 데이터 값을 갱신 조율할 때 사용하는 데이터 조작어는?", answer: "UPDATE", explanation: "UPDATE 테이블명 SET 형태로 세트 구동합니다." },
    { id: 783, tag: "SQL", difficulty: "Lv.5", question: "기본키(Primary Key)가 설계 무결성 관리를 위해 물리적으로 절대 가질 수 없는 조건 제약 2가지는? (쉼표 배치)", answer: "중복값, NULL", explanation: "기본키는 유일성(Unique)과 실체성(Not Null)을 무조건 동시 대행 달성해야 합니다." },
    { id: 784, tag: "SQL", difficulty: "Lv.2", question: "조회된 데이터 행 정렬 시 높은 점수나 큰 금액 대상을 선두방에 우선순위 배치하는 내림차순 정렬 예약어는?", answer: "DESC", explanation: "Descending의 축약 약어 명칭입니다." },
    { id: 785, tag: "SQL", difficulty: "Lv.4", question: "서로 다른 테이블을 조인 결합할 때 매칭 조건이 불일치하더라도 우측 기준 테이블의 모든 데이터 행을 강제 무조건 노출 출력하는 외부 조인 방식은?", answer: "RIGHT JOIN", explanation: "우측 외부 조인(Right Outer Join) 공식 명칭입니다." },
    { id: 786, tag: "SQL", difficulty: "Lv.3", question: "선별된 데이터 행 개수 총합 단위를 정수로 카운트다운 산출해내는 그룹 집계 함수는?", answer: "COUNT", explanation: "카운트 함수명 기본기입니다." },
    { id: 787, tag: "SQL", difficulty: "Lv.5", question: "트랜잭션의 완벽한 ACID 특징 중, '전체 반영 완료(All) 처리되거나 아예 무효화 백아웃(Nothing) 처리되어야 한다'는 성질은?", answer: "원자성", explanation: "Atomicity에 부합하는 연산 규칙 정의 제어어입니다." },
    { id: 788, tag: "SQL", difficulty: "Lv.4", question: "실제 데이터를 물리 소장하지는 않으나 사용자 편의성과 내부 보안 강화를 위해 기본 테이블을 바탕으로 설계 투영하는 가상 테이블은?", answer: "뷰", explanation: "가상 논리 테이블인 View(뷰)의 명확한 정의입니다." },
    { id: 789, tag: "SQL", difficulty: "Lv.3", question: "진행 중이던 트랜잭션 도중 치명적 오류나 비결정이 도출되었을 때 작업 전 시점의 세이브포인트로 원상 복구시키는 DCL 구문은?", answer: "ROLLBACK", explanation: "작업 취소 제어 명령 구문입니다." },
    { id: 790, tag: "SQL", difficulty: "Lv.2", question: "데이터 인자 값들의 평균 레이트를 산출 필터링해주는 집계 함수는?", answer: "AVG", explanation: "에버리지 집계 함수명입니다." },
    { id: 791, tag: "SQL", difficulty: "Lv.4", question: "ALTER TABLE 문을 경유하여 테이블 내부에 새로운 신규 컬럼을 삽입 장착하고자 할 때 연동 배치하는 하위 구문은?", answer: "ADD", explanation: "컬럼 추가 속성 키워드인 ADD 명칭입니다." },
    { id: 792, tag: "SQL", difficulty: "Lv.5", question: "GRANT 권한 부여 구문 전개 시, 인가받은 사용자가 타인에게 해당 권한을 재차 재연쇄 부여할 수 있도록 라이센스를 열어주는 제어 옵션은?", answer: "WITH GRANT OPTION", explanation: "권한 전파 대행 옵션 구문 명칭입니다." },
    { id: 793, tag: "SQL", difficulty: "Lv.3", question: "특정 데이터 속성의 내용 값이 NULL 상태가 아닌 유효 데이터만을 안전하게 선별 걸러내고자 할 때 적용하는 조건문은? (네 단어)", answer: "IS NOT NULL", explanation: "공백 아님을 가려내는 고정 매칭 조건식입니다." },
    { id: 794, tag: "SQL", difficulty: "Lv.4", question: "데이터 제어어 분류군을 일컫는 영문 3글자 대표 약어 약칭을 쓰시오.", answer: "DCL", explanation: "Data Control Language의 분류군 약어 명칭입니다." },
    { id: 795, tag: "SQL", difficulty: "Lv.2", question: "조건 만족 타겟 데이터 행을 선별 파괴 제거해내는 데이터 조작어 명령어는?", answer: "DELETE", explanation: "딜리트 데이터 행 삭제 DML 구문 명령어입니다." },
    { id: 796, tag: "SQL", difficulty: "Lv.4", question: "테이블 구조 스키마를 영구 소멸 제거하거나 데이터베이스 자체를 파괴할 때 행하는 DDL 명령어는?", answer: "DROP", explanation: "존재 자체를 날려버리는 DROP 구조 정의어 명령어입니다." },
    { id: 797, tag: "SQL", difficulty: "Lv.1", question: "데이터베이스 관리 생태계 내에서 테이블 생성, 인덱스 조율 등을 전담 지휘하는 구조 정의어 분류 약어는?", answer: "DDL", explanation: "Data Definition Language의 분류 약어 명칭입니다." },
    { id: 798, tag: "SQL", difficulty: "Lv.5", question: "트랜잭션 ACID 특징 중, '설령 시스템 하드웨어 결함이 발발하더라도 이미 완료 확정된 트랜잭션 결과는 영구 보존 보장된다'는 특성은?", answer: "영속성", explanation: "지속성 또는 영속성을 뜻하는 Durability 원칙 정의입니다." },
    { id: 799, tag: "SQL", difficulty: "Lv.3", question: "데이터베이스 릴레이션 개체 무결성 규칙 하에서, '기본키는 절대로 비어있거나 생략될 수 없다'는 제약을 뜻하는 고정 제약조건 명칭은?", answer: "NOT NULL", explanation: "공백 절대 불가 제약 규칙 명칭입니다." },
    { id: 800, tag: "SQL", difficulty: "Lv.4", question: "테이블 생성 설계 마킹 시 특정 속성 행 컬럼의 값이 전사적으로 유일하게 중복 불허 처리되도록 강제하는 제약 명칭은?", answer: "UNIQUE", explanation: "유일성 제약조건 명칭 기출 완공입니다." },
     // [기존 800번 문제 뒤에 이어서 붙여넣으세요]

    // --- [801~825: 운영체제 및 프로세스 스케줄링 완공] ---
    { id: 801, tag: "OS", difficulty: "Lv.3", question: "프로세스가 CPU를 할당받아 실행 중이던 중, 할당된 시간(Time Slice)이 모두 초과되어 다시 준비(Ready) 상태로 전환되는 현상을 무엇이라 하는가?", answer: "타임아웃", explanation: "시분할 선점형 스케줄링 환경에서 발생하는 대표적인 프로세스 상태 전이 현상입니다." },
    { id: 802, tag: "OS", difficulty: "Lv.4", question: "CPU 스케줄링 알고리즘 중 대기 시간과 서비스(실행) 시간을 이용하여 우선순위를 계산하는 방식으로, SJF의 긴 작업 대기 단점을 보완한 알고리즘의 약어는?", answer: "HRN", explanation: "Highest Response-ratio Next의 약자로, (대기시간+서비스시간)/서비스시간 공식을 사용하여 우선순위를 결정합니다." },
    { id: 803, tag: "OS", difficulty: "Lv.5", question: "선점형 CPU 스케줄링의 대표적인 방식으로, 준비 대기열에 도착한 순서대로 프로세스를 할당하되 각 프로세스에게 동일한 시간 할당량(Time Quantum)을 부여하는 제어 방식은?", answer: "라운드 로빈", explanation: "Round Robin(RR) 방식은 모든 프로세스가 CPU를 공평하게 공유하도록 조절합니다." },
    { id: 804, tag: "OS", difficulty: "Lv.3", question: "운영체제에서 실행 중인 하나의 프로세스 정보를 저장하고 관리하기 위해 생성하는 커널 메모리 블록 구조의 영문 약어는?", answer: "PCB", explanation: "Process Control Block(프로세스 제어 블록)의 약칭입니다." },
    { id: 805, tag: "OS", difficulty: "Lv.4", question: "교착상태(Deadlock)의 발생 조건 4가지 중, '프로세스가 자원을 점유한 상태에서 다른 자원을 추가로 요구하며 대기함'을 뜻하는 조건 명칭은?", answer: "점유와 대기", explanation: "Hold and Wait 조건으로 교착상태 유발의 필수 요건 중 하나입니다." },
    { id: 806, tag: "OS", difficulty: "Lv.5", question: "교착상태 해결 방법 중, 은행원 알고리즘(Banker's Algorithm)과 같이 자원 할당 시 안전 상태를 검사하여 교착상태를 원천적으로 피해가는 제어 전략 분류는?", answer: "회피", explanation: "교착상태 해결 방법은 예방(Avoidance 아님), 회피(Avoidance), 발견, 회복 4가지로 나뉩니다." },
    { id: 807, tag: "OS", difficulty: "Lv.2", question: "현재 실행 상태(Running)에 있는 프로세스가 입출력(I/O) 요청 등의 사유로 인해 인프라 자원을 기다리기 위해 전환되는 상태 명칭은?", answer: "대기 상태", explanation: "블록(Blocked) 또는 대기 상태라고 하며, 입출력 완료 신호가 오면 준비(Ready) 상태로 이동합니다." },
    { id: 808, tag: "OS", difficulty: "Lv.4", question: "비선점형 CPU 스케줄링 알고리즘 중 준비 대기열에 도착한 프로세스 중 실행 시간이 가장 짧은 작업부터 우선적으로 CPU를 할당하는 방식의 약어는?", answer: "SJF", explanation: "Shortest Job First의 약자로 평균 대기 시간을 최소화하는 최적 알고리즘입니다." },
    { id: 809, tag: "OS", difficulty: "Lv.1", question: "컴퓨터 하드웨어 바로 위 상주하며 전체적인 시스템 자원을 효율적으로 관리하고 사용자에게 편의를 제공하는 핵심 시스템 소프트웨어는?", answer: "운영체제", explanation: "Operating System(OS)에 대한 정의입니다." },
    { id: 810, tag: "OS", difficulty: "Lv.5", question: "운영체제 커널의 핵심 기능 중 하나로, 하드웨어를 제어하고 메모리, 프로세스 등을 실질적으로 관리하는 심장부 소프트웨어 구역 명칭은?", answer: "커널", explanation: "Kernel은 하드웨어와 사용자 프로세스 사이의 교량 가공 역할을 맡은 운영체제의 핵심부입니다." },
    { id: 811, tag: "OS", difficulty: "Lv.3", question: "다중 프로그래밍 시스템에서 CPU가 실제 유용한 연산 작업을 수행하는 시간보다 프로세스 간 문맥 교환(Context Switching)을 수행하는 오버헤드 시간이 더 커져 시스템 성능이 저하되는 현상은?", answer: "스레싱", explanation: "Thrashing(스레싱) 현상으로, 페이지 교체 빈도가 너무 잦을 때 발발합니다." },
    { id: 812, tag: "OS", difficulty: "Lv.4", question: "하나의 프로세스가 실행되는 동안 메모리의 특정 일부 구역(페이지)들을 집중적으로 참조하는 경향을 뜻하는 메모리 관리 용어는?", answer: "국부성", explanation: "Locality(국부성 또는 지역성)라고 하며 시간 국부성과 공간 국부성으로 세분화됩니다." },
    { id: 813, tag: "OS", difficulty: "Lv.2", question: "프로세스보다 더 작은 실행 단위로, 하나의 프로세스 내부에서 자원을 공유하며 다중 제어 흐름을 생성해내는 실행 엔티티의 명칭은?", answer: "스레드", explanation: "Thread(스레드)는 주소 공간과 자원을 공유하므로 Context Switch 비용이 절감됩니다." },
    { id: 814, tag: "OS", difficulty: "Lv.5", question: "교착상태 발생 조건 중 '타인에 의해 점유된 자원을 강제로 빼앗아 올 수 없음'을 명시하는 조건 이름은?", answer: "비선점", explanation: "Non-preemption 조건 제약 조건입니다." },
    { id: 815, tag: "OS", difficulty: "Lv.3", question: "프로세스가 실행을 위해 필요한 페이지가 현재 주기억장치(RAM)에 존재하지 않아 인터럽트 예외를 발발시키는 현상의 명칭은?", answer: "페이지 부재", explanation: "Page Fault(페이지 부재)가 발생하면 가상메서지 디스크로부터 해당 페이지를 메모리로 로드해야 합니다." },
    { id: 816, tag: "OS", difficulty: "Lv.4", question: "가상 메모리 관리 기법 중, 주소 공간을 가변적인 크기의 논리적 단위로 분할하여 메모리를 할당하는 기법의 명칭은?", answer: "세그먼테이션", explanation: "고정 크기로 분할하는 방식은 페이징(Paging), 가변 크기로 분할하는 방식은 세그먼테이션(Segmentation)입니다." },
    { id: 817, tag: "OS", difficulty: "Lv.1", question: "컴퓨터 전원 인가 시 초기 기억장치 ROM에 상주하는 BIOS 프로그램이 작동하여 시스템을 초기화하고 커널을 주기억장치로 올리는 부팅 유도 로더 과정은?", answer: "부트스트랩", explanation: "Bootstrap 로더에 대한 설명 기본 문제입니다." },
    { id: 818, tag: "OS", difficulty: "Lv.3", question: "동일한 자원을 여러 프로세스가 동시에 수정하려 경쟁할 때, 접근 순서에 따라 결과가 달라지는 비정상적 경쟁 상태 구역을 뜻하는 용어는?", answer: "경쟁 조건", explanation: "Race Condition(경쟁 조건)을 방지하기 위해 상호 배제 등의 동기화 제어가 요구됩니다." },
    { id: 819, tag: "OS", difficulty: "Lv.5", question: "공유 자원의 동시 접근을 막기 위해 한 번에 하나의 프로세스만 임계 구역(Critical Section)에 진입하도록 제어하는 동기화 원리는?", answer: "상호 배제", explanation: "Mutual Exclusion(Mutex) 원칙 제어 기출 연계입니다." },
    { id: 820, tag: "OS", difficulty: "Lv.4", question: "메모리 할당 관리 중, 프로세스가 필요로 하는 크기보다 더 큰 분할 공간이 할당되어 해당 공간 내부에서 낭비되는 메모리 빈 조각 현상은?", answer: "내부 단편화", explanation: "고정 분할 방식(페이징 등)에서 주로 발생하는 내부 단편화(Internal Fragmentation) 현상입니다." },
    { id: 821, tag: "OS", difficulty: "Lv.2", question: "준비(Ready) 대기열 풀에 대기 중인 고효율 프로세스 중 하나를 선택하여 실제 CPU 연산 코어 프로세서에 할당해주는 스케줄러의 행위는?", answer: "디스패치", explanation: "Dispatch(디스패치) 처리를 통해 프로세스가 실행 상태로 전이됩니다." },
    { id: 822, tag: "OS", difficulty: "Lv.3", question: "기억장치 관리 기법 중 분산되어 있는 자잘한 빈 메모리 조각들을 모아서 하나의 커다란 연속 공간으로 병합 재배치하는 작업 명칭은?", answer: "압축", explanation: "Compaction(압축 또는 쓰레기 수집) 기법을 통해 외부 단편화를 해결합니다." },
    { id: 823, tag: "OS", difficulty: "Lv.4", question: "프로세스가 자주 참조하는 페이지들의 집합을 메모리에 상주시켜 페이지 부재율을 최소화하는 가상메모리 관리 이론은?", answer: "워킹 세트", explanation: "Denning이 제안한 Working Set 이론으로 데드락 및 스레싱을 제어합니다." },
    { id: 824, tag: "OS", difficulty: "Lv.5", question: "임계 구역 동기화 제어를 위해 네덜란드의 다익스트라가 제안한 기법으로, P와 V 연산 구조를 지닌 정수형 신호 변수 메커니즘은?", answer: "세마포어", explanation: "Semaphore(세마포어) 구조에 대한 정의 묻는 고급 정형 문제입니다." },
    { id: 825, tag: "OS", difficulty: "Lv.1", question: "기억장치 제어 체계에서 중앙처리장치(CPU)와 주기억장치(RAM) 간의 극심한 속도 차이를 완충하여 연산 속도를 높이는 고속 메모리는?", answer: "캐시 메모리", explanation: "Cache Memory에 대한 기본 정의 문제입니다." },

    // --- [826~850: 리눅스 명령어 및 권한 제어 정밀화] ---
    { id: 826, tag: "Linux", difficulty: "Lv.4", question: "리눅스 환경에서 파일 권한 지표가 '-rwxr-xr-x' 구조를 취하고 있을 때, 이를 8진수 기반 숫자로 변환한 최종 수치는?", answer: "755", explanation: "rwx(4+2+1=7), r-x(4+0+1=5), r-x(4+0+1=5) 조합으로 755가 됩니다. (최신 기출 연계)" },
    { id: 827, tag: "Linux", difficulty: "Lv.3", question: "리눅스 터미널 내에서 임의의 실행 파일이나 대상 디렉터리의 소유 권한 설정을 수정하고자 할 때 호출하는 명령어는?", answer: "chmod", explanation: "Change Mode의 약자로 소유자, 그룹, 타인의 권한을 제어합니다." },
    { id: 828, tag: "Linux", difficulty: "Lv.5", question: "리눅스 명령어 조합 중, 지정된 텍스트 파일 내부에서 특정 문자열 패턴이 포함된 행만을 필터링 탐색하여 화면에 송출해주는 필터 명령어는?", answer: "grep", explanation: "Global Regular Expression Print의 약자로 텍스트 검색에 특화되어 있습니다." },
    { id: 829, tag: "Linux", difficulty: "Lv.2", question: "리눅스 파일 시스템에서 현재 사용자가 위치하고 있는 작업 디렉터리의 절대 경로를 화면에 출력해주는 명령어는?", answer: "pwd", explanation: "Print Working Directory의 약자로 2026년 1회 실기 시험 출제 문항입니다." },
    { id: 330, tag: "Linux", difficulty: "Lv.3", question: "리눅스에서 일반 사용자가 임시로 root(관리자)의 특권을 가용하여 명령을 대행 실행하고자 할 때 문두에 선언하는 제어 키워드는?", answer: "sudo", explanation: "superuser do의 약자로 2026년 1회 실기에 완벽하게 출제된 기출 단어입니다." },
    { id: 831, tag: "Linux", difficulty: "Lv.1", question: "리눅스 쉘 터미널 상에서 새로운 디렉터리(폴더)를 물리적으로 생성하고자 할 때 입력하는 기본 명령어는?", answer: "mkdir", explanation: "Make Directory의 약자 구문 명칭입니다." },
    { id: 832, tag: "Linux", difficulty: "Lv.4", question: "작업 경로가 '/var/www/html' 상태이고 목표지가 '/var/www/image' 일 때, 이동하기 위해 입력해야 하는 올바른 '상대 경로' 구조는?", answer: "../image", explanation: "..을 경유하여 부모 영역인 www로 후퇴한 후 image 폴더로 진입합니다. (2026 기출)" },
    { id: 833, tag: "Linux", difficulty: "Lv.2", question: "리눅스 내에서 텍스트 파일의 전체 문자열 내용 스트림을 끊김 없이 터미널 화면에 즉시 연속 종단 출력해주는 기본 명령어는?", answer: "cat", explanation: "concatenate의 약자로 단일 혹은 다수 파일의 텍스트 출력을 수행합니다." },
    { id: 834, tag: "Linux", difficulty: "Lv.3", question: "리눅스 터미널 명령어의 공식 도움말 문서 및 상세 사용법 사전을 열람 확인하고자 할 때 선두에 매칭시키는 명령어 명칭은?", answer: "man", explanation: "manual의 약자로 2026년 1회 실기에 가답안 복원 완료된 명령어 문항입니다." },
    { id: 835, tag: "Linux", difficulty: "Lv.5", question: "리눅스 파일이나 디렉터리의 소유자(Owner) 및 소유 그룹을 변경하고자 할 때 관리자 권한과 연동해 호출하는 시스템 명령어 명칭은?", answer: "chown", explanation: "Change Owner의 약자인 chown 명령어로 소유권을 통제 조율합니다." },
    { id: 836, tag: "Linux", difficulty: "Lv.2", question: "지정된 타겟 파일이나 보관 경로 디렉터리 명칭을 다른 이름으로 개편하거나 물리적으로 다른 방으로 이동시키는 명령어는?", answer: "mv", explanation: "move의 축약 형태로 파일 이동 및 이름 변경을 동시 대행 처리합니다." },
    { id: 837, tag: "Linux", difficulty: "Lv.3", question: "현재 디렉터리 내에 숨겨진 파일(.으로 시작하는 파일)까지 일괄 포함하여 상세 정보 형태로 리스트를 출력하도록 지시하는 ls 명령어의 복합 옵션 조합은?", answer: "-la", explanation: "long의 l과 all의 a를 더한 -la(또는 -al) 옵션을 연동 적용합니다." },
    { id: 838, tag: "Linux", difficulty: "Lv.1", question: "리눅스 쉘 환경에서 지정된 파일의 물리 복제 사본을 생성하고자 할 때 호출하는 명령어는?", answer: "cp", explanation: "copy의 약자 기본기 문제입니다." },
    { id: 839, tag: "Linux", difficulty: "Lv.4", question: "리눅스 파일 권한 지표 문자열 구조 중 첫 글자가 'd'로 명시되어 있다면, 이 파일의 성격 종류는 무엇인가?", answer: "디렉터리", explanation: "일반 파일은 하이픈(-), 디렉터리는 d, 심볼릭 링크는 l로 맨 앞 문자가 마킹됩니다." },
    { id: 840, tag: "Linux", difficulty: "Lv.5", question: "새로운 파일이나 디렉터리가 생성될 때 자동으로 차감 적용되는 기본 권한 마스크를 설정하거나 확인하는 리눅스 명령어 제어어는?", answer: "umask", explanation: "User Mask의 약자인 umask 제어 처리를 통해 생성 파일의 보안 초기 값을 관리합니다." },
    { id: 841, tag: "Linux", difficulty: "Lv.2", question: "리눅스 환경에서 비어있는 공백 디렉터리 구역을 안전하게 소멸 삭제하고자 할 때 쓰는 명령어는?", answer: "rmdir", explanation: "Remove Directory의 축약형 명령어로 내부가 비어있을 때만 동작합니다." },
    { id: 842, tag: "Linux", difficulty: "Lv.3", question: "내부에 파일이나 하위 디렉터리가 잔존하는 폴더를 강제적 연쇄 소멸 처리를 행하기 위해 덧붙이는 rm 명령어의 하위 옵션 조합 기호는?", answer: "-rf", explanation: "recursive의 r과 force의 f를 결합 유도하여 무조건 소멸 처리를 단행합니다." },
    { id: 843, tag: "Linux", difficulty: "Lv.4", question: "리눅스 시스템 환경에서 현재 작동 대기 상주 중인 활성 프로세스들의 상세 트리 구조 목록을 확인하는 명령어는?", answer: "ps", explanation: "Process Status의 약자 형태로 현재 사용자의 활성 프로세스 상태 스냅샷을 송출합니다." },
    { id: 844, tag: "Linux", difficulty: "Lv.1", question: "현재 터미널 창에 접속 로그 상주 중인 사용자의 계정 고유 ID 이름 명칭을 즉시 화면에 노출해주는 명령어는?", answer: "whoami", explanation: "who am i 구조의 약자 기본 문항입니다." },
    { id: 845, tag: "Linux", difficulty: "Lv.5", question: "파일 시스템의 디스크 여유 공간 및 사용 가능 용량 상태를 사람이 읽기 편한 메가/기가 바이트 규격으로 일괄 출력해주는 시스템 명령어 조합은?", answer: "df -h", explanation: "disk free의 df와 human-readable의 -h 옵션을 결합 조율 완료합니다." },
    { id: 846, tag: "Linux", difficulty: "Lv.3", question: "리눅스에서 긴 텍스트 내용을 한 화면 단위(페이지)로 나누어 끊어서 가독성 있게 보여주는 화면 출력 제어 명령어는?", answer: "more", explanation: "more 또는 less 명령어로 대용량 파일 가독성을 확보합니다." },
    { id: 847, tag: "Linux", difficulty: "Lv.2", question: "현재 터미널 쉘 창에 복잡하게 오염 마킹되어 있는 이전 연산 출력 문자열 잔여 기록을 깨끗하게 소거해주는 명령어는?", answer: "clear", explanation: "화면 일괄 소거 명령어입니다." },
    { id: 848, tag: "Linux", difficulty: "Lv.4", question: "리눅스 네트워크 환경에서 타겟 호스트 컴퓨터 서버와의 물리 통신 연결 및 생존 여부를 에코 패킷 신호로 검증하는 명령어는?", answer: "ping", explanation: "ICMP 프로토콜을 활용해 원격지 도달 무결성을 체크합니다." },
    { id: 849, tag: "Linux", difficulty: "Lv.5", question: "특정 타겟 텍스트 파일의 가장 꼬리 구역 행 데이터 10라인을 실시간 모니터링 연동하여 연속 송출해주는 유용한 디버깅 명령어는?", answer: "tail -f", explanation: "tail 명령에 follow를 뜻하는 -f 옵션을 부합 연계시키면 실시간 로그 추적이 완공됩니다." },
    { id: 850, tag: "Linux", difficulty: "Lv.1", question: "리눅스 쉘 명령어 구동 환경에서 이전 명령 작업을 완전히 종단하고 시스템 로그인 세션을 빠져나갈 때 쓰는 종료 명령어는?", answer: "exit", explanation: "로그아웃 및 쉘 종료 명령어입니다." },

    // --- [851~875: C언어 기출 변형 및 알고리즘 고도화] ---
    { id: 851, tag: "C언어", difficulty: "Lv.4", question: "int a = 8; printf('%d', a >> 2); 의 실행 결과 연산 수치는?", answer: "2", explanation: "오른쪽 비트 시프트 연산으로 4로 나눈 몫인 2가 최종 도출됩니다." },
    { id: 852, tag: "C언어", difficulty: "Lv.5", question: "int arr[5] = {10, 20, 30}; int *p = &arr[0]; printf('%d', *(p + 2) - 5); 의 결과값은?", answer: "25", explanation: "2번 인덱스인 30 수치를 간접 색인 유도한 후 산술 5를 차감하여 25를 확정 도출합니다." },
    { id: 853, tag: "C언어", difficulty: "Lv.3", question: "C언어에서 실수 소수점 데이터를 온전히 담아내는 4바이트 단정밀도 기본 실수형 키워드는?", answer: "float", explanation: "배정밀도는 8바이트 double, 단정밀도는 4바이트 float 입니다." },
    { id: 854, tag: "C언어", difficulty: "Lv.4", question: "int a = 12, b = 5; if(a > 10 && b == 5) printf('1'); else printf('2'); 의 출력 결과는?", answer: "1", explanation: "논리 AND(&&) 연산 조건이 양측 모두 참을 성립하므로 1번 분기가 작동 완료됩니다." },
    { id: 855, tag: "C언어", difficulty: "Lv.5", question: "struct Book { int code; char state; } b = {101, 'Y'}; struct Book *p = &b; printf('%d', p->code); 의 출력값은?", answer: "101", explanation: "구조체 주소 포인터 상태에서 내부 멤버 요소에 엑세스할 때는 화살표 연산자가 강제 적용됩니다." },
    { id: 856, tag: "C언어", difficulty: "Lv.2", question: "int x = 20 % 7; printf('%d', x); 의 연산 처리 출력 결과는?", answer: "6", explanation: "나머지 연산 유도로 최종 잔량 6이 반환 도출 완료됩니다." },
    { id: 857, tag: "C언어", difficulty: "Lv.4", question: "int sum = 0; for(int i=1; i<=4; i++) { if(i==3) break; sum+=i; } printf('%d', sum); 의 결과는?", answer: "3", explanation: "i가 3이 되는 회차에 break 탈출하므로 1+2 = 3 수치만 누적 합산됩니다." },
    { id: 858, tag: "C언어", difficulty: "Lv.3", question: "문자열 인자의 순수 글자수 공간의 크기 길이를 정수로 즉시 계산해주는 표준 함수명은? (string.h)", answer: "strlen", explanation: "String Length의 약자인 strlen 함수 규칙 명칭입니다." },
    { id: 859, tag: "C언어", difficulty: "Lv.5", question: "int a = 5; int *p = &a; (*p)++; printf('%d', a); 의 역참조 연산 결과값은?", answer: "6", explanation: "포인터 간접 화살표 연산을 가동하여 실제 데이터 할당지의 값을 1 올려 6을 확정 출력합니다." },
    { id: 860, tag: "C언어", difficulty: "Lv.4", question: "char str[] = 'CBT'; printf('%zu', sizeof(str)); 실행 시 출력되는 메모리 바이트 수는?", answer: "4", explanation: "글자 크기 3바이트 외에 보이지 않는 종단 널 문자(\\0)가 1바이트 가산 고정됩니다." },
    { id: 861, tag: "C언어", difficulty: "Lv.2", question: "정수형 십진수 데이터를 16진수 '대문자' 규격 문자로 변환하여 출력하는 서식 지정자는?", answer: "%X", explanation: "소문자는 %x, 대문자는 %X 서식 포맷을 취합니다." },
    { id: 862, tag: "C언어", difficulty: "Lv.4", question: "int a = 5; int b = a++; printf('%d', b); 의 최종 후위 대입 출력값은?", answer: "5", explanation: "후위 연산 규칙에 의해 기존의 원본 5 수치가 b에 먼저 복사 안착된 후 a가 상승합니다." },
    { id: 863, tag: "C언어", difficulty: "Lv.3", question: "동적 메모리 할당 공간을 안전하게 수동 해제하여 메모리 누수 결함을 방어하는 함수명은?", answer: "free", explanation: "힙 공간 반납 함수인 free() 명칭 기본기입니다." },
    { id: 864, tag: "C언어", difficulty: "Lv.5", question: "int x = 6, y = 3; printf('%d', x ^ y); 실행 시 도출되는 비트 배타적 논리합 결과 수치는?", answer: "5", explanation: "6(0110)과 3(0011)을 XOR 연산 처리 연계하면 다른 비트 영역만 1이 되어 5(0101)가 완공됩니다." },
    { id: 865, tag: "C언어", difficulty: "Lv.1", question: "C언어 소스파일 내에서 정수 서식 입력을 대행하기 위해 결합하는 표준 입력 서식 지정 기호는?", answer: "%d", explanation: "Decimal 정수를 가리키는 %d 포맷터입니다." },
    { id: 866, tag: "C언어", difficulty: "Lv.4", question: "int a[2][3] = {{1, 2, 3}, {4, 5, 6}}; printf('%d', a[1][1]); 의 결과값은?", answer: "5", explanation: "1행 1열의 원소 위치 방에 상주한 데이터 수치인 5를 출력합니다." },
    { id: 867, tag: "C언어", difficulty: "Lv.3", question: "두 문자열의 내용을 정밀 비교하여 완벽히 일치할 때 정수 0 신호를 반환하는 표준 함수명은?", answer: "strcmp", explanation: "String Compare 약자 기출 핵심 함수입니다." },
    { id: 868, tag: "C언어", difficulty: "Lv.5", question: "인수 호출 시 변수의 메모리 실 주소를 직접 매칭 전달하여 함수 외부의 실체 데이터를 변경하게 유도하는 호출 메커니즘은?", answer: "Call by Reference", explanation: "주소 참조에 의한 호출 기법 정의입니다." },
    { id: 869, tag: "C언어", difficulty: "Lv.2", question: "switch-case 제어 흐름 구조 구역 내에서 매칭 case 동작 완료 후 하위 코드로 흘러내리지 않도록 완전히 끊어 탈출시키는 제어 키워드는?", answer: "break", explanation: "분기 제어 탈출용 break 구문 명칭입니다." },
    { id: 870, tag: "C언어", difficulty: "Lv.4", question: "int x = 10; float y = 4.0; printf('%.1f', x / y); 의 산술 결과값은?", answer: "2.5", explanation: "자동 형변환에 부합 연동되어 실수 연산 결과값 2.5를 명확히 출력 완료합니다." },
    { id: 871, tag: "C언어", difficulty: "Lv.3", question: "반복문 제어 블록 내부에서 하위의 남은 잔여 명령 구동을 일괄 생략하고 즉시 다음 회차 루프 조건문으로 점프 제어시키는 키워드는?", answer: "continue", explanation: "연속 진행 유도 키워드인 continue 명칭입니다." },
    { id: 872, tag: "C언어", difficulty: "Lv.1", question: "C언어 코딩 문법 하에서 다중 라인(여러 줄) 영역을 한 번에 주석 소거 처리하고자 할 때 쓰는 선두 묶음 기호는?", answer: "/*", explanation: "시작은 /*, 마무리는 */ 구조를 취합니다." },
    { id: 873, tag: "C언어", difficulty: "Lv.4", question: "int a = 5; int b = --a * 2; printf('%d', b); 의 전위 연산 최종 결과값은?", answer: "8", explanation: "전위 감소 연산이 우선 구동되어 a가 4가 된 후 2를 곱하므로 8이 출력 완공됩니다." },
    { id: 874, tag: "C언어", difficulty: "Lv.5", question: "함수 내부 구조에서 탈출 조건을 안전하게 수립 마킹한 후 자기 자신을 재연쇄 반복 소환 호출하는 알고리즘 패턴은?", answer: "재귀 함수", explanation: "Recursive Function(재귀 함수) 원리 기출 매칭입니다." },
    { id: 875, tag: "C언어", difficulty: "Lv.2", question: "포인터 변수 선언 완료 상태에서 어떠한 유효 주소지도 가리키고 있지 않음을 명시하는 리클래스형 상수는?", answer: "NULL", explanation: "널 포인터 지정용 상구 키워드 명칭입니다." },

    { id: 876, tag: "Java", difficulty: "Lv.4", question: "String s = 'thehada'; System.out.print(s.substring(3, 7)); 의 실행 가공 출력 결과는?", answer: "hada", explanation: "3번 인덱스(h)부터 7번 전(6번:a)까지 슬라이싱 추출하여 hada를 출력합니다." },
    { id: 877, tag: "Python", difficulty: "Lv.5", question: "a = 'Icheon'; print(a[-1:-5:-2]); 의 복합 역방향 슬라이싱 최종 출력 결과는?", answer: "nh", explanation: "인덱스 -1(n)부터 -2칸 간격으로 후퇴 추출하므로 n과 h가 출력 완공됩니다." },
    { id: 878, tag: "Java", difficulty: "Lv.4", question: "String a = 'hi'; String b = 'hi'; 일 때 상수가 저장되는 Pool 영역을 공유하므로 발생하는 주소 비교인 (a == b)의 논리 결과는? (True/False)", answer: "True", explanation: "new를 쓰지 않은 문자열 리터럴은 힙 내의 String Pool 공간 주소를 공유합니다. (2026 기출)" },
    { id: 879, tag: "Python", difficulty: "Lv.3", question: "문자 'B'를 전달했을 때 상응하는 아스키코드 정수 66 수치 신호로 일괄 변경해주는 함수는?", answer: "ord", explanation: "ord() 내장 함수 명칭 기출 적중 유형입니다." },
    { id: 880, tag: "SQL", difficulty: "Lv.5", question: "서브쿼리 실행 연산 결과 데이터 셋의 존재 유무를 확인 판별하여 메인 쿼리를 동작시키는 2026년 1회 실기 핵심 연산자는?", answer: "EXISTS", explanation: "조건 만족 실재 여부를 가려내는 EXISTS 연산자 단답형 기출입니다." },
    { id: 881, tag: "Java", difficulty: "Lv.3", question: "클래스 상속 메커니즘에서 다중 상속의 결함을 극복하기 위해 오직 추상 메서드와 상수의 규격만을 선언해놓은 자바의 구조체는?", answer: "인터페이스", explanation: "interface(인터페이스)에 대한 구조적 개념 정의 문제입니다. (기출)" },
    { id: 882, tag: "Python", difficulty: "Lv.4", question: "파이썬 리스트 구조의 순서를 전사적으로 일괄 뒤집어 역순 정렬 배치를 행하는 전용 슬라이싱 스텝 증감 기호 표기는?", answer: "::-1", explanation: "콜론 두 개와 마이너스 1 기호를 부합시켜 전체 역순 정렬 슬라이싱을 달성합니다. (기출)" },
    { id: 883, tag: "SQL", difficulty: "Lv.4", question: "두 테이블 결과 풀을 결합 조인하되, 중복 데이터 행의 유일성 압축 처리를 단행하지 않고 무조건 모두 노출 합산하는 집합 연산자는?", answer: "UNION ALL", explanation: "UNION ALL 연산자는 중복 제거 공정을 생략하여 연산 레이트가 고효율적입니다. (2026 기출)" },
    { id: 884, tag: "Python", difficulty: "Lv.2", question: "파이썬 리스트 구조 내부의 맨 우측 끝단 꼬리방 데이터를 완전히 탈출 소거해내어 반환해주는 전용 메서드는?", answer: "pop", explanation: "pop() 메서드 기본 사양 명칭입니다. (기출)" },
    { id: 885, tag: "Java", difficulty: "Lv.4", question: "String a = new String('hi'); String b = new String('hi'); 독립 인스턴스 주소 비교 연산인 (a == b)의 결과는? (True/False)", answer: "False", explanation: "new 키워드는 무조건 힙 구역에 개별 신규 메모리 방을 개설하므로 주소가 다릅니다. (기출)" },
    { id: 886, tag: "SQL", difficulty: "Lv.3", question: "LIKE 패턴 연산 매칭 전개 시 자릿수 글자 공간 제약 없이 무제한 매칭을 유도할 때 선언하는 와일드카드 문자는?", answer: "%", explanation: "퍼센트(%) 기호는 글자 수 무제한 와일드카드입니다. (기출)" },
    { id: 887, tag: "Python", difficulty: "Lv.5", question: "a = (10, 20); a[0] = 99; 구문과 같이 불변 객체 데이터 강제 수정 갱신을 행하려 할 때 인터프리터 환경에서 송출하는 현상은?", answer: "에러", explanation: "튜플(tuple)은 생성 완료 후 절대로 내부 원소 값을 오염 수정할 수 없으므로 예외 에러가 발발합니다. (기출)" },
    { id: 888, tag: "SQL", difficulty: "Lv.4", question: "기존 릴레이션 내에 상주 안착 중인 특정 속성 행 컬럼의 데이터 내용을 조건에 연동해 변경 수정하는 DML 명령어 구문은?", answer: "UPDATE", explanation: "UPDATE 테이블명 SET 컬럼=값 구조로 가동합니다. (기출)" },
    { id: 889, tag: "Java", difficulty: "Lv.5", question: "class T1 { T1(){print('1');} } class T2 extends T1 { T2(){super(); print('2');} } new T2(); 실행 시 연쇄 호출 결과는?", answer: "12", explanation: "자식 객체 인스턴스화 시 상위 부모 생성자가 항상 최선두에 강제 자동 호출 구동됩니다. (기출)" },
    { id: 890, tag: "Python", difficulty: "Lv.3", question: "십진수 정수형 아스크코드 수치를 넘겼을 때 이에 부합하는 규격 문자 데이터로 복원 디코딩해주는 파이썬 내장 함수는?", answer: "chr", explanation: "chr() 내장 함수 명칭 기출 매칭입니다." },
    { id: 891, tag: "SQL", difficulty: "Lv.4", question: "LIKE 패턴 검색 시 글자수 단 1자리 공간만을 완벽히 강제 규격화시키는 와일드카드 기호는?", answer: "_", explanation: "언더바(_) 기호는 1글자 매칭 자릿수 고정용입니다. (기출)" },
    { id: 892, tag: "Java", difficulty: "Lv.3", question: "부모로부터 상속받은 메서드를 자식 클래스 내부 규격에 맞게 내용을 완전히 재정의하여 다형성을 확보하는 객체지향 기술은?", answer: "오버라이딩", explanation: "메서드 재정의인 Overriding 개념입니다." },
    { id: 893, tag: "Python", difficulty: "Lv.4", question: "a = ['the', 'hada']; print(''.join(a)); 의 문자열 병합 최종 연산 결과물 텍스트는?", answer: "thehada", explanation: "공백 인자가 없으므로 리스트 내의 문자 데이터가 빈틈없이 매끄럽게 연결됩니다." },
    { id: 894, tag: "SQL", difficulty: "Lv.2", question: "데이터베이스 테이블 내에 상주하는 조건 만족 타겟 행 전체를 완벽히 식별 소멸 제거하는 DML 명령어는?", answer: "DELETE", explanation: "DELETE FROM 테이블명 형태로 구동하는 행 삭제 구문입니다." },
    { id: 895, tag: "Java", difficulty: "Lv.4", question: "자식 클래스의 생성자 코드 블록 구역 내에서 상위 부모 클래스의 생성자를 명시적으로 가리켜 대행 선언 호출하는 함수 구조는?", answer: "super()", explanation: "생성자 체이닝 무결성을 지키는 super() 구조식입니다." },
    { id: 896, tag: "Python", difficulty: "Lv.3", question: "a = [10, 20, 30]; print(a.index(30)); 의 가공 색인방 결과 숫자는?", answer: "2", explanation: "데이터 30이 위치한 방 번호 인덱스 값인 2를 정상 송출합니다." },
    { id: 897, tag: "SQL", difficulty: "Lv.5", question: "트랜잭션의 ACID 설계 특징 중, '하나의 트랜잭션 연산은 전사적으로 모두 성공 처리 완료되거나 아예 무효화 처리되어야 한다'는 성질은?", answer: "원자성", explanation: "All or Nothing 규칙을 따르는 Atomicity(원자성) 규칙 정의입니다." },
    { id: 898, tag: "Java", difficulty: "Lv.2", question: "자바 예외 처리 try-catch 제어 구조 하에서 오류 발생 실재 유무와는 완전 무관하게 언제나 최종 꼬리칸에서 강제 마감 구동되는 블록은?", answer: "finally", explanation: "파이널리 정리 블록 명칭입니다." },
    { id: 899, tag: "Python", difficulty: "Lv.1", question: "리스트나 문자열 객체 풀 내에 수용 상주 중인 전체 요소 데이터 개수 길이를 정수로 도출하는 함수는?", answer: "len", explanation: "len() 내장 함수 핵심 약어 명칭입니다." },
    { id: 900, tag: "SQL", difficulty: "Lv.4", question: "테이블 구조 스키마 설계를 전담 지휘하며, CREATE나 ALTER 등을 포함하는 SQL 명령어 대분류 약어 명칭은?", answer: "DDL", explanation: "Data Definition Language의 분류 약칭입니다." },

    { id: 901, tag: "C언어", difficulty: "Lv.4", question: "int a[4] = {10, 20, 30, 40}; int *p = a; printf('%d', *(p + 1) + *(p + 3)); 의 결과값은?", answer: "60", explanation: "p+1은 20, p+3은 40을 가리킵니다. 20 + 40 = 60이 출력됩니다." },
    { id: 902, tag: "C언어", difficulty: "Lv.5", question: "int sum = 0; for(int i=1; i<=5; i++) { if(i%3==0) continue; sum += i; } printf('%d', sum); 의 결과값은?", answer: "12", explanation: "1부터 5 사이의 수 중 3을 제외한 1, 2, 4, 5의 합인 12가 누적됩니다." },
    { id: 903, tag: "C언어", difficulty: "Lv.3", question: "C언어에서 문자열의 마지막을 표시하기 위해 자동으로 삽입되는 널 문자(\\0)의 아스키코드 10진수 수치는?", answer: "0", explanation: "널 문자(\\0)의 아스키코드 값은 정수 0입니다." },
    { id: 404, tag: "C언어", difficulty: "Lv.4", question: "int a = 16; printf('%d', a >> 3); 의 실행 결과 연산 수치는?", answer: "2", explanation: "오른쪽으로 3비트 시프트하면 2의 3제곱(8)으로 나눈 몫과 같습니다. 16 / 8 = 2입니다." },
    { id: 905, tag: "C언어", difficulty: "Lv.5", question: "struct Point { int *x; } s; int n = 50; s.x = &n; printf('%d', *s.x); 의 출력 결과는?", answer: "50", explanation: "구조체 멤버인 포인터 변수 x가 변수 n의 주소를 가지므로 역참조 시 50이 출력됩니다." },
    { id: 906, tag: "C언어", difficulty: "Lv.2", question: "조건식이 거짓(0)일 때 실행할 블록을 지정하는 제어문 키워드는?", answer: "else", explanation: "if문의 조건이 만족하지 않을 때 else 블록이 실행됩니다." },
    { id: 907, tag: "C언어", difficulty: "Lv.4", question: "int a = 5, b = 9; printf('%d', a | b); 의 비트 연산 결과값은?", answer: "13", explanation: "5(0101)와 9(1001)를 비트 OR 연산하면 13(1101)이 됩니다." },
    { id: 908, tag: "C언어", difficulty: "Lv.3", question: "64비트 운영체제 환경에서 double 자료형 변수의 메모리 주소값을 담는 포인터 변수의 크기는 몇 바이트인가?", answer: "8", explanation: "64비트 환경에서는 가리키는 자료형과 무관하게 모든 포인터 변수의 크기가 8바이트로 고정됩니다." },
    { id: 909, tag: "C언어", difficulty: "Lv.4", question: "char *p = 'Summer'; printf('%s', p + 4); 의 출력 결과를 쓰시오.", answer: "er", explanation: "4번 인덱스인 'e' 위치부터 문자열 종단까지 연속 출력하므로 'er'이 찍힙니다." },
    { id: 910, tag: "C언어", difficulty: "Lv.5", question: "int a = 7; int b = a-- * 2; printf('%d', b); 의 최종 후위 대입 연산 결과는?", answer: "14", explanation: "후위 연산이므로 7 * 2 = 14를 먼저 b에 대입한 후 a의 값이 6으로 감소합니다." },
    { id: 911, tag: "C언어", difficulty: "Lv.3", question: "표준 라이브러리 함수 중 하나의 문자열을 다른 문자열 뒤에 연결하여 추가하는 함수명은?", answer: "strcat", explanation: "String Concatenate의 약자입니다." },
    { id: 912, tag: "C언어", difficulty: "Lv.4", question: "int a = 20; int *p = &a; *p = *p / 4; printf('%d', a); 의 간접 참조 결과값은?", answer: "5", explanation: "포인터를 통해 원본 메모리 공간의 값을 4로 나눈 5로 변경 완료했습니다." },
    { id: 913, tag: "C언어", difficulty: "Lv.1", question: "C언어 소스 코드 내에서 하나의 라인 주석 처리를 행할 때 배치하는 기호는?", answer: "//", explanation: "한 줄 주석 기호는 // 입니다." },
    { id: 914, tag: "C언어", difficulty: "Lv.2", question: "서식 지정자 중 정수형 데이터를 16진수 대문자로 출력하기 위해 사용하는 기호는?", answer: "%X", explanation: "소문자는 %x, 대문자는 %X 포맷터를 씁니다." },
    { id: 915, tag: "C언어", difficulty: "Lv.5", question: "int f(int n) { if(n<=1) return 1; return n + f(n-1); }\nMain에서 f(4) 호출 시 최종 반환 결과값은?", answer: "10", explanation: "4 + 3 + 2 + 1 = 10을 반환하는 재귀 함수 기본 알고리즘입니다." },
    { id: 916, tag: "C언어", difficulty: "Lv.4", question: "int a = 10; int b = --a + 5; printf('%d', b); 의 전위 연산 최종 결과값은?", answer: "14", explanation: "전위 감소에 의해 a가 먼저 9가 된 후 5를 더하므로 14가 됩니다." },
    { id: 917, tag: "C언어", difficulty: "Lv.3", question: "동적 메모리 할당 함수 malloc()을 사용한 후 메모리 누수를 막기 위해 호출하는 메모리 반납 함수명은?", answer: "free", explanation: "free() 함수를 통해 할당된 힙 공간을 해제해야 합니다." },
    { id: 918, tag: "C언어", difficulty: "Lv.4", question: "int arr[3] = {5}; 배열 선언 후 초기화되지 않은 arr[1]의 값은 자동으로 무엇이 되는가?", answer: "0", explanation: "일부만 초기화된 배열의 나머지 공간은 0으로 채워집니다." },
    { id: 919, tag: "C언어", difficulty: "Lv.2", question: "서식 지정자 중 단일 문자(Character) 데이터를 출력하기 위해 사용하는 기호는?", answer: "%c", explanation: "문자는 %c, 문자열은 %s를 매칭합니다." },
    { id: 920, tag: "C언어", difficulty: "Lv.5", question: "구조체 포인터 변수가 가리키는 객체의 내부 멤버 변수에 접근할 때 사용하는 기호 연산자는?", answer: "->", explanation: "화살표 연산자(->)를 사용하여 멤버에 접근합니다." },
    { id: 921, tag: "C언어", difficulty: "Lv.3", question: "두 문자열의 전체 내용을 정밀 비교하여 완전히 동일할 때 정수 0을 반환하는 표준 함수명은?", answer: "strcmp", explanation: "String Compare의 약자인 strcmp입니다." },
    { id: 922, tag: "C언어", difficulty: "Lv.4", question: "int x = 15 % 4; printf('%d', x); 의 연산 처리 출력 결과는?", answer: "3", explanation: "15를 4로 나눈 나머지 값인 3이 출력됩니다." },
    { id: 923, tag: "C언어", difficulty: "Lv.5", question: "함수 호출 시 변수의 주소값을 인자로 전달하여 함수 외부의 원본 데이터를 직접 수정 가능케 하는 호출 방식은?", answer: "Call by Reference", explanation: "참조(주소)에 의한 호출 방식 정의입니다." },
    { id: 924, tag: "C언어", difficulty: "Lv.1", question: "C언어에서 소수점이 없는 정수를 저장하는 기본 4바이트 자료형 키워드는?", answer: "int", explanation: "integer의 약자인 int입니다." },
    { id: 925, tag: "C언어", difficulty: "Lv.4", question: "int sum = 0; for(int i=1; i<=3; i++); { sum += 1; } printf('%d', sum); 의 최종 출력값은? (for문 끝 세미콜론 주의)", answer: "1", explanation: "for문 뒤에 세미콜론이 붙어 반복문이 공문으로 종료된 후, sum += 1 블록이 단 한번만 실행되므로 1이 됩니다." },

    { id: 931, tag: "Java", difficulty: "Lv.2", question: "자바 예외 처리 try-catch 구조에서 예외 발생 여부와 상관없이 무조건 최종적으로 실행되는 정리 블록 명칭은?", answer: "finally", explanation: "자원 해제 등에 필수로 쓰이는 finally 블록입니다." },

    { id: 975, tag: "Python", difficulty: "Lv.5", question: "딕셔너리 구조 데이터 셋 내부에서 모든 Key(키) 데이터 분류 값들만 안전하게 필터링 추출해내는 메서드는?", answer: "keys", explanation: "dict.keys() 메서드 구조 명칭입니다." },

    // --- [976~1000: 파이널 실전 - SQL 및 네트워크/OS 종단 완공] ---
    { id: 976, tag: "SQL", difficulty: "Lv.5", question: "서브쿼리 실행 연산 결과 데이터 셋의 존재 유무를 확인 판별하여 메인 쿼리를 동작시키는 2026년 1회 실기 핵심 연산자는?", answer: "EXISTS", explanation: "조건 만족 실재 여부를 가려내는 EXISTS 연산자 단답형 기출입니다." },
    { id: 777, tag: "SQL", difficulty: "Lv.5", question: "두 테이블 결과 합산을 도출하되 중복 데이터 행을 소거 연산 처리하지 않고 모두 노출 출력하는 집합 연산자는?", answer: "UNION ALL", explanation: "중복 압축 정렬 처리를 배제하여 연산 속도가 매우 탁월한 합집합 연산자입니다. (기출 연계)" },
    { id: 978, tag: "SQL", difficulty: "Lv.4", question: "기존 릴레이션 내에 상주 안착 중인 특정 속성 행 컬럼의 데이터 내용을 조건에 연동해 변경 수정하는 DML 명령어 구문은?", answer: "UPDATE", explanation: "UPDATE 테이블명 SET 컬럼=값 구조로 가동합니다. (기출)" },
    { id: 979, tag: "SQL", difficulty: "Lv.4", question: "LIKE 패턴 검색 시 글자수 단 1자리 공간만을 완벽히 강제 규격화시키는 와일드카드 기호는?", answer: "_", explanation: "언더바(_) 기호는 1글자 매칭 자릿수 고정용입니다. (기출)" },
    { id: 980, tag: "SQL", difficulty: "Lv.2", question: "데이터베이스 테이블 내에 상주하는 조건 만족 타겟 행 전체를 완전히 식별 소멸 제거하는 DML 명령어는?", answer: "DELETE", explanation: "DELETE FROM 테이블명 형태로 구동하는 행 삭제 구문입니다." },
    { id: 981, tag: "SQL", difficulty: "Lv.5", question: "트랜잭션의 ACID 설계 특징 중, '하나의 트랜잭션 연산은 전사적으로 모두 성공 처리 완료되거나 아예 무효화 처리되어야 한다'는 성질은?", answer: "원자성", explanation: "All or Nothing 규칙을 따르는 Atomicity(원자성) 규칙 정의입니다." },
    { id: 982, tag: "SQL", difficulty: "Lv.4", question: "테이블 구조 스키마 설계를 전담 지휘하며, CREATE나 ALTER 등을 포함하는 SQL 명령어 대분류 약어 명칭은?", answer: "DDL", explanation: "Data Definition Language의 분류 약칭입니다." },
    { id: 983, tag: "네트워크", difficulty: "Lv.4", question: "네트워크 상에서 IP 주소를 물리적 장치 주소인 MAC 주소로 변환하는 프로토콜의 약어는?", answer: "ARP", explanation: "Address Resolution Protocol의 약자입니다. 예시문제 4번 연계 유형입니다." },
    { id: 984, tag: "Linux", difficulty: "Lv.3", question: "리눅스에서 일반 사용자가 임시로 root(관리자)의 특권을 가용하여 명령을 대행 실행하고자 할 때 문두에 선언하는 제어 키워드는?", answer: "sudo", explanation: "superuser do의 약자로 2026년 1회 실기에 완벽하게 출제된 기출 단어입니다." },
    { id: 985, tag: "Linux", difficulty: "Lv.4", question: "작업 경로가 '/var/www/html' 상태이고 목표지가 '/var/www/image' 일 때, 이동하기 위해 입력해야 하는 올바른 '상대 경로' 구조는?", answer: "../image", explanation: "..을 경유하여 부모 영역인 www로 후퇴한 후 image 폴더로 진입합니다. (2026 기출)" },
    { id: 986, tag: "Linux", difficulty: "Lv.3", question: "리눅스 터미널 명령어의 공식 도움말 문서 및 상세 사용법 사전을 열람 확인하고자 할 때 선두에 매칭시키는 명령어 명칭은?", answer: "man", explanation: "manual의 약자로 2026년 1회 실기에 가답안 복원 완료된 명령어 문항입니다." },
    { id: 987, tag: "OS", difficulty: "Lv.3", question: "프로세스가 CPU를 할당받아 실행 중이던 중, 할당된 시간(Time Slice)이 모두 초과되어 다시 준비(Ready) 상태로 전환되는 현상을 무엇이라 하는가?", answer: "타임아웃", explanation: "시분할 선점형 스케줄러 시스템에서 일어나는 상태 전이 현상입니다." },
    { id: 988, tag: "OS", difficulty: "Lv.5", question: "선점형 CPU 스케줄링의 대표적인 방식으로, 준비 대기열에 도착한 순서대로 프로세스를 할당하되 각 프로세스에게 동일한 시간 할당량(Time Quantum)을 부여하는 제어 방식은?", answer: "라운드 로빈", explanation: "Round Robin(RR) 방식은 모든 프로세스가 CPU를 공평하게 공유하도록 조절합니다." },
    { id: 989, tag: "SQL", difficulty: "Lv.4", question: "데이터베이스 테이블 생성 스키마를 설계 조율할 때, 특정 속성 행 컬럼의 값이 절대 빈 공백으로 남지 않도록 강제 유도하는 무결성 제약 명칭은?", answer: "NOT NULL", explanation: "공백 허용 불가를 지시하는 속성 제약조건 명칭입니다." },
    { id: 990, tag: "SQL", difficulty: "Lv.3", question: "특정 데이터 속성 컬럼 행 구역의 데이터가 비어있는 NULL 조건 상태인지 검사할 때 쓰는 연산자는?", answer: "IS NULL", explanation: "이퀄 기호 대신 전용 IS NULL 제어 키워드를 적용 유도해야 무결성이 유지됩니다." },
    { id: 991, tag: "SQL", difficulty: "Lv.5", question: "릴레이션 무결성 원칙 중, '외래키 값은 참조하는 상위 테이블의 기본키 값과 무조건 연동 일치하거나 완전히 비어있어야 한다'는 규칙은?", answer: "참조 무결성", explanation: "테이블 간 릴레이션십 신뢰도를 방어하는 참조 무결성(Referential Integrity) 제약입니다." },
    { id: 992, tag: "SQL", difficulty: "Lv.4", question: "서로 다른 테이블을 조인 결합할 때 매칭 조건이 불일치하더라도 우측 기준 테이블의 모든 데이터 행을 강제 무조건 노출 출력하는 외부 조인 방식은?", answer: "RIGHT JOIN", explanation: "우측 외부 조인(Right Outer Join) 공식 명칭입니다." },
    { id: 993, tag: "SQL", difficulty: "Lv.5", question: "실제 데이터를 물리 소장하지는 않으나 사용자 편의성과 내부 보안 강화를 위해 기본 테이블을 바탕으로 설계 투영하는 가상 테이블은?", answer: "뷰", explanation: "가상 논리 테이블인 View(뷰)의 명확한 정의입니다." },
    { id: 994, tag: "SQL", difficulty: "Lv.3", question: "진행 중이던 트랜잭션 도중 치명적 오류나 비결정이 도출되었을 때 작업 전 시점의 세이브포인트로 원상 복구시키는 DCL 구문은?", answer: "ROLLBACK", explanation: "작업 취소 제어 명령 구문입니다." },
    { id: 995, tag: "SQL", difficulty: "Lv.4", question: "ALTER TABLE 문을 경유하여 테이블 내부에 새로운 신규 컬럼을 삽입 장착하고자 할 때 연동 배치하는 하위 구문은?", answer: "ADD", explanation: "컬럼 추가 속성 키워드인 ADD 명칭입니다." },
    { id: 996, tag: "SQL", difficulty: "Lv.5", question: "GRANT 권한 부여 구문 전개 시, 인가받은 사용자가 타인에게 해당 권한을 재차 재연쇄 부여할 수 있도록 라이센스를 열어주는 제어 옵션은?", answer: "WITH GRANT OPTION", explanation: "권한 전파 대행 옵션 구문 명칭입니다." },
    { id: 997, tag: "SQL", difficulty: "Lv.3", question: "특정 데이터 속성의 내용 값이 NULL 상태가 아닌 유효 데이터만을 안전하게 선별 걸러내고자 할 때 적용하는 조건문은? (네 단어)", answer: "IS NOT NULL", explanation: "공백 아님을 가려내는 고정 매칭 조건식입니다." },
    { id: 998, tag: "SQL", difficulty: "Lv.4", question: "데이터 제어어 분류군을 일컫는 영문 3글자 대표 약어 약칭을 쓰시오.", answer: "DCL", explanation: "Data Control Language의 분류군 약어 명칭입니다." },
    { id: 999, tag: "SQL", difficulty: "Lv.4", question: "테이블 구조 스키마를 영구 소멸 제거하거나 데이터베이스 자체를 파괴할 때 행하는 DDL 명령어는?", answer: "DROP", explanation: "존재 자체를 날려버리는 DROP 구조 정의어 명령어입니다." },
    { id: 1000, tag: "SQL", difficulty: "Lv.5", question: "트랜잭션 ACID 특징 중, '설령 시스템 하드웨어 결함이 발발하더라도 이미 완료 확정된 트랜잭션 결과는 영구 보존 보장된다'는 특성은?", answer: "영속성", explanation: "지속성 또는 영속성을 뜻하는 Durability 원칙 정의이며, 대망의 1000번째 완공 문항입니다." }        
            


            
        ];

        let score = 0;
        let solved = 0;
        let currentExam = [];

        // 셔플 함수
        function shuffle(array) {
            let s = [...array];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

        // 시험지 생성 로직 (데이터가 적어도 멈추지 않도록 보완)
        function generateExam() {
            const totalTarget = 20; // 목표 문항 수
            
            // 난이도별 분리
            const lv1 = questionPool.filter(q => q.difficulty === "Lv.1");
            const lv2 = questionPool.filter(q => q.difficulty === "Lv.2");
            const lv3 = questionPool.filter(q => q.difficulty === "Lv.3");
            
            // 비율대로 추출 시도 (데이터가 있는 만큼만)
            let selected = [
                ...shuffle(lv1).slice(0, 12),
                ...shuffle(lv2).slice(0, 4),
                ...shuffle(lv3).slice(0, 4)
            ];

            // 만약 20개가 안 채워졌다면 난이도 무시하고 나머지도 다 긁어옴
            if (selected.length < totalTarget && selected.length < questionPool.length) {
                const usedIds = new Set(selected.map(q => q.id));
                const remaining = questionPool.filter(q => !usedIds.has(q.id));
                selected = [...selected, ...shuffle(remaining).slice(0, totalTarget - selected.length)];
            }
            
            return shuffle(selected);
        }

        function checkAnswer(idx) {
            const btn = document.getElementById(`btn-${idx}`);
            if (btn.disabled) return;

            const inputField = document.getElementById(`input-${idx}`);
            const userAns = inputField.value.trim();
            const correctAns = currentExam[idx].answer;
            const card = document.getElementById(`card-${idx}`);
            const exp = document.getElementById(`exp-${idx}`);
            const res = document.getElementById(`res-${idx}`);

            btn.disabled = true;
            inputField.disabled = true;
            solved++;
            document.getElementById('solved').innerText = solved;

            // 정답 판정 (대소문자/공백 무시)
            if(userAns.toLowerCase().replace(/\s/g, '') === correctAns.toLowerCase().replace(/\s/g, '')) {
                score++;
                card.classList.add('correct-card');
                res.innerHTML = "✅ 정답입니다!";
                res.className = "text-emerald-600 font-bold mt-3 text-sm";
            } else {
                card.classList.add('wrong-card');
                res.innerHTML = `❌ 오답 (정답: ${correctAns})`;
                res.className = "text-rose-600 font-bold mt-3 text-sm";
            }
            document.getElementById('score').innerText = score;
            exp.classList.remove('hidden');
        }

        function render() {
            currentExam = generateExam();
            document.getElementById('total-info').innerText = `${questionPool.length} 문항 중 ${currentExam.length} 문항 생성됨`;
            
            const container = document.getElementById('questions-container');
            if (currentExam.length === 0) {
                container.innerHTML = "<p class='text-center p-20 text-slate-400 font-bold'>문제를 불러올 수 없습니다. 데이터를 확인해주세요.</p>";
                return;
            }

            container.innerHTML = currentExam.map((q, idx) => `
                <div id="card-${idx}" class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm animate-in transition-all duration-300">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="text-[9px] font-black px-2 py-0.5 bg-slate-100 text-slate-400 rounded uppercase tracking-widest">${q.difficulty}</span>
                        <span class="text-blue-600 text-[10px] font-black uppercase tracking-widest">[${q.tag}]</span>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 leading-relaxed mb-6 whitespace-pre-wrap">${q.question}</h3>
                    
                    <div class="flex gap-2">
                        <input type="text" id="input-${idx}" 
                            class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold" 
                            placeholder="답안 입력 후 엔터" 
                            onkeypress="if(event.keyCode==13) checkAnswer(${idx})">
                        <button id="btn-${idx}" onclick="checkAnswer(${idx})" 
                            class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-black transition active:scale-95">확인</button>
                    </div>
                    <div id="res-${idx}"></div>
                    <div id="exp-${idx}" class="hidden mt-6 p-6 bg-slate-50 rounded-2xl text-[13px] text-slate-600 border-l-4 border-blue-600">
                        <strong class="block text-slate-400 text-[10px] font-black uppercase mb-2 tracking-widest">해설 (Explanation)</strong>
                        ${q.explanation}
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
