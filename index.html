            { id: 2, tag: "Python", difficulty: "Lv.2", question: "a = [10, 20, 30]\nb = a\nb[0] = 99\nprint(a[0]) 의 출력값은?", answer: "99", explanation: "파이썬에서 리스트는 주소(참조)를 복사하므로 b를 수정하면 a도 함께 바뀝니다." },
            { id: 3, tag: "Java", difficulty: "Lv.3", question: "Parent obj = new Child(); 호출 시 오버라이딩된 메서드가 실행되는 원리는?", answer: "동적 바인딩", explanation: "실행 시점(Runtime)에 실제 객체의 타입을 확인하여 호출할 메서드를 결정하는 원리입니다." },
            { id: 4, tag: "SQL", difficulty: "Lv.1", question: "SELECT * FROM 사원 WHERE 이름 (  ) '김%'; 빈칸에 들어갈 연산자는?", answer: "LIKE", explanation: "부분 일치 패턴을 검색할 때는 LIKE 연산자를 사용합니다." },
            { id: 5, tag: "Linux", difficulty: "Lv.1", question: "파일 권한을 755로 변경하는 명령어는? (파일명: t.txt)", answer: "chmod 755 t.txt", explanation: "chmod는 파일의 접근 권한을 변경하는 명령어입니다." },
            { id: 6, tag: "Python", difficulty: "Lv.1", question: "str = 'Icheon'; print(str[1:4]); 의 결과는?", answer: "che", explanation: "인덱스 1번부터 4번 '전'까지인 1, 2, 3번 문자를 추출합니다." },
            { id: 11, tag: "C언어", difficulty: "Lv.1", question: "int arr[3] = {10, 20, 30}; printf('%d', arr[1]); 의 출력값은?", answer: "20", explanation: "배열의 인덱스는 0부터 시작하므로 arr[1]은 두 번째 요소인 20입니다." },
            { id: 12, tag: "Java", difficulty: "Lv.2", question: "메서드의 이름은 같지만 매개변수의 타입이나 개수가 다른 것을 무엇이라 하는가?", answer: "오버로딩", explanation: "오버라이딩(재정의)과 달리 오버로딩은 같은 이름의 메서드를 여러 개 중복하여 정의하는 것입니다." },
            { id: 13, tag: "Python", difficulty: "Lv.1", question: "a = 'Hello'; print(a[-1]) 의 출력값은?", answer: "o", explanation: "파이썬에서 인덱스 -1은 문자열의 가장 마지막 문자를 의미합니다." },
            { id: 14, tag: "SQL", difficulty: "Lv.2", question: "두 테이블에서 공통된 값이 없는 데이터까지 모두 포함하여 결합하는 조인 방식은?", answer: "OUTER JOIN", explanation: "공통된 값만 결합하는 INNER JOIN과 달리, 외부 조인은 조건에 맞지 않는 데이터도 NULL로 포함하여 출력합니다." },
            { id: 15, tag: "Linux", difficulty: "Lv.1", question: "현재 디렉토리의 파일 목록을 상세히 출력하는 명령어는?", answer: "ls -l", explanation: "ls 명령어에 -l(long) 옵션을 주면 권한, 소유자, 크기 등 상세 정보를 출력합니다." },
            { id: 16, tag: "C언어", difficulty: "Lv.3", question: "int a = 10; int *p = &a; *p = 20; printf('%d', a); 의 출력값은?", answer: "20", explanation: "포인터 p가 변수 a의 주소를 가리키고 있으므로, *p에 20을 대입하면 a의 값도 20으로 변경됩니다." },
            { id: 17, tag: "Java", difficulty: "Lv.1", question: "int a = (int)3.14; 의 실행 후 a의 값은?", answer: "3", explanation: "실수형을 정수형(int)으로 강제 형변환(캐스팅)하면 소수점 이하 자리가 버려집니다." },
            { id: 18, tag: "Python", difficulty: "Lv.3", question: "print([x for x in range(5) if x % 2 == 0]) 의 출력값은?", answer: "[0, 2, 4]", explanation: "리스트 컴프리헨션을 사용하여 0부터 4까지의 숫자 중 짝수만 추출하여 리스트를 생성합니다." },
            { id: 19, tag: "SQL", difficulty: "Lv.1", question: "테이블의 구조를 정의하고 생성하는 DDL 명령어는?", answer: "CREATE", explanation: "데이터베이스나 테이블을 생성할 때는 CREATE 명령어를 사용합니다." },
            { id: 20, tag: "OS", difficulty: "Lv.2", question: "CPU 스케줄링에서 먼저 도착한 프로세스를 먼저 처리하는 알고리즘의 영문 약어는?", answer: "FCFS", explanation: "First-Come First-Served의 약자로, 준비 큐에 도착한 순서대로 CPU를 할당하는 비선점형 방식입니다." },
            { id: 21, tag: "C언어", difficulty: "Lv.1", question: "C언어에서 헤더 파일을 소스 코드에 포함시킬 때 사용하는 전처리기 지시자는?", answer: "#include", explanation: "표준 입출력 함수(printf 등)를 사용하기 위해 #include <stdio.h>와 같이 사용합니다." },
    { id: 22, tag: "C언어", difficulty: "Lv.2", question: "반복문 내에서 특정 조건일 때 남은 코드를 건너뛰고 다음 반복으로 넘어가게 하는 제어문은?", answer: "continue", explanation: "break는 반복문을 완전히 탈출하지만, continue는 현재 회차만 건너뛰고 다음 반복을 계속 진행합니다." },
    { id: 23, tag: "C언어", difficulty: "Lv.2", question: "변수 a의 메모리 시작 주소를 구하기 위해 사용하는 연산자 기호는?", answer: "&", explanation: "앰퍼샌드(&)는 주소 연산자로, scanf 함수 등에서 변수의 주소를 전달할 때 사용됩니다." },
    { id: 24, tag: "C언어", difficulty: "Lv.1", question: "int a = 10 % 3; 실행 후 a에 저장되는 값은?", answer: "1", explanation: "% 연산자는 나눗셈의 '나머지'를 구하는 연산자입니다. 10을 3으로 나눈 나머지는 1입니다." },

    { id: 25, tag: "Java", difficulty: "Lv.1", question: "자바 소스 코드(.java)를 컴파일하면 생성되는 바이트 코드 파일의 확장자는?", answer: ".class", explanation: "자바 컴파일러(javac)는 소스 코드를 자바 가상 머신(JVM)이 읽을 수 있는 .class 파일로 변환합니다." },
    { id: 26, tag: "Java", difficulty: "Lv.1", question: "클래스로부터 객체(인스턴스)를 메모리에 동적으로 생성할 때 사용하는 예약어는?", answer: "new", explanation: "new 키워드는 힙(Heap) 메모리 영역에 새로운 객체를 위한 공간을 할당합니다." },
    { id: 27, tag: "Java", difficulty: "Lv.3", question: "접근 제어자 중 '같은 패키지' 내부 또는 '상속 관계'에 있는 자식 클래스에서만 접근을 허용하는 것은?", answer: "protected", explanation: "public(모두), protected(상속+같은패키지), default(같은패키지), private(클래스내부) 순으로 범위가 좁아집니다." },
    { id: 28, tag: "Java", difficulty: "Lv.2", question: "프로그램 실행 중 발생하는 예외(Exception)를 처리하기 위해 사용하는 블록 구조는? (기본 2단어 짝꿍)", answer: "try-catch", explanation: "예외가 발생할 가능성이 있는 코드를 try 블록에 넣고, 발생 시 catch 블록에서 처리합니다." },

    { id: 29, tag: "Python", difficulty: "Lv.1", question: "파이썬에서 한 줄 주석을 작성할 때 사용하는 기호는?", answer: "#", explanation: "파이썬은 샵(#) 기호를 사용하여 코드 실행에 영향을 주지 않는 메모를 남깁니다." },
    { id: 30, tag: "Python", difficulty: "Lv.1", question: "키(Key)와 값(Value)의 쌍으로 이루어진 파이썬의 자료형을 생성할 때 사용하는 괄호 기호는?", answer: "{}", explanation: "딕셔너리(Dictionary) 자료형은 중괄호 {}를 사용하여 { 'name': 'ssumer' } 형태로 만듭니다." },
    { id: 31, tag: "Python", difficulty: "Lv.2", question: "리스트의 맨 마지막에 새로운 요소를 하나 추가할 때 사용하는 메서드는?", answer: "append", explanation: "insert(인덱스, 값)와 달리 append(값)는 항상 리스트의 가장 끝에 요소를 덧붙입니다." },
    { id: 32, tag: "Python", difficulty: "Lv.1", question: "문자열의 길이나 리스트의 전체 요소 개수를 구할 때 사용하는 내장 함수는?", answer: "len", explanation: "length의 약자인 len() 함수를 사용하여 데이터의 길이를 구합니다." },

    { id: 33, tag: "SQL", difficulty: "Lv.2", question: "SELECT 문으로 데이터를 조회할 때 중복된 값을 제거하고 한 번씩만 출력하게 하는 키워드는?", answer: "DISTINCT", explanation: "SELECT DISTINCT 컬럼명 FROM 테이블명 형식으로 사용하여 중복 행을 제거합니다." },
    { id: 34, tag: "SQL", difficulty: "Lv.1", question: "테이블에 이미 존재하는 데이터(레코드)의 내용을 수정할 때 사용하는 DML 명령어는?", answer: "UPDATE", explanation: "UPDATE 테이블명 SET 컬럼=값 WHERE 조건 형식으로 사용합니다." },
    { id: 35, tag: "SQL", difficulty: "Lv.2", question: "데이터베이스 사용자에게 특정 권한을 부여하는 DCL 명령어는?", answer: "GRANT", explanation: "권한을 부여할 때는 GRANT, 권한을 회수할 때는 REVOKE를 사용합니다." },
    { id: 36, tag: "SQL", difficulty: "Lv.2", question: "트랜잭션의 처리가 정상적으로 완료되어 메모리의 변경 사항을 데이터베이스에 영구적으로 반영하는 명령어는?", answer: "COMMIT", explanation: "작업을 취소하고 원래대로 되돌릴 때는 ROLLBACK을 사용합니다." },

    { id: 37, tag: "OS", difficulty: "Lv.1", question: "리눅스(Linux) 파일 시스템에서 가장 최상위에 있는 루트(Root) 디렉토리를 나타내는 기호는?", answer: "/", explanation: "슬래시(/)는 시스템의 절대 경로가 시작되는 최상위 기준점입니다." },
    { id: 38, tag: "Linux", difficulty: "Lv.1", question: "리눅스에서 텍스트 파일의 내용을 화면에 그대로 출력할 때 사용하는 명령어는?", answer: "cat", explanation: "concatenate의 약자로, 파일 내용을 간단히 확인할 때 자주 쓰입니다." },
    { id: 39, tag: "OS", difficulty: "Lv.3", question: "운영체제의 핵심 부분으로, 하드웨어와 응용 프로그램 사이에서 자원 관리를 담당하는 것은?", answer: "커널", explanation: "사용자가 내린 명령(Shell)을 번역하여 실제 하드웨어를 제어하는 심장부(Kernel)입니다." },
    { id: 40, tag: "OS", difficulty: "Lv.3", question: "프로세스가 준비(Ready) 상태에서 실행(Run) 상태로 전이되며 CPU를 할당받는 과정을 무엇이라 하는가?", answer: "디스패치", explanation: "스케줄러에 의해 선택된 프로세스에 CPU 제어권을 넘겨주는 작업(Dispatch)입니다." },

    { id: 41, tag: "네트워크", difficulty: "Lv.1", question: "인터넷 환경에서 웹 서버와 클라이언트(웹 브라우저) 간에 HTML 문서를 주고받기 위한 통신 규약은?", answer: "HTTP", explanation: "HyperText Transfer Protocol의 약자이며, 보안이 강화된 버전은 HTTPS입니다." },
    { id: 42, tag: "네트워크", difficulty: "Lv.3", question: "네트워크 계층의 IP 주소를 데이터 링크 계층의 물리적 주소(MAC 주소)로 변환해 주는 프로토콜은?", answer: "ARP", explanation: "Address Resolution Protocol의 약자입니다. 반대로 MAC을 IP로 바꿀 때는 RARP를 씁니다." },
    { id: 43, tag: "네트워크", difficulty: "Lv.2", question: "OSI 7계층 중 종단 간(End-to-End)의 신뢰성 있는 데이터 전송을 담당하며 TCP/UDP 프로토콜이 속한 계층은?", answer: "전송 계층", explanation: "4계층인 전송 계층(Transport Layer)은 데이터의 오류 제어와 흐름 제어를 담당합니다." },
    { id: 44, tag: "네트워크", difficulty: "Lv.2", question: "현재 가장 널리 사용되는 IP 주소 체계인 IPv4는 총 몇 비트(bit)로 구성되어 있는가?", answer: "32비트", explanation: "8비트씩 4개의 옥텟(점)으로 구분되어 총 32비트(약 43억 개)의 주소를 가집니다. 차세대 IPv6는 128비트입니다." },
    { id: 45, tag: "C언어", difficulty: "Lv.2", question: "int a=10, b=20; int *p; p=&a; *p=*p+b; printf('%d', a); 의 결과는?", answer: "30", explanation: "포인터 p가 a를 가리키므로 *p를 바꾸면 a가 바뀝니다. 10+20=30입니다." },
    { id: 46, tag: "Java", difficulty: "Lv.3", question: "자식 클래스에서 부모 클래스의 생성자를 명시적으로 호출할 때 사용하는 키워드는?", answer: "super", explanation: "super()는 부모의 생성자, super.메서드()는 부모의 메서드를 호출할 때 씁니다." },
    { id: 47, tag: "Python", difficulty: "Lv.2", question: "a = 'Programming'; print(a[2:5]); 의 결과는?", answer: "ogr", explanation: "인덱스 2번(o)부터 5번 전(4번 r)까지 추출합니다." },
    { id: 48, tag: "SQL", difficulty: "Lv.2", question: "SELECT 이름 FROM 사원 ORDER BY 이름 (  ); 내림차순 정렬 빈칸은?", answer: "DESC", explanation: "오름차순은 ASC(생략가능), 내림차순은 DESC입니다." },
    { id: 49, tag: "Linux", difficulty: "Lv.1", question: "파일의 소유자, 그룹, 기타 사용자의 권한을 변경하는 명령어는?", answer: "chmod", explanation: "Change Mode의 약자로 예시문제 2번에 등장한 필수 명령어입니다." },
    { id: 50, tag: "C언어", difficulty: "Lv.1", question: "printf('%03d', 7); 의 출력 결과는?", answer: "007", explanation: "3자리 숫자로 출력하되, 빈자리는 0으로 채우라는 뜻입니다." },

    { id: 51, tag: "C언어", difficulty: "Lv.1", question: "int a = 10; printf('%d', a--); 실행 직후 출력되는 값은?", answer: "10", explanation: "후위 감소 연산자(--)는 값을 먼저 출력하고 나중에 1을 감소시킵니다." },

    { id: 56, tag: "C언어", difficulty: "Lv.2", question: "문자열 'ABC'를 저장하기 위해 필요한 최소 배열 크기는? (바이트 단위)", answer: "4", explanation: "문자열 끝에는 항상 종료를 알리는 널 문자(\\0)가 포함되어야 합니다." },
    { id: 57, tag: "Java", difficulty: "Lv.3", question: "자식 클래스가 부모 클래스의 메서드를 호출할 때 사용하는 키워드는?", answer: "super", explanation: "super.메서드이름() 형식을 통해 부모의 기능을 호출할 수 있습니다." },
    { id: 58, tag: "Python", difficulty: "Lv.1", question: "print('3' + '4') 의 출력 결과는?", answer: "34", explanation: "문자열 간의 더하기(+)는 두 문자열을 이어 붙입니다." },
    { id: 59, tag: "SQL", difficulty: "Lv.1", question: "테이블 생성 시 컬럼이 비어있지 않도록 강제하는 제약 조건은?", answer: "NOT NULL", explanation: "데이터 입력 시 해당 컬럼에 반드시 값을 넣어야 함을 의미합니다." },
    { id: 60, tag: "네트워크", difficulty: "Lv.2", question: "비연결형 서비스로, 신뢰성보다는 속도가 중요한 실시간 스트리밍에 쓰이는 프로토콜은?", answer: "UDP", explanation: "TCP와 달리 확인 응답 절차 없이 데이터를 빠르게 전송합니다." },

    { id: 64, tag: "SQL", difficulty: "Lv.2", question: "컬럼의 값을 그룹화하여 조회할 때 사용하는 구문은?", answer: "GROUP BY", explanation: "부서별, 성별 등 특정 기준에 따라 집계 데이터를 뽑을 때 씁니다." },
    { id: 65, tag: "Linux", difficulty: "Lv.2", question: "파일 권한 중 'r-x'를 숫자로 표현하면?", answer: "5", explanation: "읽기(4) + 실행(1) = 5입니다. 쓰기(w)는 2입니다." },

    { id: 68, tag: "Python", difficulty: "Lv.1", question: "a = 7 // 2; print(a) 의 결과는?", answer: "3", explanation: "// 연산자는 나눗셈 후 소수점 이하를 버리는 '몫' 연산자입니다." },
    { id: 69, tag: "SQL", difficulty: "Lv.3", question: "뷰(View)를 삭제할 때 사용하는 명령어는?", answer: "DROP VIEW", explanation: "가상 테이블인 뷰도 DROP 명령으로 삭제합니다." },

    { id: 71, tag: "C언어", difficulty: "Lv.1", question: "printf('%%'); 를 실행하면 화면에 무엇이 출력되는가?", answer: "%", explanation: "printf에서 % 기호 자체를 출력하려면 %%를 두 번 써야 합니다." },

    { id: 364, tag: "네트워크", difficulty: "Lv.3", question: "C클래스 네트워크의 기본 서브넷 마스크 값은?", answer: "255.255.255.0", explanation: "앞의 24비트를 네트워크 주소로 사용하고 마지막 8비트를 호스트 주소로 씁니다." },
    { id: 365, tag: "네트워크", difficulty: "Lv.4", question: "OSI 7계층 중 3계층에서 사용되며, 패킷을 목적지까지 가장 빠른 경로로 안내하는 기능은?", answer: "라우팅", explanation: "라우터가 라우팅 테이블을 참조하여 최적의 경로를 설정하는 과정입니다." },
    { id: 366, tag: "네트워크", difficulty: "Lv.2", question: "랜카드에 부여된 48비트의 하위 계층 물리적 주소는?", answer: "MAC 주소", explanation: "제조사에서 부여한 하드웨어 고유 주소입니다." },
    { id: 367, tag: "네트워크", difficulty: "Lv.5", question: "송신 측이 수신 측의 처리 능력보다 많은 데이터를 보내지 못하도록 조절하는 전송 계층의 기능은?", answer: "흐름 제어", explanation: "Flow Control이라고 하며 슬라이딩 윈도우 기법 등이 쓰입니다." },
    { id: 368, tag: "네트워크", difficulty: "Lv.3", question: "TCP 통신에서 연결을 해제할 때 사용하는 절차는?", answer: "4-Way Handshaking", explanation: "연결을 시작할 때는 3-Way, 끊을 때는 4-Way 절차를 거칩니다." },
    { id: 369, tag: "네트워크", difficulty: "Lv.4", question: "OSI 7계층 중 데이터의 표현 방식이 다른 시스템 간의 통신을 위해 암호화 및 압축을 수행하는 계층은?", answer: "표현 계층", explanation: "6계층(Presentation Layer)의 핵심 역할입니다." },
    { id: 370, tag: "네트워크", difficulty: "Lv.3", question: "웹 페이지를 안전하게 전송하기 위해 HTTP에 SSL/TLS 암호화를 추가한 프로토콜은?", answer: "HTTPS", explanation: "기본 포트 번호로 443번을 사용합니다." },
    { id: 371, tag: "네트워크", difficulty: "Lv.2", question: "하나의 통신 회선을 여러 사용자가 공유할 수 있도록 하는 장치는?", answer: "다중화기", explanation: "Multiplexer(MUX)라고 부릅니다." },
    { id: 372, tag: "네트워크", difficulty: "Lv.4", question: "OSI 7계층 중 5계층으로, 송수신 측 간의 대화 구성 및 동기 제어를 담당하는 계층은?", answer: "세션 계층", explanation: "Session Layer는 프로세스 간의 연결을 관리합니다." },
    { id: 373, tag: "네트워크", difficulty: "Lv.5", question: "네트워크의 물리적 주소(MAC)를 IP 주소로 변환하는 프로토콜의 약어는?", answer: "RARP", explanation: "Reverse ARP의 약자로 ARP와 반대되는 개념입니다." },
    { id: 374, tag: "네트워크", difficulty: "Lv.3", question: "가장 짧은 경로를 선택하는 라우팅 프로토콜로, 홉(Hop) 수를 기준으로 하는 것은?", answer: "RIP", explanation: "Routing Information Protocol의 약자입니다." },
    { id: 375, tag: "네트워크", difficulty: "Lv.4", question: "데이터 전송 중 오류가 발생하면 수신 측에서 재전송을 요구하는 제어 방식은? (영문 3글자)", answer: "ARQ", explanation: "Automatic Repeat Request의 약자입니다." },
    { id: 376, tag: "네트워크", difficulty: "Lv.2", question: "인접한 노드 간에 에러 제어와 흐름 제어를 수행하여 신뢰성 있는 전송을 보장하는 2계층의 이름은?", answer: "데이터 링크 계층", explanation: "Data Link Layer입니다." },
    { id: 377, tag: "네트워크", difficulty: "Lv.3", question: "원격지의 컴퓨터에 접속하여 자신의 컴퓨터처럼 사용할 수 있도록 해주는 프로토콜은?", answer: "Telnet", explanation: "최근에는 보안 강화를 위해 SSH를 더 많이 사용합니다." },
    { id: 378, tag: "네트워크", difficulty: "Lv.5", question: "OSI 7계층 중 하위 3계층(1, 2, 3계층)을 통칭하여 무엇이라 하는가?", answer: "망 지원 계층", explanation: "데이터 전송 자체에 집중하는 계층들입니다." },
    { id: 379, tag: "네트워크", difficulty: "Lv.4", question: "인터넷 계층에서 호스트가 살아있는지 확인하기 위해 사용하는 메시지 프로토콜은?", answer: "ICMP", explanation: "Internet Control Message Protocol이며 ping 명령어가 이를 활용합니다." },
    { id: 380, tag: "네트워크", difficulty: "Lv.5", question: "사설 IP 주소를 공인 IP 주소로 변환하여 주소 부족 문제를 해결하고 보안을 강화하는 기술은?", answer: "NAT", explanation: "Network Address Translation의 약자입니다." },
    
   { id: 381, tag: "SQL", difficulty: "Lv.2", question: "SELECT * FROM 학생 WHERE 이름 LIKE '%김'; 이 쿼리가 찾는 조건은?", answer: "김으로 끝나는 이름", explanation: "%가 앞에 있으면 앞에 무엇이 오든 마지막 글자가 '김'인 데이터를 찾습니다." },
    { id: 382, tag: "SQL", difficulty: "Lv.4", question: "데이터베이스 DDL 명령어 중 테이블의 이름을 변경할 때 사용하는 구문은?", answer: "RENAME", explanation: "RENAME 원본이름 TO 새이름 형식을 주로 사용합니다." },
    { id: 383, tag: "Linux", difficulty: "Lv.3", question: "현재 디렉토리의 파일 목록을 출력하되, 숨겨진 파일까지 모두 보여주는 옵션은?", answer: "ls -a", explanation: "all의 약자인 -a 옵션을 사용하면 .으로 시작하는 숨김 파일도 보입니다." },
    { id: 384, tag: "OS", difficulty: "Lv.5", question: "CPU 스케줄링 중 짧은 작업부터 먼저 처리하여 평균 대기 시간을 최소화하는 방식의 약어는?", answer: "SJF", explanation: "Shortest Job First 스케줄링 방식입니다." },        
    { id: 385, tag: "네트워크", difficulty: "Lv.5", question: "네트워크의 물리적 주소(MAC)를 IP 주소로 변환하는 프로토콜의 약어는?", answer: "RARP", explanation: "Reverse ARP의 약자로, 자신의 IP를 모르는 단말기가 서버에 IP 주소를 요청할 때 씁니다." },
    { id: 386, tag: "네트워크", difficulty: "Lv.4", question: "TCP 연결 설정 시 3-Way Handshake에서 가장 먼저 보내는 연결 요청 비트는?", answer: "SYN", explanation: "Synchronize의 약자로 동기화 요청을 의미합니다." },
    { id: 387, tag: "네트워크", difficulty: "Lv.3", question: "인터넷 계층(3계층)에서 호스트 간 에러 보고 및 제어 메시지를 전달하는 프로토콜은?", answer: "ICMP", explanation: "Internet Control Message Protocol입니다. ping 명령어의 핵심입니다." },
    { id: 388, tag: "네트워크", difficulty: "Lv.2", question: "IP 주소를 사용하는 호스트의 이름을 IP 주소로 바꾸어주는 서비스(시스템) 명칭은?", answer: "DNS", explanation: "Domain Name System입니다. (예시문제 4번 적중 유형)" },
    { id: 389, tag: "네트워크", difficulty: "Lv.4", question: "OSI 7계층 중 전송 계층(4계층)의 데이터 전송 단위(PDU)는?", answer: "세그먼트", explanation: "Segment는 4계층의 데이터 단위입니다. (비-프-패-세 암기!)" },
    { id: 390, tag: "네트워크", difficulty: "Lv.5", question: "한정된 공인 IP 주소를 절약하기 위해 내부 사설 IP를 공인 IP로 변환하는 기술은?", answer: "NAT", explanation: "Network Address Translation의 약자입니다." },
    { id: 391, tag: "네트워크", difficulty: "Lv.3", question: "웹 서버와 웹 브라우저 간에 텍스트와 하이퍼텍스트를 전송하기 위한 표준 규약은?", answer: "HTTP", explanation: "80번 포트를 사용하는 웹 통신 규약입니다." },
    { id: 392, tag: "네트워크", difficulty: "Lv.4", question: "보안이 강화된 웹 전송 규약으로, HTTP에 SSL/TLS 암호화를 추가한 것은?", answer: "HTTPS", explanation: "443번 포트를 사용하며 보안 전송을 담당합니다." },
    { id: 393, tag: "네트워크", difficulty: "Lv.5", question: "TCP/IP 4계층 모델 중 응용 계층, 표현 계층, 세션 계층을 하나로 통합한 계층명은?", answer: "응용 계층", explanation: "TCP/IP 모델에서는 상위 3개 계층을 응용 계층(Application Layer) 하나로 봅니다." },
    { id: 394, tag: "네트워크", difficulty: "Lv.2", question: "파일을 원격지로 전송하거나 가져올 때 사용하는 표준 프로토콜은?", answer: "FTP", explanation: "File Transfer Protocol의 약자입니다." },
    { id: 395, tag: "네트워크", difficulty: "Lv.3", question: "전자 우편(E-mail)을 전송할 때 사용하는 대표적인 프로토콜은?", answer: "SMTP", explanation: "Simple Mail Transfer Protocol입니다." },
    { id: 396, tag: "네트워크", difficulty: "Lv.4", question: "메일 서버에서 사용자의 메일을 가져올 때 쓰는 프로토콜 중 메시지 일부만 미리 볼 수 있는 것은?", answer: "IMAP", explanation: "POP3와 달리 서버에 메일을 두고 동기화하며 관리합니다." },
    { id: 397, tag: "네트워크", difficulty: "Lv.2", question: "네트워크 장치들을 관리하고 모니터링하기 위해 사용하는 관리 프로토콜은?", answer: "SNMP", explanation: "Simple Network Management Protocol입니다." },
    { id: 398, tag: "네트워크", difficulty: "Lv.5", question: "OSI 7계층 중 송신 측과 수신 측 사이의 대화 구성 및 동기 제어를 담당하는 계층은?", answer: "세션 계층", explanation: "5계층(Session Layer)의 주요 기능입니다." },
    { id: 399, tag: "네트워크", difficulty: "Lv.4", question: "데이터 링크 계층(2계층)에서 에러 검출을 위해 프레임 끝에 붙이는 검사 코드는?", answer: "CRC", explanation: "Cyclic Redundancy Check(순환 중복 검사)입니다." },
    { id: 400, tag: "네트워크", difficulty: "Lv.5", question: "네트워크 상에서 IP 주소를 물리 주소(MAC)로 변환해주는 프로토콜의 약어는?", answer: "ARP", explanation: "Address Resolution Protocol입니다. (RARP와 구분 필수!)" },
       
    { id: 401, tag: "Python", difficulty: "Lv.3", question: "a = 'apple'; print(a.replace('p', 'b', 1)); 의 결과는?", answer: "abple", explanation: "replace(기존, 바꿀것, 개수)에서 1개만 바꾸도록 지정했습니다." },
    { id: 402, tag: "Python", difficulty: "Lv.4", question: "a = [10, 20, 30]; del a[1]; print(a); 의 결과는?", answer: "[10, 30]", explanation: "del 키워드는 특정 인덱스의 요소를 완전히 제거합니다." },
    { id: 403, tag: "Java", difficulty: "Lv.2", question: "String a = '123'; int b = Integer.parseInt(a); b + 1의 결과는?", answer: "124", explanation: "문자열을 정수로 변환하여 계산 가능하게 만듭니다." },
    { id: 404, tag: "Java", difficulty: "Lv.5", question: "자식 클래스 생성자에서 부모의 인자 있는 생성자를 호출하는 방법은?", answer: "super(인자)", explanation: "super()에 인자를 넣어 부모의 특정 생성자를 명시적으로 호출합니다." },
    { id: 405, tag: "Java", difficulty: "Lv.4", question: "Math.ceil(3.1); 의 결과값은? (실수형)", answer: "4.0", explanation: "ceil 함수는 소수점이 있으면 무조건 올림을 수행합니다." },

    { id: 406, tag: "C언어", difficulty: "Lv.4", question: "int a = 10; int *p = &a; *p = *p + 5; printf('%d', a); 의 결과는?", answer: "15", explanation: "포인터 p가 a의 주소를 가리키므로, *p를 수정하면 a의 원본 값이 바뀝니다." },
    { id: 407, tag: "C언어", difficulty: "Lv.5", question: "int arr[3] = {10, 20, 30}; int *p = arr; printf('%d', *(p + 2)); 의 결과는?", answer: "30", explanation: "배열 이름은 첫 번째 요소의 주소입니다. p+2는 세 번째 요소의 주소를 가리킵니다." },
    { id: 408, tag: "C언어", difficulty: "Lv.4", question: "int a = 10, b = 20; int *p; p = &a; p = &b; *p = 30; printf('%d', b); 의 결과는?", answer: "30", explanation: "포인터 p가 가리키는 대상을 a에서 b로 바꾼 뒤 값을 수정했으므로 b가 바뀝니다." },
    { id: 409, tag: "C언어", difficulty: "Lv.5", question: "char *s = 'Hello'; printf('%c', *(s + 1)); 의 결과는?", answer: "e", explanation: "문자열 포인터 s에서 +1은 두 번째 문자의 위치를 의미합니다." },

    { id: 432, tag: "Python", difficulty: "Lv.4", question: "print(chr(ord('A') + 32)); 의 결과는? (단, A는 65, a는 97)", answer: "a", explanation: "대문자 'A'의 아스키코드에 32를 더하면 소문자 'a'가 됩니다." },

    { id: 434, tag: "Java", difficulty: "Lv.5", question: "자식 클래스에서 부모의 메서드를 호출하지 않고 자신의 메서드를 호출하게 하는 재정의 기법은?", answer: "오버라이딩", explanation: "상속받은 메서드를 자식에 맞게 다시 정의하여 부모의 기능을 덮어씁니다." },

        let score = 0;
        let solved = 0;
        let currentExam = [];

        // 셔플 함수
        function shuffle(array) {
            let s = [...array];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

        // 시험지 생성 로직 (데이터가 적어도 멈추지 않도록 보완)
        function generateExam() {
            const totalTarget = 20; // 목표 문항 수
            
            // 난이도별 분리
            const lv1 = questionPool.filter(q => q.difficulty === "Lv.1");
            const lv2 = questionPool.filter(q => q.difficulty === "Lv.2");
            const lv3 = questionPool.filter(q => q.difficulty === "Lv.3");
            
            // 비율대로 추출 시도 (데이터가 있는 만큼만)
            let selected = [
                ...shuffle(lv1).slice(0, 12),
                ...shuffle(lv2).slice(0, 4),
                ...shuffle(lv3).slice(0, 4)
            ];

            // 만약 20개가 안 채워졌다면 난이도 무시하고 나머지도 다 긁어옴
            if (selected.length < totalTarget && selected.length < questionPool.length) {
                const usedIds = new Set(selected.map(q => q.id));
                const remaining = questionPool.filter(q => !usedIds.has(q.id));
                selected = [...selected, ...shuffle(remaining).slice(0, totalTarget - selected.length)];
            }
            
            return shuffle(selected);
        }

        function checkAnswer(idx) {
            const btn = document.getElementById(`btn-${idx}`);
            if (btn.disabled) return;

            const inputField = document.getElementById(`input-${idx}`);
            const userAns = inputField.value.trim();
            const correctAns = currentExam[idx].answer;
            const card = document.getElementById(`card-${idx}`);
            const exp = document.getElementById(`exp-${idx}`);
            const res = document.getElementById(`res-${idx}`);

            btn.disabled = true;
            inputField.disabled = true;
            solved++;
            document.getElementById('solved').innerText = solved;

            // 정답 판정 (대소문자/공백 무시)
            if(userAns.toLowerCase().replace(/\s/g, '') === correctAns.toLowerCase().replace(/\s/g, '')) {
                score++;
                card.classList.add('correct-card');
                res.innerHTML = "✅ 정답입니다!";
                res.className = "text-emerald-600 font-bold mt-3 text-sm";
            } else {
                card.classList.add('wrong-card');
                res.innerHTML = `❌ 오답 (정답: ${correctAns})`;
                res.className = "text-rose-600 font-bold mt-3 text-sm";
            }
            document.getElementById('score').innerText = score;
            exp.classList.remove('hidden');
        }

        function render() {
            currentExam = generateExam();
            document.getElementById('total-info').innerText = `${questionPool.length} 문항 중 ${currentExam.length} 문항 생성됨`;
            
            const container = document.getElementById('questions-container');
            if (currentExam.length === 0) {
                container.innerHTML = "<p class='text-center p-20 text-slate-400 font-bold'>문제를 불러올 수 없습니다. 데이터를 확인해주세요.</p>";
                return;
            }

            container.innerHTML = currentExam.map((q, idx) => `
                <div id="card-${idx}" class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm animate-in transition-all duration-300">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="text-[9px] font-black px-2 py-0.5 bg-slate-100 text-slate-400 rounded uppercase tracking-widest">${q.difficulty}</span>
                        <span class="text-blue-600 text-[10px] font-black uppercase tracking-widest">[${q.tag}]</span>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 leading-relaxed mb-6 whitespace-pre-wrap">${q.question}</h3>
                    
                    <div class="flex gap-2">
                        <input type="text" id="input-${idx}" 
                            class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold" 
                            placeholder="답안 입력 후 엔터" 
                            onkeypress="if(event.keyCode==13) checkAnswer(${idx})">
                        <button id="btn-${idx}" onclick="checkAnswer(${idx})" 
                            class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-black transition active:scale-95">확인</button>
                    </div>
                    <div id="res-${idx}"></div>
                    <div id="exp-${idx}" class="hidden mt-6 p-6 bg-slate-50 rounded-2xl text-[13px] text-slate-600 border-l-4 border-blue-600">
                        <strong class="block text-slate-400 text-[10px] font-black uppercase mb-2 tracking-widest">해설 (Explanation)</strong>
                        ${q.explanation}
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
