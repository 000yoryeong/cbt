<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ssumer's Programming CBT v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #F1F5F9; color: #1E293B; }
        .correct-card { border: 2px solid #10B981 !important; background-color: #F0FDF4; }
        .wrong-card { border: 2px solid #EF4444 !important; background-color: #FEF2F2; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        input:disabled { background-color: #E2E8F0; cursor: not-allowed; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <header class="sticky-header mb-12 border-b border-slate-200 pb-6 pt-4 px-6 rounded-2xl shadow-sm flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tighter">CBT 실전 문제은행</h1>
                <p id="total-info" class="text-slate-500 text-xs mt-1 font-medium">데이터 로드 중...</p>
            </div>
            <div class="flex items-center gap-6 text-right">
                <div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">현재 점수</div>
                    <div class="text-3xl font-black text-blue-600 leading-none"><span id="score">0</span> / <span id="solved">0</span></div>
                </div>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-700 transition shadow-md active:scale-95">새 시험지</button>
            </div>
        </header>

        <div id="questions-container" class="space-y-10">
            </div>

        <footer class="mt-20 mb-10 text-center text-slate-400 text-xs font-medium">
            © 2026 The Hada Project - ssumer's CBT System
        </footer>
    </div>

    <script>
        /* [데이터 섹션] 내일 이 부분을 1000개로 확장할 예정입니다 */
        const questionPool = [
            { id: 1, tag: "C언어", difficulty: "Lv.1", question: "int a = 5; printf('%d', a++); 실행 시 출력값은?", answer: "5", explanation: "후위 연산자(++)는 값을 먼저 사용(출력)한 뒤에 1을 증가시킵니다." },
            { id: 2, tag: "Java", difficulty: "Lv.2", question: "for(int i=0; i<3; i++); System.out.print(i); 출력값은?", answer: "3", explanation: "for문 뒤의 세미콜론(;) 때문에 빈 반복이 3번 진행된 후, 최종 i값인 3이 출력됩니다." },
            { id: 3, tag: "Python", difficulty: "Lv.2", question: "res = ''; for x in 'ABC': res = x + res; res의 최종값은?", answer: "CBA", explanation: "새로운 문자 x를 기존 문자열 res의 '앞'에 붙이므로 순서가 뒤집힙니다." },
            { id: 4, tag: "SQL", difficulty: "Lv.1", question: "데이터 삭제를 위한 SQL 예약어는?", answer: "DELETE", explanation: "DELETE FROM 테이블명 WHERE 조건 구조를 사용합니다." },
            { id: 5, tag: "Linux", difficulty: "Lv.1", question: "현재 작업 디렉토리의 절대 경로를 출력하는 명령어는?", answer: "pwd", explanation: "Print Working Directory의 약자입니다." },
            { id: 6, tag: "Java", difficulty: "Lv.3", question: "Parent obj = new Child(); 호출 시 Child에서 오버라이딩된 show()가 실행되는 원리는?", answer: "동적 바인딩", explanation: "실행 시점(Runtime)에 실제 객체의 타입을 확인하여 메서드를 호출하는 것을 의미합니다." }
        ];

        let score = 0;
        let solved = 0;
        let currentExam = [];

        function shuffle(array) {
            let s = [...array];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

       function generateExam() {
    // [수정] 데이터가 부족해도 일단 있는 거라도 다 보여주는 로직
    const totalNeeded = 20;
    
    // 난이도별로 최대한 뽑아봅니다.
    const lv1 = shuffle(questionPool.filter(q => q.difficulty === "Lv.1"));
    const lv2 = shuffle(questionPool.filter(q => q.difficulty === "Lv.2"));
    const lv3 = shuffle(questionPool.filter(q => q.difficulty === "Lv.3"));
    
    // 일단 난이도별로 합치고
    let combined = [...lv1.slice(0, 12), ...lv2.slice(0, 4), ...lv3.slice(0, 4)];
    
    // 만약 그래도 20개가 안 된다면? 난이도 상관없이 나머지 다 긁어모으기
    if (combined.length < totalNeeded) {
        const usedIds = new Set(combined.map(q => q.id));
        const remaining = questionPool.filter(q => !usedIds.has(q.id));
        combined = [...combined, ...shuffle(remaining).slice(0, totalNeeded - combined.length)];
    }
    
    return shuffle(combined);
}
