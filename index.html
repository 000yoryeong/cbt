            { id: 2, tag: "Python", difficulty: "Lv.2", question: "a = [10, 20, 30]\nb = a\nb[0] = 99\nprint(a[0]) 의 출력값은?", answer: "99", explanation: "파이썬에서 리스트는 주소(참조)를 복사하므로 b를 수정하면 a도 함께 바뀝니다." },
            { id: 3, tag: "Java", difficulty: "Lv.3", question: "Parent obj = new Child(); 호출 시 오버라이딩된 메서드가 실행되는 원리는?", answer: "동적 바인딩", explanation: "실행 시점(Runtime)에 실제 객체의 타입을 확인하여 호출할 메서드를 결정하는 원리입니다." },
            { id: 4, tag: "SQL", difficulty: "Lv.1", question: "SELECT * FROM 사원 WHERE 이름 (  ) '김%'; 빈칸에 들어갈 연산자는?", answer: "LIKE", explanation: "부분 일치 패턴을 검색할 때는 LIKE 연산자를 사용합니다." },
            { id: 5, tag: "Linux", difficulty: "Lv.1", question: "파일 권한을 755로 변경하는 명령어는? (파일명: t.txt)", answer: "chmod 755 t.txt", explanation: "chmod는 파일의 접근 권한을 변경하는 명령어입니다." },
            { id: 6, tag: "Python", difficulty: "Lv.1", question: "str = 'Icheon'; print(str[1:4]); 의 결과는?", answer: "che", explanation: "인덱스 1번부터 4번 '전'까지인 1, 2, 3번 문자를 추출합니다." },
            { id: 11, tag: "C언어", difficulty: "Lv.1", question: "int arr[3] = {10, 20, 30}; printf('%d', arr[1]); 의 출력값은?", answer: "20", explanation: "배열의 인덱스는 0부터 시작하므로 arr[1]은 두 번째 요소인 20입니다." },
            { id: 12, tag: "Java", difficulty: "Lv.2", question: "메서드의 이름은 같지만 매개변수의 타입이나 개수가 다른 것을 무엇이라 하는가?", answer: "오버로딩", explanation: "오버라이딩(재정의)과 달리 오버로딩은 같은 이름의 메서드를 여러 개 중복하여 정의하는 것입니다." },
            { id: 13, tag: "Python", difficulty: "Lv.1", question: "a = 'Hello'; print(a[-1]) 의 출력값은?", answer: "o", explanation: "파이썬에서 인덱스 -1은 문자열의 가장 마지막 문자를 의미합니다." },
            { id: 14, tag: "SQL", difficulty: "Lv.2", question: "두 테이블에서 공통된 값이 없는 데이터까지 모두 포함하여 결합하는 조인 방식은?", answer: "OUTER JOIN", explanation: "공통된 값만 결합하는 INNER JOIN과 달리, 외부 조인은 조건에 맞지 않는 데이터도 NULL로 포함하여 출력합니다." },
            { id: 15, tag: "Linux", difficulty: "Lv.1", question: "현재 디렉토리의 파일 목록을 상세히 출력하는 명령어는?", answer: "ls -l", explanation: "ls 명령어에 -l(long) 옵션을 주면 권한, 소유자, 크기 등 상세 정보를 출력합니다." },
            { id: 16, tag: "C언어", difficulty: "Lv.3", question: "int a = 10; int *p = &a; *p = 20; printf('%d', a); 의 출력값은?", answer: "20", explanation: "포인터 p가 변수 a의 주소를 가리키고 있으므로, *p에 20을 대입하면 a의 값도 20으로 변경됩니다." },
            { id: 17, tag: "Java", difficulty: "Lv.1", question: "int a = (int)3.14; 의 실행 후 a의 값은?", answer: "3", explanation: "실수형을 정수형(int)으로 강제 형변환(캐스팅)하면 소수점 이하 자리가 버려집니다." },
            { id: 18, tag: "Python", difficulty: "Lv.3", question: "print([x for x in range(5) if x % 2 == 0]) 의 출력값은?", answer: "[0, 2, 4]", explanation: "리스트 컴프리헨션을 사용하여 0부터 4까지의 숫자 중 짝수만 추출하여 리스트를 생성합니다." },
            { id: 19, tag: "SQL", difficulty: "Lv.1", question: "테이블의 구조를 정의하고 생성하는 DDL 명령어는?", answer: "CREATE", explanation: "데이터베이스나 테이블을 생성할 때는 CREATE 명령어를 사용합니다." },
            { id: 20, tag: "OS", difficulty: "Lv.2", question: "CPU 스케줄링에서 먼저 도착한 프로세스를 먼저 처리하는 알고리즘의 영문 약어는?", answer: "FCFS", explanation: "First-Come First-Served의 약자로, 준비 큐에 도착한 순서대로 CPU를 할당하는 비선점형 방식입니다." },
            { id: 21, tag: "C언어", difficulty: "Lv.1", question: "C언어에서 헤더 파일을 소스 코드에 포함시킬 때 사용하는 전처리기 지시자는?", answer: "#include", explanation: "표준 입출력 함수(printf 등)를 사용하기 위해 #include <stdio.h>와 같이 사용합니다." },
    { id: 22, tag: "C언어", difficulty: "Lv.2", question: "반복문 내에서 특정 조건일 때 남은 코드를 건너뛰고 다음 반복으로 넘어가게 하는 제어문은?", answer: "continue", explanation: "break는 반복문을 완전히 탈출하지만, continue는 현재 회차만 건너뛰고 다음 반복을 계속 진행합니다." },
    { id: 23, tag: "C언어", difficulty: "Lv.2", question: "변수 a의 메모리 시작 주소를 구하기 위해 사용하는 연산자 기호는?", answer: "&", explanation: "앰퍼샌드(&)는 주소 연산자로, scanf 함수 등에서 변수의 주소를 전달할 때 사용됩니다." },
    { id: 24, tag: "C언어", difficulty: "Lv.1", question: "int a = 10 % 3; 실행 후 a에 저장되는 값은?", answer: "1", explanation: "% 연산자는 나눗셈의 '나머지'를 구하는 연산자입니다. 10을 3으로 나눈 나머지는 1입니다." },

    { id: 25, tag: "Java", difficulty: "Lv.1", question: "자바 소스 코드(.java)를 컴파일하면 생성되는 바이트 코드 파일의 확장자는?", answer: ".class", explanation: "자바 컴파일러(javac)는 소스 코드를 자바 가상 머신(JVM)이 읽을 수 있는 .class 파일로 변환합니다." },
    { id: 26, tag: "Java", difficulty: "Lv.1", question: "클래스로부터 객체(인스턴스)를 메모리에 동적으로 생성할 때 사용하는 예약어는?", answer: "new", explanation: "new 키워드는 힙(Heap) 메모리 영역에 새로운 객체를 위한 공간을 할당합니다." },
    { id: 27, tag: "Java", difficulty: "Lv.3", question: "접근 제어자 중 '같은 패키지' 내부 또는 '상속 관계'에 있는 자식 클래스에서만 접근을 허용하는 것은?", answer: "protected", explanation: "public(모두), protected(상속+같은패키지), default(같은패키지), private(클래스내부) 순으로 범위가 좁아집니다." },
    { id: 28, tag: "Java", difficulty: "Lv.2", question: "프로그램 실행 중 발생하는 예외(Exception)를 처리하기 위해 사용하는 블록 구조는? (기본 2단어 짝꿍)", answer: "try-catch", explanation: "예외가 발생할 가능성이 있는 코드를 try 블록에 넣고, 발생 시 catch 블록에서 처리합니다." },

    { id: 29, tag: "Python", difficulty: "Lv.1", question: "파이썬에서 한 줄 주석을 작성할 때 사용하는 기호는?", answer: "#", explanation: "파이썬은 샵(#) 기호를 사용하여 코드 실행에 영향을 주지 않는 메모를 남깁니다." },
    { id: 30, tag: "Python", difficulty: "Lv.1", question: "키(Key)와 값(Value)의 쌍으로 이루어진 파이썬의 자료형을 생성할 때 사용하는 괄호 기호는?", answer: "{}", explanation: "딕셔너리(Dictionary) 자료형은 중괄호 {}를 사용하여 { 'name': 'ssumer' } 형태로 만듭니다." },
    { id: 31, tag: "Python", difficulty: "Lv.2", question: "리스트의 맨 마지막에 새로운 요소를 하나 추가할 때 사용하는 메서드는?", answer: "append", explanation: "insert(인덱스, 값)와 달리 append(값)는 항상 리스트의 가장 끝에 요소를 덧붙입니다." },
    { id: 32, tag: "Python", difficulty: "Lv.1", question: "문자열의 길이나 리스트의 전체 요소 개수를 구할 때 사용하는 내장 함수는?", answer: "len", explanation: "length의 약자인 len() 함수를 사용하여 데이터의 길이를 구합니다." },

    { id: 33, tag: "SQL", difficulty: "Lv.2", question: "SELECT 문으로 데이터를 조회할 때 중복된 값을 제거하고 한 번씩만 출력하게 하는 키워드는?", answer: "DISTINCT", explanation: "SELECT DISTINCT 컬럼명 FROM 테이블명 형식으로 사용하여 중복 행을 제거합니다." },
    { id: 34, tag: "SQL", difficulty: "Lv.1", question: "테이블에 이미 존재하는 데이터(레코드)의 내용을 수정할 때 사용하는 DML 명령어는?", answer: "UPDATE", explanation: "UPDATE 테이블명 SET 컬럼=값 WHERE 조건 형식으로 사용합니다." },
    { id: 35, tag: "SQL", difficulty: "Lv.2", question: "데이터베이스 사용자에게 특정 권한을 부여하는 DCL 명령어는?", answer: "GRANT", explanation: "권한을 부여할 때는 GRANT, 권한을 회수할 때는 REVOKE를 사용합니다." },
    { id: 36, tag: "SQL", difficulty: "Lv.2", question: "트랜잭션의 처리가 정상적으로 완료되어 메모리의 변경 사항을 데이터베이스에 영구적으로 반영하는 명령어는?", answer: "COMMIT", explanation: "작업을 취소하고 원래대로 되돌릴 때는 ROLLBACK을 사용합니다." },

    { id: 37, tag: "OS", difficulty: "Lv.1", question: "리눅스(Linux) 파일 시스템에서 가장 최상위에 있는 루트(Root) 디렉토리를 나타내는 기호는?", answer: "/", explanation: "슬래시(/)는 시스템의 절대 경로가 시작되는 최상위 기준점입니다." },
    { id: 38, tag: "Linux", difficulty: "Lv.1", question: "리눅스에서 텍스트 파일의 내용을 화면에 그대로 출력할 때 사용하는 명령어는?", answer: "cat", explanation: "concatenate의 약자로, 파일 내용을 간단히 확인할 때 자주 쓰입니다." },
    { id: 39, tag: "OS", difficulty: "Lv.3", question: "운영체제의 핵심 부분으로, 하드웨어와 응용 프로그램 사이에서 자원 관리를 담당하는 것은?", answer: "커널", explanation: "사용자가 내린 명령(Shell)을 번역하여 실제 하드웨어를 제어하는 심장부(Kernel)입니다." },
    { id: 40, tag: "OS", difficulty: "Lv.3", question: "프로세스가 준비(Ready) 상태에서 실행(Run) 상태로 전이되며 CPU를 할당받는 과정을 무엇이라 하는가?", answer: "디스패치", explanation: "스케줄러에 의해 선택된 프로세스에 CPU 제어권을 넘겨주는 작업(Dispatch)입니다." },

    { id: 41, tag: "네트워크", difficulty: "Lv.1", question: "인터넷 환경에서 웹 서버와 클라이언트(웹 브라우저) 간에 HTML 문서를 주고받기 위한 통신 규약은?", answer: "HTTP", explanation: "HyperText Transfer Protocol의 약자이며, 보안이 강화된 버전은 HTTPS입니다." },
    { id: 42, tag: "네트워크", difficulty: "Lv.3", question: "네트워크 계층의 IP 주소를 데이터 링크 계층의 물리적 주소(MAC 주소)로 변환해 주는 프로토콜은?", answer: "ARP", explanation: "Address Resolution Protocol의 약자입니다. 반대로 MAC을 IP로 바꿀 때는 RARP를 씁니다." },
    { id: 43, tag: "네트워크", difficulty: "Lv.2", question: "OSI 7계층 중 종단 간(End-to-End)의 신뢰성 있는 데이터 전송을 담당하며 TCP/UDP 프로토콜이 속한 계층은?", answer: "전송 계층", explanation: "4계층인 전송 계층(Transport Layer)은 데이터의 오류 제어와 흐름 제어를 담당합니다." },
    { id: 44, tag: "네트워크", difficulty: "Lv.2", question: "현재 가장 널리 사용되는 IP 주소 체계인 IPv4는 총 몇 비트(bit)로 구성되어 있는가?", answer: "32비트", explanation: "8비트씩 4개의 옥텟(점)으로 구분되어 총 32비트(약 43억 개)의 주소를 가집니다. 차세대 IPv6는 128비트입니다." },
    { id: 45, tag: "C언어", difficulty: "Lv.2", question: "int a=10, b=20; int *p; p=&a; *p=*p+b; printf('%d', a); 의 결과는?", answer: "30", explanation: "포인터 p가 a를 가리키므로 *p를 바꾸면 a가 바뀝니다. 10+20=30입니다." },
    { id: 46, tag: "Java", difficulty: "Lv.3", question: "자식 클래스에서 부모 클래스의 생성자를 명시적으로 호출할 때 사용하는 키워드는?", answer: "super", explanation: "super()는 부모의 생성자, super.메서드()는 부모의 메서드를 호출할 때 씁니다." },
    { id: 47, tag: "Python", difficulty: "Lv.2", question: "a = 'Programming'; print(a[2:5]); 의 결과는?", answer: "ogr", explanation: "인덱스 2번(o)부터 5번 전(4번 r)까지 추출합니다." },
    { id: 48, tag: "SQL", difficulty: "Lv.2", question: "SELECT 이름 FROM 사원 ORDER BY 이름 (  ); 내림차순 정렬 빈칸은?", answer: "DESC", explanation: "오름차순은 ASC(생략가능), 내림차순은 DESC입니다." },
    { id: 49, tag: "Linux", difficulty: "Lv.1", question: "파일의 소유자, 그룹, 기타 사용자의 권한을 변경하는 명령어는?", answer: "chmod", explanation: "Change Mode의 약자로 예시문제 2번에 등장한 필수 명령어입니다." },
    { id: 50, tag: "C언어", difficulty: "Lv.1", question: "printf('%03d', 7); 의 출력 결과는?", answer: "007", explanation: "3자리 숫자로 출력하되, 빈자리는 0으로 채우라는 뜻입니다." },

    { id: 51, tag: "C언어", difficulty: "Lv.1", question: "int a = 10; printf('%d', a--); 실행 직후 출력되는 값은?", answer: "10", explanation: "후위 감소 연산자(--)는 값을 먼저 출력하고 나중에 1을 감소시킵니다." },

    { id: 56, tag: "C언어", difficulty: "Lv.2", question: "문자열 'ABC'를 저장하기 위해 필요한 최소 배열 크기는? (바이트 단위)", answer: "4", explanation: "문자열 끝에는 항상 종료를 알리는 널 문자(\\0)가 포함되어야 합니다." },
    { id: 57, tag: "Java", difficulty: "Lv.3", question: "자식 클래스가 부모 클래스의 메서드를 호출할 때 사용하는 키워드는?", answer: "super", explanation: "super.메서드이름() 형식을 통해 부모의 기능을 호출할 수 있습니다." },
    { id: 58, tag: "Python", difficulty: "Lv.1", question: "print('3' + '4') 의 출력 결과는?", answer: "34", explanation: "문자열 간의 더하기(+)는 두 문자열을 이어 붙입니다." },
    { id: 59, tag: "SQL", difficulty: "Lv.1", question: "테이블 생성 시 컬럼이 비어있지 않도록 강제하는 제약 조건은?", answer: "NOT NULL", explanation: "데이터 입력 시 해당 컬럼에 반드시 값을 넣어야 함을 의미합니다." },
    { id: 60, tag: "네트워크", difficulty: "Lv.2", question: "비연결형 서비스로, 신뢰성보다는 속도가 중요한 실시간 스트리밍에 쓰이는 프로토콜은?", answer: "UDP", explanation: "TCP와 달리 확인 응답 절차 없이 데이터를 빠르게 전송합니다." },

    { id: 64, tag: "SQL", difficulty: "Lv.2", question: "컬럼의 값을 그룹화하여 조회할 때 사용하는 구문은?", answer: "GROUP BY", explanation: "부서별, 성별 등 특정 기준에 따라 집계 데이터를 뽑을 때 씁니다." },
    { id: 65, tag: "Linux", difficulty: "Lv.2", question: "파일 권한 중 'r-x'를 숫자로 표현하면?", answer: "5", explanation: "읽기(4) + 실행(1) = 5입니다. 쓰기(w)는 2입니다." },

    { id: 68, tag: "Python", difficulty: "Lv.1", question: "a = 7 // 2; print(a) 의 결과는?", answer: "3", explanation: "// 연산자는 나눗셈 후 소수점 이하를 버리는 '몫' 연산자입니다." },
    { id: 69, tag: "SQL", difficulty: "Lv.3", question: "뷰(View)를 삭제할 때 사용하는 명령어는?", answer: "DROP VIEW", explanation: "가상 테이블인 뷰도 DROP 명령으로 삭제합니다." },

    { id: 71, tag: "C언어", difficulty: "Lv.1", question: "printf('%%'); 를 실행하면 화면에 무엇이 출력되는가?", answer: "%", explanation: "printf에서 % 기호 자체를 출력하려면 %%를 두 번 써야 합니다." },

    { id: 363, tag: "네트워크", difficulty: "Lv.5", question: "IP 주소에서 네트워크 부분과 호스트 부분을 구분하기 위해 사용하는 마스크는?", answer: "서브넷 마스크", explanation: "IP 주소와 AND 연산을 통해 해당 IP가 속한 네트워크 주소를 추출합니다." },
    { id: 364, tag: "네트워크", difficulty: "Lv.3", question: "C클래스 네트워크의 기본 서브넷 마스크 값은?", answer: "255.255.255.0", explanation: "앞의 24비트를 네트워크 주소로 사용하고 마지막 8비트를 호스트 주소로 씁니다." },
    { id: 365, tag: "네트워크", difficulty: "Lv.4", question: "OSI 7계층 중 3계층에서 사용되며, 패킷을 목적지까지 가장 빠른 경로로 안내하는 기능은?", answer: "라우팅", explanation: "라우터가 라우팅 테이블을 참조하여 최적의 경로를 설정하는 과정입니다." },
    { id: 366, tag: "네트워크", difficulty: "Lv.2", question: "랜카드에 부여된 48비트의 하위 계층 물리적 주소는?", answer: "MAC 주소", explanation: "제조사에서 부여한 하드웨어 고유 주소입니다." },
    { id: 367, tag: "네트워크", difficulty: "Lv.5", question: "송신 측이 수신 측의 처리 능력보다 많은 데이터를 보내지 못하도록 조절하는 전송 계층의 기능은?", answer: "흐름 제어", explanation: "Flow Control이라고 하며 슬라이딩 윈도우 기법 등이 쓰입니다." },
    { id: 368, tag: "네트워크", difficulty: "Lv.3", question: "TCP 통신에서 연결을 해제할 때 사용하는 절차는?", answer: "4-Way Handshaking", explanation: "연결을 시작할 때는 3-Way, 끊을 때는 4-Way 절차를 거칩니다." },
    { id: 369, tag: "네트워크", difficulty: "Lv.4", question: "OSI 7계층 중 데이터의 표현 방식이 다른 시스템 간의 통신을 위해 암호화 및 압축을 수행하는 계층은?", answer: "표현 계층", explanation: "6계층(Presentation Layer)의 핵심 역할입니다." },
    { id: 370, tag: "네트워크", difficulty: "Lv.3", question: "웹 페이지를 안전하게 전송하기 위해 HTTP에 SSL/TLS 암호화를 추가한 프로토콜은?", answer: "HTTPS", explanation: "기본 포트 번호로 443번을 사용합니다." },
    { id: 371, tag: "네트워크", difficulty: "Lv.2", question: "하나의 통신 회선을 여러 사용자가 공유할 수 있도록 하는 장치는?", answer: "다중화기", explanation: "Multiplexer(MUX)라고 부릅니다." },
    { id: 372, tag: "네트워크", difficulty: "Lv.4", question: "OSI 7계층 중 5계층으로, 송수신 측 간의 대화 구성 및 동기 제어를 담당하는 계층은?", answer: "세션 계층", explanation: "Session Layer는 프로세스 간의 연결을 관리합니다." },
    { id: 373, tag: "네트워크", difficulty: "Lv.5", question: "네트워크의 물리적 주소(MAC)를 IP 주소로 변환하는 프로토콜의 약어는?", answer: "RARP", explanation: "Reverse ARP의 약자로 ARP와 반대되는 개념입니다." },
    { id: 374, tag: "네트워크", difficulty: "Lv.3", question: "가장 짧은 경로를 선택하는 라우팅 프로토콜로, 홉(Hop) 수를 기준으로 하는 것은?", answer: "RIP", explanation: "Routing Information Protocol의 약자입니다." },
    { id: 375, tag: "네트워크", difficulty: "Lv.4", question: "데이터 전송 중 오류가 발생하면 수신 측에서 재전송을 요구하는 제어 방식은? (영문 3글자)", answer: "ARQ", explanation: "Automatic Repeat Request의 약자입니다." },
    { id: 376, tag: "네트워크", difficulty: "Lv.2", question: "인접한 노드 간에 에러 제어와 흐름 제어를 수행하여 신뢰성 있는 전송을 보장하는 2계층의 이름은?", answer: "데이터 링크 계층", explanation: "Data Link Layer입니다." },
    { id: 377, tag: "네트워크", difficulty: "Lv.3", question: "원격지의 컴퓨터에 접속하여 자신의 컴퓨터처럼 사용할 수 있도록 해주는 프로토콜은?", answer: "Telnet", explanation: "최근에는 보안 강화를 위해 SSH를 더 많이 사용합니다." },
    { id: 378, tag: "네트워크", difficulty: "Lv.5", question: "OSI 7계층 중 하위 3계층(1, 2, 3계층)을 통칭하여 무엇이라 하는가?", answer: "망 지원 계층", explanation: "데이터 전송 자체에 집중하는 계층들입니다." },
    { id: 379, tag: "네트워크", difficulty: "Lv.4", question: "인터넷 계층에서 호스트가 살아있는지 확인하기 위해 사용하는 메시지 프로토콜은?", answer: "ICMP", explanation: "Internet Control Message Protocol이며 ping 명령어가 이를 활용합니다." },
    { id: 380, tag: "네트워크", difficulty: "Lv.5", question: "사설 IP 주소를 공인 IP 주소로 변환하여 주소 부족 문제를 해결하고 보안을 강화하는 기술은?", answer: "NAT", explanation: "Network Address Translation의 약자입니다." },
    
   { id: 381, tag: "SQL", difficulty: "Lv.2", question: "SELECT * FROM 학생 WHERE 이름 LIKE '%김'; 이 쿼리가 찾는 조건은?", answer: "김으로 끝나는 이름", explanation: "%가 앞에 있으면 앞에 무엇이 오든 마지막 글자가 '김'인 데이터를 찾습니다." },
    { id: 382, tag: "SQL", difficulty: "Lv.4", question: "데이터베이스 DDL 명령어 중 테이블의 이름을 변경할 때 사용하는 구문은?", answer: "RENAME", explanation: "RENAME 원본이름 TO 새이름 형식을 주로 사용합니다." },
    { id: 383, tag: "Linux", difficulty: "Lv.3", question: "현재 디렉토리의 파일 목록을 출력하되, 숨겨진 파일까지 모두 보여주는 옵션은?", answer: "ls -a", explanation: "all의 약자인 -a 옵션을 사용하면 .으로 시작하는 숨김 파일도 보입니다." },
    { id: 384, tag: "OS", difficulty: "Lv.5", question: "CPU 스케줄링 중 짧은 작업부터 먼저 처리하여 평균 대기 시간을 최소화하는 방식의 약어는?", answer: "SJF", explanation: "Shortest Job First 스케줄링 방식입니다." },        
    { id: 385, tag: "네트워크", difficulty: "Lv.5", question: "네트워크의 물리적 주소(MAC)를 IP 주소로 변환하는 프로토콜의 약어는?", answer: "RARP", explanation: "Reverse ARP의 약자로, 자신의 IP를 모르는 단말기가 서버에 IP 주소를 요청할 때 씁니다." },
    { id: 386, tag: "네트워크", difficulty: "Lv.4", question: "TCP 연결 설정 시 3-Way Handshake에서 가장 먼저 보내는 연결 요청 비트는?", answer: "SYN", explanation: "Synchronize의 약자로 동기화 요청을 의미합니다." },
    { id: 387, tag: "네트워크", difficulty: "Lv.3", question: "인터넷 계층(3계층)에서 호스트 간 에러 보고 및 제어 메시지를 전달하는 프로토콜은?", answer: "ICMP", explanation: "Internet Control Message Protocol입니다. ping 명령어의 핵심입니다." },
    { id: 388, tag: "네트워크", difficulty: "Lv.2", question: "IP 주소를 사용하는 호스트의 이름을 IP 주소로 바꾸어주는 서비스(시스템) 명칭은?", answer: "DNS", explanation: "Domain Name System입니다. (예시문제 4번 적중 유형)" },
    { id: 389, tag: "네트워크", difficulty: "Lv.4", question: "OSI 7계층 중 전송 계층(4계층)의 데이터 전송 단위(PDU)는?", answer: "세그먼트", explanation: "Segment는 4계층의 데이터 단위입니다. (비-프-패-세 암기!)" },
    { id: 390, tag: "네트워크", difficulty: "Lv.5", question: "한정된 공인 IP 주소를 절약하기 위해 내부 사설 IP를 공인 IP로 변환하는 기술은?", answer: "NAT", explanation: "Network Address Translation의 약자입니다." },
    { id: 391, tag: "네트워크", difficulty: "Lv.3", question: "웹 서버와 웹 브라우저 간에 텍스트와 하이퍼텍스트를 전송하기 위한 표준 규약은?", answer: "HTTP", explanation: "80번 포트를 사용하는 웹 통신 규약입니다." },
    { id: 392, tag: "네트워크", difficulty: "Lv.4", question: "보안이 강화된 웹 전송 규약으로, HTTP에 SSL/TLS 암호화를 추가한 것은?", answer: "HTTPS", explanation: "443번 포트를 사용하며 보안 전송을 담당합니다." },
    { id: 393, tag: "네트워크", difficulty: "Lv.5", question: "TCP/IP 4계층 모델 중 응용 계층, 표현 계층, 세션 계층을 하나로 통합한 계층명은?", answer: "응용 계층", explanation: "TCP/IP 모델에서는 상위 3개 계층을 응용 계층(Application Layer) 하나로 봅니다." },
    { id: 394, tag: "네트워크", difficulty: "Lv.2", question: "파일을 원격지로 전송하거나 가져올 때 사용하는 표준 프로토콜은?", answer: "FTP", explanation: "File Transfer Protocol의 약자입니다." },
    { id: 395, tag: "네트워크", difficulty: "Lv.3", question: "전자 우편(E-mail)을 전송할 때 사용하는 대표적인 프로토콜은?", answer: "SMTP", explanation: "Simple Mail Transfer Protocol입니다." },
    { id: 396, tag: "네트워크", difficulty: "Lv.4", question: "메일 서버에서 사용자의 메일을 가져올 때 쓰는 프로토콜 중 메시지 일부만 미리 볼 수 있는 것은?", answer: "IMAP", explanation: "POP3와 달리 서버에 메일을 두고 동기화하며 관리합니다." },
    { id: 397, tag: "네트워크", difficulty: "Lv.2", question: "네트워크 장치들을 관리하고 모니터링하기 위해 사용하는 관리 프로토콜은?", answer: "SNMP", explanation: "Simple Network Management Protocol입니다." },
    { id: 398, tag: "네트워크", difficulty: "Lv.5", question: "OSI 7계층 중 송신 측과 수신 측 사이의 대화 구성 및 동기 제어를 담당하는 계층은?", answer: "세션 계층", explanation: "5계층(Session Layer)의 주요 기능입니다." },
    { id: 399, tag: "네트워크", difficulty: "Lv.4", question: "데이터 링크 계층(2계층)에서 에러 검출을 위해 프레임 끝에 붙이는 검사 코드는?", answer: "CRC", explanation: "Cyclic Redundancy Check(순환 중복 검사)입니다." },
    { id: 400, tag: "네트워크", difficulty: "Lv.5", question: "네트워크 상에서 IP 주소를 물리 주소(MAC)로 변환해주는 프로토콜의 약어는?", answer: "ARP", explanation: "Address Resolution Protocol입니다. (RARP와 구분 필수!)" },
       
   { id: 401, tag: "Python", difficulty: "Lv.3", question: "a = 'apple'; print(a.replace('p', 'b', 1)); 의 결과는?", answer: "abple", explanation: "replace(기존, 바꿀것, 개수)에서 1개만 바꾸도록 지정했습니다." },
    { id: 402, tag: "Python", difficulty: "Lv.4", question: "a = [10, 20, 30]; del a[1]; print(a); 의 결과는?", answer: "[10, 30]", explanation: "del 키워드는 특정 인덱스의 요소를 완전히 제거합니다." },
    { id: 403, tag: "Java", difficulty: "Lv.2", question: "String a = '123'; int b = Integer.parseInt(a); b + 1의 결과는?", answer: "124", explanation: "문자열을 정수로 변환하여 계산 가능하게 만듭니다." },
    { id: 404, tag: "Java", difficulty: "Lv.5", question: "자식 클래스 생성자에서 부모의 인자 있는 생성자를 호출하는 방법은?", answer: "super(인자)", explanation: "super()에 인자를 넣어 부모의 특정 생성자를 명시적으로 호출합니다." },
    { id: 405, tag: "Java", difficulty: "Lv.4", question: "Math.ceil(3.1); 의 결과값은? (실수형)", answer: "4.0", explanation: "ceil 함수는 소수점이 있으면 무조건 올림을 수행합니다." },
    { id: 406, tag: "C언어", difficulty: "Lv.4", question: "int a = 10; int *p = &a; *p = *p + 5; printf('%d', a); 의 결과는?", answer: "15", explanation: "포인터 p가 a의 주소를 가리키므로, *p를 수정하면 a의 원본 값이 바뀝니다." },
    { id: 407, tag: "C언어", difficulty: "Lv.5", question: "int arr[3] = {10, 20, 30}; int *p = arr; printf('%d', *(p + 2)); 의 결과는?", answer: "30", explanation: "배열 이름은 첫 번째 요소의 주소입니다. p+2는 세 번째 요소의 주소를 가리킵니다." },
    { id: 408, tag: "C언어", difficulty: "Lv.4", question: "int a = 10, b = 20; int *p; p = &a; p = &b; *p = 30; printf('%d', b); 의 결과는?", answer: "30", explanation: "포인터 p가 가리키는 대상을 a에서 b로 바꾼 뒤 값을 수정했으므로 b가 바뀝니다." },
    { id: 409, tag: "C언어", difficulty: "Lv.5", question: "char *s = 'Hello'; printf('%c', *(s + 1)); 의 결과는?", answer: "e", explanation: "문자열 포인터 s에서 +1은 두 번째 문자의 위치를 의미합니다." },
    { id: 410, tag: "C언어", difficulty: "Lv.4", question: "void swap(int *a, int *b) { int t=*a; *a=*b; *b=t; } 호출 방식은?", answer: "Call by Reference", explanation: "주소값을 전달하여 함수 외부의 변수 값을 직접 변경하는 방식입니다." },
    { id: 411, tag: "C언어", difficulty: "Lv.4", question: "int a[3] = {1, 2, 3}; printf('%d', *(a + 1)); 의 결과는?", answer: "2", explanation: "배열명 a는 주소이며, +1은 다음 요소의 위치를 가리킵니다." },
    { id: 412, tag: "C언어", difficulty: "Lv.5", question: "int a = 10; int *p = &a; int **pp = &p; **pp의 값은?", answer: "10", explanation: "이중 포인터 pp가 가리키는 p가 가리키는 변수 a의 값을 가져옵니다." },
    { id: 413, tag: "C언어", difficulty: "Lv.3", question: "포인터 변수를 선언할 때 사용하는 기호는?", answer: "*", explanation: "데이터 타입 뒤에 별표(*)를 붙여 포인터임을 명시합니다." },
    { id: 414, tag: "C언어", difficulty: "Lv.4", question: "char *s = 'Star'; printf('%c', *s); 의 결과는?", answer: "S", explanation: "문자열 포인터는 문자열의 첫 번째 글자 주소를 가집니다." },
    { id: 415, tag: "C언어", difficulty: "Lv.5", question: "struct Pt { int x, y; } p = {10, 20}; struct Pt *ptr = &p; ptr->x의 값은?", answer: "10", explanation: "구조체 포인터에서 멤버에 접근할 때는 화살표(->) 연산자를 씁니다." },
    { id: 416, tag: "C언어", difficulty: "Lv.4", question: "int a = 5; int *p = &a; a = a + *p; printf('%d', a); 의 결과는?", answer: "10", explanation: "a의 값 5에 p가 가리키는 값(*p=5)을 더해 10이 됩니다." },
    { id: 417, tag: "C언어", difficulty: "Lv.3", question: "변수의 메모리 주소값을 얻기 위해 사용하는 연산자 기호는?", answer: "&", explanation: "앰퍼샌드(&)는 주소 연산자입니다." },
    { id: 418, tag: "C언어", difficulty: "Lv.4", question: "int arr[5]; sizeof(arr) / sizeof(int) 의 결과값은?", answer: "5", explanation: "배열 전체 크기를 자료형 크기로 나누어 요소 개수를 구하는 공식입니다." },
    { id: 419, tag: "C언어", difficulty: "Lv.5", question: "함수 호출 시 주소를 전달하여 원본을 수정하는 방식은?", answer: "Call by Reference", explanation: "참조에 의한 호출 방식입니다." },
    { id: 420, tag: "C언어", difficulty: "Lv.2", question: "포인터 변수에 아무것도 가리키지 않음을 뜻하는 상수는?", answer: "NULL", explanation: "유효하지 않은 주소임을 나타냅니다." },

    { id: 501, tag: "C언어", difficulty: "Lv.3", question: "int a=10, b=20; if(a=b) printf('참'); else printf('거짓'); 의 출력 결과는?", answer: "참", explanation: "비교 연산자(==)가 아닌 대입 연산자(=)가 사용되어 a에 20이 들어가고, 이는 참(0이 아닌 값)으로 인식됩니다." },

    { id: 503, tag: "C언어", difficulty: "Lv.2", question: "반복문 내부에서 조건에 상관없이 가장 가까운 반복문을 완전히 빠져나갈 때 사용하는 키워드는?", answer: "break", explanation: "break문은 switch문이나 반복문을 탈출할 때 사용합니다." },
    { id: 504, tag: "C언어", difficulty: "Lv.3", question: "반복문에서 다음 루프(조건 검사 위치)로 바로 건너뛰게 만드는 키워드는?", answer: "continue", explanation: "continue문 이하의 코드를 실행하지 않고 다음 반복 회차로 넘어갑니다." },
    { id: 505, tag: "C언어", difficulty: "Lv.5", question: "int a[3] = {1, 2, 3}; int *p = a; printf('%d', *p++); 의 출력 결과는?", answer: "1", explanation: "후위 연산이므로 현재 *p 값인 1을 먼저 출력한 뒤, 포인터 주소 p가 다음 칸으로 증가합니다." },
    { id: 506, tag: "C언어", difficulty: "Lv.4", question: "int a = 5; printf('%d', a >> 1); 의 실행 결과는?", answer: "2", explanation: "오른쪽 시프트 연산은 2로 나눈 몫과 같습니다. 5를 2로 나누면 2가 됩니다." },
    { id: 507, tag: "C언어", difficulty: "Lv.1", question: "화면에 문자열을 포맷에 맞춰 출력하는 C언어의 표준 출력 함수는?", answer: "printf", explanation: "print formatted의 약자입니다." },
    { id: 508, tag: "C언어", difficulty: "Lv.2", question: "나머지를 구하는 연산자 기호 %가 실수형 데이터(float, double)에 사용될 수 있는가? (가능/불가능)", answer: "불가능", explanation: "% 연산자는 피연산자가 반드시 정수형이어야 합니다." },
    { id: 509, tag: "C언어", difficulty: "Lv.3", question: "char str[] = 'AI'; sizeof(str)의 결과값은?", answer: "3", explanation: "문자 글자 수 2개에 문자열 끝을 알리는 널 문자(\\0) 1개가 포함되어 3바이트가 됩니다." },
    { id: 510, tag: "C언어", difficulty: "Lv.5", question: "int a=10, b=5; printf('%d', a ^ b); 의 결과값은? (비트 연산)", answer: "15", explanation: "10(1010)과 5(0101)를 XOR 연산하면 15(1111)가 됩니다." },
    { id: 511, tag: "C언어", difficulty: "Lv.4", question: "switch문에서 어떤 case에도 해당하지 않을 때 실행되는 기본 분기 키워드는?", answer: "default", explanation: "일치하는 case가 없을 때 default: 블록이 실행됩니다." },
    { id: 512, tag: "C언어", difficulty: "Lv.3", question: "배열 int a[2][3]; 이 차지하는 메모리 총 크기는 몇 바이트인가? (int는 4바이트 기준)", answer: "24", explanation: "2 * 3 * 4바이트 = 24바이트입니다." },
    { id: 513, tag: "C언어", difficulty: "Lv.2", question: "정수형 데이터를 16진수 소문자로 출력하기 위한 서식 지정자는?", answer: "%x", explanation: "대문자는 %X, 소문자는 %x를 사용합니다." },
    { id: 514, tag: "C언어", difficulty: "Lv.4", question: "int a=10; int *p = &a; printf('%d', &*p == &a); 의 결과는?", answer: "1", explanation: "*p의 주소(&)는 결국 a의 주소와 같으므로 참(1)을 반환합니다." },
    { id: 515, tag: "C언어", difficulty: "Lv.5", question: "여러 자료형의 변수들을 하나의 이름으로 묶어 메모리를 '공유'하여 사용하는 사용자 정의 자료형은?", answer: "공용체", explanation: "구조체와 달리 가장 큰 멤버의 메모리 공간을 공유하는 union(공용체)입니다." },
    { id: 516, tag: "C언어", difficulty: "Lv.3", question: "문자열을 비교하여 같으면 0을 반환하는 표준 함수명은? (string.h)", answer: "strcmp", explanation: "String Compare의 약자입니다." },
    { id: 517, tag: "C언어", difficulty: "Lv.1", question: "C언어에서 소수점이 있는 실수를 저장하는 기본 8바이트 자료형 키워드는?", answer: "double", explanation: "4바이트는 float, 8바이트는 double입니다." },
    { id: 518, tag: "C언어", difficulty: "Lv.4", question: "int a=3, b=4; printf('%d', a > b ? a++ : b++); 의 결과값은?", answer: "4", explanation: "조건이 거짓이므로 b++이 실행되는데, 후위 연산이므로 출력은 원래 값인 4가 찍힌 후 b가 증가합니다." },
    { id: 519, tag: "C언어", difficulty: "Lv.2", question: "단항 연산자 중 피연산자의 논리 상태를 반전(참을 거짓으로, 거짓을 참으로)시키는 기호는?", answer: "!", explanation: "논리 NOT 연산자입니다." },
    { id: 520, tag: "C언어", difficulty: "Lv.5", question: "동적으로 할당된 메모리 공간을 해제하여 메모리 누수를 방지하는 함수명은?", answer: "free", explanation: "malloc() 등으로 할당한 메모리는 free()로 해제해야 합니다." },

    // --- [521~540: Java 예외 처리 및 객체지향 심화] ---
    { id: 521, tag: "Java", difficulty: "Lv.2", question: "자바에서 예외가 발생할 가능성이 있는 코드를 감싸는 블록 키워드는?", answer: "try", explanation: "try 블록 안의 코드를 실행하다 예외가 발생하면 catch 블록으로 이동합니다." },
    { id: 522, tag: "Java", difficulty: "Lv.4", question: "try-catch 구조에서 예외 발생 여부와 상관없이 무조건 마지막에 실행되는 블록은?", answer: "finally", explanation: "자원 반납 등 필수적인 정리 작업을 수행할 때 씁니다." },
    { id: 523, tag: "Java", difficulty: "Lv.3", question: "자바에서 메서드가 특정 예외를 발생시킬 수 있음을 호출 측에 알리는 키워드는? (메서드 선언부 끝에 사용)", answer: "throws", explanation: "예외를 직접 처리하지 않고 자신을 호출한 곳으로 떠넘길 때 사용합니다." },
    { id: 524, tag: "Java", difficulty: "Lv.5", question: "class Parent { void m(){} } class Child extends Parent { void m(){} } 변형 패턴에서 오버라이딩 규칙 중 자식 메서드는 부모 메서드보다 접근 제어자를 더 (좁게/넓게) 설정해야 하는가?", answer: "넓게", explanation: "자식의 접근 제어 범위는 부모보다 같거나 넓어야 오버라이딩이 가능합니다." },
    { id: 525, tag: "Java", difficulty: "Lv.1", question: "자바에서 문자열을 표현하는 기본 참조 자료형의 클래스 이름은?", answer: "String", explanation: "문자열 인스턴스를 다루는 내장 클래스입니다." },
    { id: 526, tag: "Java", difficulty: "Lv.3", question: "String s = 'Icheon'; System.out.print(s.contains('ch')); 의 결과값은?", answer: "true", explanation: "contains() 메서드는 특정 문자열이 포함되어 있으면 true를 반환합니다." },
    { id: 527, tag: "Java", difficulty: "Lv.4", question: "String s = 'ABC'; System.out.print(s.concat('DEF').length()); 의 결과값은?", answer: "6", explanation: "문자열을 이어붙인 'ABCDEF'의 길이인 6이 반환됩니다." },
    { id: 528, tag: "Java", difficulty: "Lv.2", question: "자바에서 인스턴스를 생성하지 않고 클래스 이름으로 직접 접근할 수 있는 필드나 메서드를 만드는 키워드는?", answer: "static", explanation: "정적 멤버(변수, 메서드)를 선언할 때 사용합니다." },
    { id: 529, tag: "Java", difficulty: "Lv.5", question: "자바에서 인터페이스를 선언할 때 사용하는 키워드는?", answer: "interface", explanation: "추상 메서드와 상수만을 멤버로 가질 수 있는 규격입니다." },
    { id: 530, tag: "Java", difficulty: "Lv.4", question: "자바 클래스 내부에서 현재 객체 자신을 가리키는 레퍼런스 키워드는?", answer: "this", explanation: "인스턴스 자신을 가리키며, 멤버 변수와 매개변수의 이름이 같을 때 구분하기 위해 주로 씁니다." },
    { id: 531, tag: "Java", difficulty: "Lv.3", question: "배열의 길이를 알아내기 위해 사용하는 자바의 배열 속성은? (괄호 없음)", answer: "length", explanation: "배열객체.length 속성으로 크기를 얻습니다. (문자열은 length() 메서드임)" },
    { id: 532, tag: "Java", difficulty: "Lv.2", question: "자바의 소스 파일(.java)을 컴파일하면 생성되는 실행 파일의 확장자는?", answer: "class", explanation: "바이트코드로 변환된 .class 파일이 생성되며 JVM 위에서 실행됩니다." },
    { id: 533, tag: "Java", difficulty: "Lv.4", question: "NullPointerException은 언제 발생하는 예외인가?", answer: "객체 참조가 없는 상태에서 멤버를 호출할 때", explanation: "NULL인 변수를 참조하여 메서드나 필드를 사용하려 할 때 발생합니다." },
    { id: 534, tag: "Java", difficulty: "Lv.5", question: "자바에서 한 번 지정된 객체의 참조를 바꿀 수 없도록 변수를 상수화시키는 키워드는?", answer: "final", explanation: "final 변수는 초기화 후 값을 변경할 수 없습니다." },
    { id: 535, tag: "Java", difficulty: "Lv.3", question: "동일한 패키지 내의 클래스와 상속 관계의 자식 클래스에서만 접근을 허용하는 접근 제어자는?", answer: "protected", explanation: "private보다는 넓고 package-private(default)에 상속 제한이 추가된 형태입니다." },
    { id: 536, tag: "Java", difficulty: "Lv.2", question: "정수형 래퍼(Wrapper) 클래스명으로, 문자열 정수 변환 시 사용하는 것은?", answer: "Integer", explanation: "Integer.parseInt() 등과 같이 기본 자료형 int를 객체로 다룰 때 씁니다." },
    { id: 537, tag: "Java", difficulty: "Lv.4", question: "클래스 내에서 상위 클래스로부터 물려받은 메서드의 동작을 완전히 새로 정의하는 행위는?", answer: "오버라이딩", explanation: "메서드 재정의(Overriding)입니다. 이름, 매개변수, 리턴타입이 같아야 합니다." },
    { id: 538, tag: "Java", difficulty: "Lv.1", question: "자바에서 객체를 생성할 때 사용하는 예약어(키워드)는?", answer: "new", explanation: "new 연산자를 통해 힙(Heap) 메모리에 공간을 할당합니다." },
    { id: 539, tag: "Java", difficulty: "Lv.3", question: "하나의 객체가 여러 가지 타입을 가질 수 있는 성질을 뜻하는 객체지향 용어는?", answer: "다형성", explanation: "Polymorphism은 상속, 오버라이딩과 밀접한 연관이 있습니다." },
    { id: 540, tag: "Java", difficulty: "Lv.5", question: "클래스 생성자에서 자신의 다른 생성자를 명시적으로 호출할 때 사용하는 메서드 형태는?", answer: "this()", explanation: "반드시 생성자 코드의 첫 번째 줄에 위치해야 합니다." },

    // --- [541~560: Python 내장 함수 및 데이터 구조] ---
    { id: 541, tag: "Python", difficulty: "Lv.2", question: "파이썬에서 리스트의 맨 마지막 요소를 꺼내고 리스트에서 삭제하는 메서드는?", answer: "pop", explanation: "pop()은 기본적으로 마지막 인덱스 요소를 반환하고 제거합니다." },
    { id: 542, tag: "Python", difficulty: "Lv.3", question: "a = [1, 2, 3]; a.extend([4, 5]); print(len(a)); 의 결과는?", answer: "5", explanation: "extend는 다수의 요소를 한 번에 확장하여 추가하므로 [1, 2, 3, 4, 5]가 됩니다." },
    { id: 543, tag: "Python", difficulty: "Lv.4", question: "a = 'Python'; print(a[::-1]); 의 출력 결과는?", answer: "nohtyP", explanation: "슬라이싱 단계 값을 -1로 주면 문자열이 역순(뒤집기)으로 출력됩니다." },
    { id: 544, tag: "Python", difficulty: "Lv.3", question: "딕셔너리에서 모든 키(Key) 값들만 모아서 가져오는 메서드는?", answer: "keys", explanation: "dict.keys() 형태로 사용합니다." },
    { id: 545, tag: "Python", difficulty: "Lv.5", question: "a = [x for x in range(5) if x % 2 == 0]; print(sum(a)); 의 결과는?", answer: "6", explanation: "리스트 컴프리헨션으로 0, 2, 4를 필터링한 뒤 합을 구하므로 0+2+4 = 6입니다." },
    { id: 546, tag: "Python", difficulty: "Lv.2", question: "요소의 중복을 허용하지 않으며, 순서가 없는 파이썬의 집합 자료형 키워드는?", answer: "set", explanation: "중복 제거용으로 자주 쓰이는 컬렉션입니다." },
    { id: 547, tag: "Python", difficulty: "Lv.1", question: "파이썬에서 값을 수정할 수 없는 고정된 순서 리스트를 뜻하는 자료형은?", answer: "튜플", explanation: "소괄호()로 묶어 정의하며 생성 후 변경이 불가능합니다." },
    { id: 548, tag: "Python", difficulty: "Lv.4", question: "a = ' able '; print(a.strip()); 의 결과값은? (양 끝 공백 여부 명시)", answer: "able", explanation: "strip() 메서드는 양쪽의 공백을 완전히 제거한 문자열을 반환합니다." },
    { id: 549, tag: "Python", difficulty: "Lv.3", question: "리스트의 정렬을 수행하되 원본 리스트는 그대로 두고 '정렬된 새로운 리스트'를 반환하는 내장 함수는?", answer: "sorted", explanation: "list.sort()는 원본을 바꾸고, sorted(list)는 새 리스트를 만듭니다." },
    { id: 550, tag: "Python", difficulty: "Lv.5", question: "def f(n): return n if n<=1 else n + f(n-1)\nprint(f(4)); 의 결과값은?", answer: "10", explanation: "재귀 함수 구조로 4 + 3 + 2 + 1 = 10을 계산합니다." },
    { id: 551, tag: "Python", difficulty: "Lv.2", question: "문자열 '123'을 숫자 정수형으로 형변환하는 내장 함수는?", answer: "int", explanation: "int('123')은 숫자 123이 됩니다." },
    { id: 552, tag: "Python", difficulty: "Lv.3", question: "a = [10, 20, 30]; print(a.index(30)); 의 실행 결과는?", answer: "2", explanation: "값 30이 위치한 인덱스 번호인 2를 반환합니다." },
    { id: 553, tag: "Python", difficulty: "Lv.4", question: "함수 선언 시 이름 없는 익명 함수를 한 줄로 간결하게 선언하기 위해 사용하는 키워드는?", answer: "lambda", explanation: "람다 함수(표현식)를 선언할 때 씁니다." },
    { id: 554, tag: "Python", difficulty: "Lv.1", question: "리스트나 문자열 등 컬렉션의 전체 요소 개수(길이)를 구하는 내장 함수는?", answer: "len", explanation: "length의 약자입니다." },
    { id: 555, tag: "Python", difficulty: "Lv.5", question: "a = (1, 2, 3); print(type(a) == tuple); 의 출력 결과는? (True/False)", answer: "True", explanation: "소괄호로 생성된 a는 튜플이 맞으므로 True입니다." },
    { id: 556, tag: "Python", difficulty: "Lv.3", question: "문자열 내의 특정 문자나 패턴을 다른 문자로 치환하는 메서드는?", answer: "replace", explanation: "string.replace(old, new) 형태로 씁니다." },
    { id: 557, tag: "Python", difficulty: "Lv.4", question: "a = ['A', 'B']; print('-'.join(a)); 의 실행 결과는?", answer: "A-B", explanation: "join 메서드는 리스트의 요소를 지정된 구분자로 연결해 하나의 문자열로 만듭니다." },
    { id: 558, tag: "Python", difficulty: "Lv.2", question: "조건문에서 아무런 동작도 하지 않고 구문 상 자리를 채우기 위해 사용하는 키워드는?", answer: "pass", explanation: "구조상 코드가 필요하지만 실행할 내용이 없을 때 pass를 배치합니다." },
    { id: 559, tag: "Python", difficulty: "Lv.3", question: "a = 'Icheon'; print(a.lower()); 의 실행 결과는?", answer: "icheon", explanation: "모든 문자를 소문자로 바꿉니다." },
    { id: 560, tag: "Python", difficulty: "Lv.5", question: "a = [1, 2, 3]; b = a[:]; b[0] = 7; print(a[0]); 의 결과값은?", answer: "1", explanation: "a[:] 슬라이싱 복사는 얕은 복사(새 객체 분리)이므로 b를 바꿔도 a는 변하지 않고 1입니다." },

    // --- [561~580: SQL 조인 및 집계 연산] ---
    { id: 561, tag: "SQL", difficulty: "Lv.3", question: "테이블에서 조회된 데이터의 합계를 구하는 그룹(집계) 함수는?", answer: "SUM", explanation: "SUM(컬럼명) 형식으로 작성합니다." },
    { id: 562, tag: "SQL", difficulty: "Lv.4", question: "GROUP BY 절로 그룹화된 결과에 대해 필터링(조건)을 적용할 때 사용하는 절은?", answer: "HAVING", explanation: "그룹 조건은 WHERE가 아닌 HAVING 절을 사용해야 합니다." },
    { id: 563, tag: "SQL", difficulty: "Lv.5", question: "두 테이블을 결합할 때, 공통된 컬럼의 값이 일치하는 행만 매칭하여 가져오는 기본 조인 방식은?", answer: "INNER JOIN", explanation: "일치하는 교집합 데이터만 추출하는 내부 조인입니다." },
    { id: 564, tag: "SQL", difficulty: "Lv.3", question: "테이블 구조 자체를 수정하기 위해 사용하는 데이터 정의어(DDL) 명령어는?", answer: "ALTER TABLE", explanation: "컬럼 추가, 삭제, 타입 변경 시 사용합니다." },
    { id: 565, tag: "SQL", difficulty: "Lv.2", question: "조회 데이터의 정렬을 수행할 때 기본값으로 적용되는 오름차순 키워드는?", answer: "ASC", explanation: "Ascending의 약자이며 생략 가능합니다." },
    { id: 566, tag: "SQL", difficulty: "Lv.4", question: "기존 테이블에 저장된 데이터를 조건에 맞춰 수정할 때 사용하는 DML 명령어는?", answer: "UPDATE", explanation: "UPDATE 테이블명 SET 컬럼=값 WHERE 조건; 구조로 사용합니다." },
    { id: 567, tag: "SQL", difficulty: "Lv.5", question: "기본키(PK)가 가질 수 없는 조건 2가지는? (단어 사이에 쉼표 배치)", answer: "중복값, NULL", explanation: "기본키는 유일해야 하며(Unique), 비어있을 수 없습니다(Not Null)." },
    { id: 568, tag: "SQL", difficulty: "Lv.3", question: "테이블의 데이터만 빠르게 전체 삭제하며 롤백(Rollback)이 불가능한 DDL 기반 명령어는?", answer: "TRUNCATE", explanation: "테이블 구조는 남기고 공간과 데이터만 바로 지우는 명령어입니다." },
    { id: 569, tag: "SQL", difficulty: "Lv.2", question: "특정 값이 어떤 범위(A 이상 B 이하)에 속하는지 검사할 때 쓰는 연산자는?", answer: "BETWEEN", explanation: "WHERE 컬럼 BETWEEN A AND B 형태로 사용합니다." },
    { id: 570, tag: "SQL", difficulty: "Lv.4", question: "서로 다른 테이블을 조인할 때 매칭되는 행이 없더라도 왼쪽 테이블의 모든 행을 출력하는 조인 방식은?", answer: "LEFT JOIN", explanation: "왼쪽 외부 조인(Left Outer Join)입니다." },
    { id: 571, tag: "SQL", difficulty: "Lv.3", question: "테이블에서 행의 총 개수를 구하는 집계 함수는?", answer: "COUNT", explanation: "COUNT(*) 또는 COUNT(컬럼) 형태로 씁니다." },
    { id: 572, tag: "SQL", difficulty: "Lv.1", question: "데이터베이스 관리자나 설계자가 스키마, 테이블을 생성할 때 사용하는 SQL 명령어 분류 약어는?", answer: "DDL", explanation: "Data Definition Language (데이터 정의어)입니다." },
    { id: 573, tag: "SQL", difficulty: "Lv.5", question: "트랜잭션의 특징 중 '하나의 트랜잭션이 성공하거나 아니면 전혀 실행되지 않아야 한다'는 원칙은?", answer: "원자성", explanation: "ACID 특징 중 All or Nothing을 의미하는 Atomicity(원자성)입니다." },
    { id: 574, tag: "SQL", difficulty: "Lv.4", question: "데이터베이스에서 가상의 테이블로, 보안과 사용자 편의성을 위해 기존 테이블을 기반으로 정의하는 것은?", answer: "뷰", explanation: "View는 독자적인 인덱스를 가질 수 없는 가상 테이블입니다." },
    { id: 575, tag: "SQL", difficulty: "Lv.3", question: "DCL(제어어) 중 데이터베이스의 영구적인 변경 사항을 취소하고 이전 상태로 되돌리는 명령어는?", answer: "ROLLBACK", explanation: "트랜잭션 작업을 취소하고 원상복구합니다." },
    { id: 576, tag: "SQL", difficulty: "Lv.2", question: "성적 테이블에서 평균 점수를 계산하기 위해 사용하는 집계 함수명은?", answer: "AVG", explanation: "Average의 약자입니다." },
    { id: 577, tag: "SQL", difficulty: "Lv.4", question: "테이블에 새로운 열(Column)을 추가하기 위해 ALTER TABLE과 함께 쓰는 하위 구문 키워드는?", answer: "ADD", explanation: "ALTER TABLE 테이블명 ADD 컬럼명 자료형; 구조를 취합니다." },
    { id: 578, tag: "SQL", difficulty: "Lv.5", question: "GRANT 문으로 권한을 부여받은 사용자가 다른 사용자에게 그 권한을 다시 부여할 수 있게 만드는 옵션은?", answer: "WITH GRANT OPTION", explanation: "권한의 연쇄 부여를 가능케 하는 옵션 구문입니다." },
    { id: 579, tag: "SQL", difficulty: "Lv.3", question: "테이블에서 특정 컬럼의 값이 NULL이 아닌 데이터만 조회할 때 사용하는 조건식은? (네 단어)", answer: "IS NOT NULL", explanation: "NULL이 아닌 데이터를 필터링할 때 씁니다." },
    { id: 580, tag: "SQL", difficulty: "Lv.4", question: "테이블 제약 조건 중 참조 테이블의 기본키 값을 반드시 참조하도록 강제하는 제약조건 명칭은?", answer: "외래키", explanation: "참조 무결성을 유지하기 위한 Foreign Key 제약조건입니다." },

    // --- [581~600: OSI 7계층 및 네트워크 응용 고도화] ---
    { id: 581, tag: "네트워크", difficulty: "Lv.3", question: "OSI 7계층 중 4계층(전송 계층)의 데이터 전송 단위(PDU) 명칭은?", answer: "세그먼트", explanation: "Segment는 전송 계층의 데이터 기본 단위입니다." },
    { id: 582, tag: "네트워크", difficulty: "Lv.4", question: "네트워크 상에서 IP 주소를 물리적 장치 주소인 MAC 주소로 변환하는 프로토콜의 약어는?", answer: "ARP", explanation: "Address Resolution Protocol의 약자입니다. 예시문제 4번 연계 유형입니다." },
    { id: 583, tag: "네트워크", difficulty: "Lv.5", question: "OSI 7계층 중 세션 계층(5계층)이 제공하는 주요 기능 중 하나로, 송수신 간 대화의 흐름을 조절하는 제어 기능은?", answer: "대화 제어", explanation: "세션 계층은 데이터 전송 방향(단방향, 반이중, 전이중)을 관리하는 대화 제어 역할을 합니다." },
    { id: 584, tag: "네트워크", difficulty: "Lv.2", question: "호스트의 도메인 이름을 네트워크 숫자인 IP 주소로 변환해주는 시스템의 약어는?", answer: "DNS", explanation: "Domain Name System입니다." },
    { id: 585, tag: "네트워크", difficulty: "Lv.4", question: "TCP 프로토콜이 연결을 설정할 때 사용하는 3단계 상호 확인 절차의 영문 명칭은?", answer: "3-Way Handshake", explanation: "SYN, SYN+ACK, ACK를 주고받으며 가상 회선을 확립합니다." },
    { id: 586, tag: "네트워크", difficulty: "Lv.3", question: "OSI 7계층 중 인터넷 계층에서 동작하며, 데이터 전송 상태 확인 및 에러 보고를 담당하는 프로토콜 약어는?", answer: "ICMP", explanation: "Internet Control Message Protocol로, ping 명령어가 이를 사용합니다." },
    { id: 587, tag: "네트워크", difficulty: "Lv.5", question: "OSI 7계층 중 6계층에 속하며 데이터의 인코딩, 암호화, 압축을 담당하는 계층 명칭은?", answer: "표현 계층", explanation: "Presentation Layer는 상호 다른 데이터 표현 방식을 통일합니다." },
    { id: 588, tag: "네트워크", difficulty: "Lv.1", question: "인터넷에 연결된 전 세계 컴퓨터를 고유하게 식별하기 위해 부여된 32비트 논리 주소 체계는?", answer: "IPv4", explanation: "점(.)으로 구분된 4개 조각의 주소 체계입니다." },
    { id: 589, tag: "네트워크", difficulty: "Lv.4", question: "IPv4의 주소 부족 문제를 완벽히 해결하기 위해 도입된 128비트 차세대 IP 주소 체계는?", answer: "IPv6", explanation: "16비트씩 8부분으로 구성되며 콜론(:)으로 구분합니다." },
    { id: 590, tag: "네트워크", difficulty: "Lv.3", question: "OSI 7계층 중 3계층(네트워크 계층)의 대표적인 장비로 목적지까지의 최적 경로를 설정하는 장치는?", answer: "라우터", explanation: "Router는 라우팅 테이블을 기반으로 패킷의 경로를 배정합니다." },
    { id: 591, tag: "네트워크", difficulty: "Lv.2", question: "OSI 7계층 중 데이터 링크 계층(2계층)의 데이터 전송 단위(PDU) 명칭은?", answer: "프레임", explanation: "Frame은 물리 주소 정보와 에러 검출 비트가 더해진 단위입니다." },
    { id: 592, tag: "네트워크", difficulty: "Lv.4", question: "보안 기능이 없는 기존 웹 전송 통신 규약인 HTTP에 SSL/TLS 암호화 계층을 추가한 보안 프로토콜 약어는?", answer: "HTTPS", explanation: "443번 포트를 사용하여 데이터를 안전하게 암호화 송수신합니다." },
    { id: 593, tag: "네트워크", difficulty: "Lv.5", question: "TCP의 흐름 제어 기법 중 하나로, 수신 측의 처리 능력(윈도우 크기)에 맞춰 유동적으로 송신량을 제어하는 방식은?", answer: "슬라이딩 윈도우", explanation: "Sliding Window 방식을 통해 확인 응답 없이 연속 전송이 가능하게 조절합니다." },
    { id: 594, tag: "네트워크", difficulty: "Lv.3", question: "원격지의 컴퓨터에 안전하게 암호화된 채널로 접속하여 쉘 명령을 수행할 수 있도록 돕는 프로토콜 약어는?", answer: "SSH", explanation: "보안 기능이 없는 Telnet을 대체하기 위해 22번 포트를 사용해 설계된 Secure Shell입니다." },
    { id: 595, tag: "네트워크", difficulty: "Lv.2", question: "네트워크 카드가 제조될 때 하드웨어에 고유하게 부여되는 48비트의 물리적 주소는?", answer: "MAC 주소", explanation: "Media Access Control 주소로 2계층 통신에서 단말 식별에 쓰입니다." },
    { id: 596, tag: "네트워크", difficulty: "Lv.4", question: "동일한 네트워크 안에서 MAC 주소를 기반으로 목적지 장치에게만 데이터를 똑똑하게 전달하는 2계층 장비는?", answer: "스위치", explanation: "더미 허브와 달리 충돌 도메인을 나누고 대역폭을 보장하는 L2 스위치입니다." },
    { id: 597, tag: "네트워크", difficulty: "Lv.5", question: "인터넷 계층 프로토콜 중 하나로, 목적지 하드웨어 주소(MAC)를 알고 있을 때 이를 통해 논리 IP 주소를 역으로 알아내는 프로토콜 약어는?", answer: "RARP", explanation: "Reverse ARP의 약자입니다." },
    { id: 598, tag: "네트워크", difficulty: "Lv.3", question: "전자 우편(E-mail) 시스템에서 사용자의 메일 서버로 메일을 '보낼 때' 사용하는 표준 프로토콜 약어는?", answer: "SMTP", explanation: "Simple Mail Transfer Protocol로 25번 포트를 주로 씁니다." },
    { id: 599, tag: "네트워크", difficulty: "Lv.1", question: "OSI 7계층 중 가장 아래에 위치하며 비트(Bit) 단위의 전기적 신호를 케이블로 전송하는 계층 명칭은?", answer: "물리 계층", explanation: "Physical Layer입니다. 리피터나 허브가 이 계층 장비입니다." },
    { id: 600, tag: "네트워크", difficulty: "Lv.5", question: "사설 IP 주소를 하나의 공인 IP 주소로 1:N 매칭 변환하여 주소 고갈을 막고 내부망을 보호하는 네트워크 기술 약어는?", answer: "NAT", explanation: "Network Address Translation의 약자입니다." },
    // [기존 600번 문제 뒤에 이어서 붙여넣으세요]

    // --- [601~620: 2026년 1회 실제 기출 복원 구간] ---
    { id: 601, tag: "SQL", difficulty: "Lv.4", question: "사원 테이블의 사원번호가 근무자명단 테이블에도 존재하는지 확인하기 위해 빈칸에 들어갈 알맞은 명령어를 쓰시오.\nSELECT COUNT(*) FROM 사원 WHERE ( ) (SELECT * FROM 근무자명단 WHERE 근무자명단.사원번호 = 사원.사원번호);", answer: "EXISTS", explanation: "서브쿼리의 결과가 존재하는지 여부를 확인하는 EXISTS 연산자 기출문제입니다." },
    { id: 602, tag: "SQL", difficulty: "Lv.4", question: "REGION이 '과천'인 데이터를 조회하여 중복을 제거하고 합치는 UNION 쿼리의 실행 결과(COUNT 값)를 쓰시오.\nSELECT COUNT(*) FROM (SELECT PM FROM prj1 WHERE REGION = '과천' UNION SELECT PM FROM prj2 WHERE REGION = '과천')", answer: "3", explanation: "UNION은 두 테이블의 결과 집합을 합치면서 중복된 행을 제거하므로 결과는 3이 됩니다." },
    { id: 603, tag: "Linux", difficulty: "Lv.3", question: "리눅스에서 root(관리자) 권한을 사용하여 명령어를 실행할 때 문두에 붙이는 키워드는?", answer: "sudo", explanation: "superuser do의 약자로 관리자 권한 대행 명령어입니다." },
    { id: 604, tag: "Linux", difficulty: "Lv.2", question: "리눅스 터미널에서 명령어의 도움말 및 상세 사용법(매뉴얼)을 확인하는 명령어는?", answer: "man", explanation: "manual의 약자입니다." },
    { id: 605, tag: "Linux", difficulty: "Lv.4", question: "작업 경로가 Users/project/workspace/dev 이고, 목표 경로가 Users/project/workspace/docs 일 때, 작성해야 하는 상대 경로는?", answer: "../docs", explanation: "..을 통해 workspace로 이동한 후 docs 디렉토리로 접근합니다." },
    { id: 606, tag: "Python", difficulty: "Lv.5", question: "def test(a,b):\n  input=[ord(a),ord(b)]\n  input.sort()\n  m,n=input\n  result=[]\n  for i in range(m,n+1):\n    result.append(chr(i))\n  return result\n위 함수를 test('c','f')로 호출하여 실행한 결과(출력값)는?", answer: "cdef", explanation: "ord()로 아스키코드를 얻고 정렬 후, chr()로 다시 문자로 변환하여 순서대로 연결 출력하는 문제입니다." },
    { id: 607, tag: "Python", difficulty: "Lv.3", question: "파이썬 리스트나 문자열에서 가장 마지막 인덱스(뒤에서 첫 번째) 데이터를 가리키는 음수 인덱스 값은?", answer: "-1", explanation: "뒤에서부터 역순으로 접근할 때 -1 인덱스를 사용합니다." },
    { id: 608, tag: "Python", difficulty: "Lv.4", question: "파이썬 리스트를 인덱스의 반대 방향(역순)으로 처음부터 끝까지 출력하기 위한 슬라이싱 표기법은?", answer: "::-1", explanation: "start:end:step 구조에서 step을 -1로 지정하면 전체 역순 슬라이싱이 됩니다." },
    { id: 609, tag: "Python", difficulty: "Lv.4", question: "파이썬에서 a = (1, 2, 3)과 같은 자료형이 선언되었을 때, a[0] = 4 와 같이 데이터를 갱신하려고 하면 오류가 발생하는 원인은?", answer: "튜플은 요소를 변경할 수 없기 때문", explanation: "리스트와 달리 튜플(tuple)은 생성 후 요소를 수정할 수 없는 불변(immutable) 객체입니다." },
    { id: 610, tag: "SQL", difficulty: "Lv.3", question: "기존 테이블(t1)의 특정 컬럼(c2) 데이터를 100으로 수정하기 위한 빈칸을 채우시오.\n( ) t1 ( ) c2 = 100 WHERE c1 = 'A';", answer: "UPDATE SET", explanation: "데이터를 수정하는 DML 문법은 UPDATE 테이블명 SET 컬럼=값 구조입니다." },
    { id: 611, tag: "Java", difficulty: "Lv.5", question: "class t1 { t1(){print('A');} t1(char a){print('a');} }\nclass t2 extends t1 { t2(){print('B');} t2(char a){printf('%c%c',a,a);} }\nMain에서 t1 t = new t2('c'); 실행 시 출력 결과는?", answer: "Acc", explanation: "자식 인자 생성자 호출 시 부모의 기본 생성자 t1()이 먼저 자동 호출되어 A가 찍히고, 자식의 cc가 찍힙니다." },
    { id: 612, tag: "Java", difficulty: "Lv.4", question: "String a = 'helloworld'; String b = 'helloworld'; 일 때, (a == b) ? '1' : '2' 의 결과값은?", answer: "1", explanation: "new를 쓰지 않은 문자열 리터럴은 상수가 저장되는 힙 영역(String Pool)을 공유하므로 주소 비교(==) 시 참(1)입니다." },
    { id: 613, tag: "SQL", difficulty: "Lv.4", question: "문자열은 6글자 이상 8글자 이하이며, 2번째 글자는 '2', 4번째 글자는 'A'인 데이터 조회를 위한 LIKE 와일드카드 패턴은?", answer: "_2_A%", explanation: "_는 단일 문자 1개, %는 0개 이상의 문자열 매칭을 의미합니다." },
    { id: 614, tag: "Java", difficulty: "Lv.3", question: "자바에서 클래스들이 구현해야 하는 메서드의 규격을 정의하는, 기출문제에 출제된 이 구조의 명칭은?", answer: "인터페이스", explanation: "interface에 대한 개념적 정의를 묻는 단답형 기출 유형입니다." },
    { id: 615, tag: "Linux", difficulty: "Lv.1", question: "리눅스에서 현재 사용자가 위치하고 있는 디렉터리의 절대 경로를 출력하는 명령어는?", answer: "pwd", explanation: "Print Working Directory의 약자로 필수 기본 명령어입니다." },
    { id: 616, tag: "Python", difficulty: "Lv.3", question: "문자를 아스키코드 정수 값으로 변환해주는 파이썬 내장 함수명은?", answer: "ord", explanation: "ord('A')는 65를 반환합니다." },
    { id: 617, tag: "Python", difficulty: "Lv.3", question: "아스키코드 정수 값을 해당하는 문자로 변환해주는 파이썬 내장 함수명은?", answer: "chr", explanation: "chr(65)는 'A'를 반환합니다." },
    { id: 618, tag: "SQL", difficulty: "Lv.5", question: "UNION 연산자와 달리, 두 결과 집합의 중복을 제거하지 않고 조건에 맞는 모든 행을 그대로 합쳐서 반환하는 연산자는?", answer: "UNION ALL", explanation: "중복 제거 및 정렬을 수행하지 않아 속도가 더 빠른 합집합 연산자입니다." },
    { id: 619, tag: "Java", difficulty: "Lv.4", question: "자바에서 String a = new String('hi'); String b = new String('hi'); 일 때 주소 비교 연산인 a == b의 결과값은?", answer: "false", explanation: "new 키워드를 사용하면 힙 메모리에 독립된 새로운 객체가 생성되므로 주소가 서로 다릅니다." },
    { id: 620, tag: "SQL", difficulty: "Lv.4", question: "LIKE 연산자에서 글자 수 제한 없이 어떤 문자열이든 매칭되도록 지정할 때 사용하는 와일드카드 문자는?", answer: "%", explanation: "퍼센트(%) 기호는 글자 수 제한이 없는 와일드카드입니다." },

    // --- [621~650: 2026년 1회 기출 연계 유사·변형 문제 (언어/리눅스)] ---
    { id: 621, tag: "Java", difficulty: "Lv.5", question: "class P { P(){print('1');} }\nclass C extends P { C(){this('x'); print('2');} C(char a){print('3');} }\nnew C(); 실행 시 출력 결과를 쓰시오.", answer: "132", explanation: "자식 생성자 내부에서 this() 호출 시 부모 생성자가 먼저 실행(1)된 후, 자식의 인자 생성자(3), 본래 생성자(2) 순으로 마무리됩니다." },
    { id: 622, tag: "Python", difficulty: "Lv.4", question: "a = 'Icheon'; print(a[-2:1:-1]); 의 실행 결과를 쓰시오.", answer: "ohc", explanation: "인덱스 -2(o)부터 2(h)까지 역순으로 1씩 감소하며 추출하므로 o, h, c가 출력됩니다." },
    { id: 623, tag: "C언어", difficulty: "Lv.4", question: "int a = 10; int *p = &a; printf('%d', (*p)++); 의 실행 결과는?", answer: "10", explanation: "후위 증가 연산이므로 현재 *p 값인 10이 먼저 출력된 후, 변수 a의 값이 11로 증가합니다." },
    { id: 624, tag: "Linux", difficulty: "Lv.4", question: "작업 경로가 /var/log/nginx 이고, 목표 경로가 /var/log/redis 일 때, 올바른 상대 경로 표현은?", answer: "../redis", explanation: "..으로 log 디렉토리로 빠져나온 뒤 redis로 들어갑니다." },
    { id: 625, tag: "Java", difficulty: "Lv.4", question: "String s1 = 'CBT'; String s2 = new String('CBT'); 두 변수의 문자열 '내용' 자체를 비교할 때 쓰는 메서드는?", answer: "equals", explanation: "자바 객체의 내용 값 비교는 반드시 equals() 메서드를 사용해야 합니다." },
    { id: 626, tag: "Python", difficulty: "Lv.3", question: "print(chr(ord('a') - 32)); 의 실행 결과를 쓰시오. (단, 'a'의 아스키코드는 97, 'A'는 65)", answer: "A", explanation: "97 - 32 = 65 이며, 이를 chr()로 변환하면 대문자 'A'가 됩니다." },
    { id: 627, tag: "SQL", difficulty: "Lv.4", question: "문자열의 길이가 딱 5글자이면서 3번째 글자가 'X'인 데이터를 검색하기 위한 LIKE 연산자의 조건 패턴을 쓰시오.", answer: "__X__", explanation: "언더바(_) 4개와 X를 조합하여 총 5자리의 자릿수를 명밀하게 고정합니다." },
    { id: 628, tag: "SQL", difficulty: "Lv.5", question: "서브쿼리의 결과 조건이 하나라도 만족하면 참을 반환하는, EXISTS와 유사한 역할을 하는 다중 행 연산자는?", answer: "ANY", explanation: "ANY(또는 SOME)는 서브쿼리 결과 중 최소 하나라도 만족하면 매칭됩니다." },
    { id: 629, tag: "C언어", difficulty: "Lv.5", question: "int arr[4] = {5, 10, 15, 20}; int *p = &arr[1]; printf('%d', *(p + 2)); 의 결과값은?", answer: "20", explanation: "p가 1번 인덱스(10)를 가리키므로, p+2는 3번 인덱스 위치의 값인 20이 됩니다." },
    { id: 630, tag: "Python", difficulty: "Lv.3", question: "a = [10, 20, 30]; del a[-1]; print(len(a)); 의 실행 결과값은?", answer: "2", explanation: "마지막 인덱스인 30이 삭제되므로 리스트의 최종 길이는 2가 됩니다." },
    { id: 631, tag: "Linux", difficulty: "Lv.3", question: "리눅스 보기 중 빈 디렉터리를 안전하게 삭제할 때 사용하는 명령어는?", answer: "rmdir", explanation: "Remove Directory의 약자입니다." },
    { id: 632, tag: "Java", difficulty: "Lv.5", question: "자식 클래스가 인터페이스를 구현할 때 상속 선언부 끝에 사용하는 키워드는?", answer: "implements", explanation: "인터페이스를 구현할 때는 implements 규칙을 적용합니다." },
    { id: 633, tag: "SQL", difficulty: "Lv.3", question: "기존 테이블에 새로운 행(레코드)을 삽입하기 위해 사용하는 DML 명령어 구성은? (두 단어)", answer: "INSERT INTO", explanation: "INSERT INTO 테이블명 VALUES (...) 구조를 취합니다." },
    { id: 634, tag: "C언어", difficulty: "Lv.4", question: "char *p = 'Block'; printf('%s', p + 2); 의 출력 결과를 쓰시오.", answer: "ock", explanation: "주소값에 2를 더했으므로 2번 인덱스인 'o' 위치부터 문자열 끝까지 연속 출력합니다." },
    { id: 635, tag: "Python", difficulty: "Lv.2", question: "a = [1, 2, 3]; a.append([4, 5]); print(a[3]); 의 실행 결과를 쓰시오.", answer: "[4, 5]", explanation: "append는 리스트 형태 통째로 하나의 요소로 집어넣으므로 3번 인덱스는 [4, 5]가 됩니다." },
    { id: 636, tag: "SQL", difficulty: "Lv.4", question: "조건에 일치하는 테이블의 행(데이터)을 완전히 삭제할 때 사용하는 DML 명령어는?", answer: "DELETE", explanation: "행 단위를 가려내어 삭제할 때는 DELETE FROM 구조를 씁니다." },
    { id: 637, tag: "Java", difficulty: "Lv.4", question: "String s = 'ABCDE'; System.out.print(s.substring(1, 4)); 의 출력 결과를 쓰시오.", answer: "BCD", explanation: "인덱스 1부터 4 전(3번)까지인 B, C, D 문자를 추출합니다." },
    { id: 638, tag: "네트워크", difficulty: "Lv.3", question: "OSI 7계층 중 3계층에 속하며 전송 경로 상의 주소를 지정하는 핵심 논리 주소 체계 명칭은?", answer: "IP 주소", explanation: "네트워크 계층의 대표 식별 주소입니다." },
    { id: 639, tag: "C언어", difficulty: "Lv.5", question: "int a = 12; printf('%d', a << 2); 의 실행 결과값을 쓰시오.", answer: "48", explanation: "왼쪽 시프트 연산은 2의 n제곱을 곱하는 원리입니다. 12 * 4 = 48입니다." },
    { id: 640, tag: "SQL", difficulty: "Lv.5", question: "트랜잭션의 특징 중 '설령 시스템 오류가 발생하더라도 성공한 트랜잭션의 결과는 영구 보존된다'는 특성은?", answer: "영속성", explanation: "ACID 특징 중 Durability(영속성 또는 지속성)에 해당합니다." },
    { id: 641, tag: "Python", difficulty: "Lv.4", question: "a = 'ssumer'; print(a.replace('s', 'z', 1)); 의 실행 결과를 쓰시오.", answer: "zsumer", explanation: "치환 개수 제한을 1로 두었으므로 첫 번째 's'만 'z'로 교체됩니다." },
    { id: 642, tag: "Linux", difficulty: "Lv.2", question: "리눅스에서 파일이나 디렉터리를 다른 위치로 복사할 때 사용하는 명령어는?", answer: "cp", explanation: "copy의 약자입니다." },
    { id: 643, tag: "Java", difficulty: "Lv.2", question: "자바의 정수형 기본 데이터 타입(Primitive Type) 중 4바이트 크기를 갖는 키워드는?", answer: "int", explanation: "정수 저장의 표준 기본형 자료형입니다." },
    { id: 644, tag: "SQL", difficulty: "Lv.3", question: "조회된 데이터를 급여가 높은 사원부터 순서대로 나열하기 위해 사용하는 ORDER BY 하위 옵션 키워드는?", answer: "DESC", explanation: "내림차순 정렬 옵션인 Descending의 약자입니다." },
    { id: 645, tag: "C언어", difficulty: "Lv.4", question: "int x = 5; int y = ++x * 2; printf('%d', y); 의 결과값은?", answer: "12", explanation: "전위 증가에 의해 x가 6이 된 후 2를 곱하므로 12가 됩니다." },
    { id: 646, tag: "Python", difficulty: "Lv.3", question: "a = [5, 2, 8, 1]; a.sort(); print(a[0]); 의 출력 결과를 쓰시오.", answer: "1", explanation: "sort()로 오름차순 정렬된 리스트 [1, 2, 5, 8]의 0번 인덱스 값을 출력합니다." },
    { id: 647, tag: "SQL", difficulty: "Lv.4", question: "테이블에 존재하는 특정 컬럼을 완전히 삭제하기 위해 ALTER TABLE과 함께 쓰는 구문은? (두 단어)", answer: "DROP COLUMN", explanation: "ALTER TABLE 테이블명 DROP COLUMN 컬럼명; 형식으로 사용합니다." },
    { id: 648, tag: "네트워크", difficulty: "Lv.4", question: "OSI 7계층 중 4계층에서 사용되며, 가상 회선 연결 확립을 위한 3-Way Handshake를 사용하는 프로토콜의 약어는?", answer: "TCP", explanation: "신뢰성 있는 연결 지향형 전송 프로토콜입니다." },
    { id: 649, tag: "Java", difficulty: "Lv.3", question: "부모 클래스의 private 멤버 변수에 안전하게 값을 대입하거나 수정하기 위해 제공하는 public 메서드 형태는?", answer: "Setter", explanation: "정보 은닉 규칙을 지키며 필드 값을 변경하는 set... 메서드 군을 뜻합니다." },
    { id: 650, tag: "OS", difficulty: "Lv.5", question: "교착상태(Deadlock)의 발생 조건 4가지 중, '프로세스가 자원을 점유한 상태에서 다른 자원을 추가로 요구하며 대기함'을 뜻하는 조건 명칭은?", answer: "점유와 대기", explanation: "Hold and Wait 조건입니다." },

    // --- [651~700: 고난도 변형 기출 믹스 구간 (650번 이후 1:1 보강 체계)] ---
    { id: 651, tag: "SQL", difficulty: "Lv.4", question: "서브쿼리 내에 조건에 만족하는 데이터가 단 하나도 '존재하지 않을 때' 참을 반환하는 반대 개념의 연산자는?", answer: "NOT EXISTS", explanation: "EXISTS의 부정 연산자로, 서브쿼리 결과가 공집합일 때 메인 쿼리를 수행합니다." },
    { id: 652, tag: "SQL", difficulty: "Lv.5", question: "두 테이블을 조인할 때 공통된 컬럼 이름을 기준으로 별도의 ON 조건 없이 자동으로 내부 조인을 수행하는 연산자는?", answer: "NATURAL JOIN", explanation: "동일한 이름을 가진 모든 컬럼을 묵시적으로 조인 조건으로 사용하는 방식입니다." },
    { id: 653, tag: "Linux", difficulty: "Lv.3", question: "리눅스 시스템에서 현재 실행 중인 프로세스들의 CPU, 메모리 점유율을 실시간으로 모니터링하는 명령어는?", answer: "top", explanation: "윈도우의 작업 관리자와 유사한 실시간 프로세스 모니터링 툴 기출 명칭입니다." },
    { id: 654, tag: "Python", difficulty: "Lv.5", question: "a = 'Icheon-si'; b = a.split('-'); print(b[0].upper()); 의 실행 결과를 쓰시오.", answer: "ICHEON", explanation: "하이픈으로 쪼갠 첫 요소인 'Icheon'을 모두 대문자로 치환한 결과입니다." },
    { id: 655, tag: "Java", difficulty: "Lv.4", question: "String s = 'able'; System.out.print(s.indexOf('b')); 의 결과값은?", answer: "1", explanation: "0번: a, 1번: b 이므로 문자 위치 색인 값 1이 반환됩니다." },
    { id: 656, tag: "C언어", difficulty: "Lv.4", question: "int a = 15; printf('%o', a); 의 실행 결과를 쓰시오.", answer: "17", explanation: "10진수 15를 8진수(Octal)로 변환 출력하면 17이 됩니다." },
    { id: 657, tag: "SQL", difficulty: "Lv.3", question: "특정 열의 평균 값을 계산해내는 그룹 집계 함수의 이름을 쓰시오.", answer: "AVG", explanation: "Average를 산출해 내는 함수 명칭입니다." },
    { id: 658, tag: "네트워크", difficulty: "Lv.5", question: "OSI 7계층 중 6계층에 속하며 수신 측과 송신 측의 코드 표현 양식을 맞춰주기 위해 압축, 암호화를 행하는 계층은?", answer: "표현 계층", explanation: "Presentation Layer의 핵심적 임무입니다." },
    { id: 659, tag: "Python", difficulty: "Lv.3", question: "a = [10, 20, 30]; a.pop(0); print(a[0]); 의 출력 결과를 쓰시오.", answer: "20", explanation: "pop(0)에 의해 0번 인덱스인 10이 완전히 추출 및 삭제되므로 새로운 0번 인덱스는 20이 됩니다." },
    { id: 660, tag: "Java", difficulty: "Lv.4", question: "자식 클래스의 생성자 코드 내부에서 부모 클래스의 기본 생성자를 명시적으로 대행 호출하는 함수 기호는?", answer: "super()", explanation: "생성자 체이닝 무결성을 지키기 위해 첫 줄에 배치하는 키워드입니다." },
    { id: 661, tag: "SQL", difficulty: "Lv.4", question: "문자열 패턴 매칭 시 글자 수 하나를 정확하게 대행 고정하는 와일드카드 기호 문자는?", answer: "_", explanation: "언더바(_) 기호는 단 1개의 문자 공간 자릿수를 강제 고정합니다." },
    { id: 662, tag: "Linux", difficulty: "Lv.2", question: "리눅스 터미널 환경에서 새로운 디렉터리(폴더)를 생성할 때 사용하는 명령어는?", answer: "mkdir", explanation: "Make Directory의 약자 구문입니다." },
    { id: 663, tag: "C언어", difficulty: "Lv.4", question: "int a = 7, b = 2; printf('%.1f', (float)a / b); 의 결과값은?", answer: "3.5", explanation: "정수 연산을 명시적 실수 형변환 처리를 유도하여 정확한 소수 영역까지 계산 출력합니다." },
    { id: 664, tag: "Python", difficulty: "Lv.2", question: "print('Hi' * 3); 실행 시 출력되는 결과 텍스트를 쓰시오.", answer: "HiHiHi", explanation: "파이썬 문자열 곱셈 연산은 주어진 수만큼 문자열을 반복 복사합니다." },
    { id: 665, tag: "Java", difficulty: "Lv.5", question: "자바 예외 처리 try-catch 문맥 구조에서 임의로 예외 객체를 직접 발생시켜 던질 때 사용하는 키워드는?", answer: "throw", explanation: "예외를 수동으로 발동시키는 throw 키워드입니다. (메서드 선언부의 throws와 명확히 구분 요망)" },
    { id: 666, tag: "SQL", difficulty: "Lv.4", question: "트랜잭션의 제어 명령어 중 모든 작업이 성공하여 데이터베이스에 영구 확정 반영하는 구문은?", answer: "COMMIT", explanation: "확정 신호를 보내는 DCL 연동형 명령어입니다." },
    { id: 667, tag: "네트워크", difficulty: "Lv.4", question: "목적지 하드웨어의 물리적 MAC 주소를 바탕으로 논리 네트워크 IP 주소를 역추적 매칭하는 프로토콜 약어는?", answer: "RARP", explanation: "Reverse Address Resolution Protocol입니다." },
    { id: 668, tag: "OS", difficulty: "Lv.3", question: "현재 실행 상태에 머물러 있는 프로세스가 타임 슬라이스 만료에 따라 준비 상태로 강제 전환되는 현상은?", answer: "타임아웃", explanation: "시분할 선점형 스케줄러 시스템에서 일어나는 상태 전이 현상입니다." },
    { id: 669, tag: "C언어", difficulty: "Lv.4", question: "int a = 10; int *p = &a; *p = 50; printf('%d', a); 의 최종 결과값은?", answer: "50", explanation: "포인터 간접 참조 처리를 유도하여 원본 할당지의 데이터 영역 값을 오염 및 덮어쓰기 완료했습니다." },
    { id: 670, tag: "Java", difficulty: "Lv.4", question: "자바 내에서 더 이상 하위 상속을 허용하지 않거나, 오버라이딩을 원천 차단하기 위해 선언부에 배치하는 제약 키워드는?", answer: "final", explanation: "상수화 및 확장 불허를 명령하는 키워드입니다." },
    { id: 671, tag: "Python", difficulty: "Lv.3", question: "a = [10, 20, 30, 40]; print(a[1:3]); 의 결과 리스트를 쓰시오.", answer: "[20, 30]", explanation: "1번 인덱스부터 시작하여 3번 인덱스 미만(2번)까지의 범위를 안정적으로 슬라이싱 추출합니다." },
    { id: 672, tag: "SQL", difficulty: "Lv.3", question: "그룹 집계 연산 시 유일하게 중복된 데이터 행을 가려내어 압축 소거해주는 예약어는?", answer: "DISTINCT", explanation: "결과 값 행의 중복 제거 키워드입니다." },
    { id: 673, tag: "Linux", difficulty: "Lv.2", question: "파일의 명칭을 개편하거나 물리적인 다른 보관 경로 디렉토리 구역으로 이동시키는 명령어는?", answer: "mv", explanation: "move의 축약 명령어입니다." },
    { id: 674, tag: "C언어", difficulty: "Lv.1", question: "C언어 표준 입력 처리 체계에서 키보드 입력 서식 인자를 받아들이기 위해 대행하는 함수는?", answer: "scanf", explanation: "표준 입력 스캔 함수명입니다." },
    { id: 675, tag: "Java", difficulty: "Lv.2", question: "참(true) 혹은 거짓(false)의 단일 이분법 논리 데이터를 할당하는 기본형 자료형 예약어는?", answer: "boolean", explanation: "자바 부울린 제어 키워드입니다." },
    { id: 676, tag: "Python", difficulty: "Lv.3", question: "a = 'apple'; print(a.find('z')); 의 최종 출력 신호 값을 적으시오.", answer: "-1", explanation: "파이썬 문자열 색인 함수는 대상을 탐색하지 못할 시 예외 대신 -1 신호를 내보냅니다." },
    { id: 677, tag: "SQL", difficulty: "Lv.4", question: "트랜잭션 도중 비정상 결함이나 비결정이 감지되었을 때 수행 시점 전의 원상태 세이브포인트 구역으로 데이터 롤백 처리를 지휘하는 제어어는?", answer: "ROLLBACK", explanation: "작업 무효화 및 회복 제어 구문입니다." },
    { id: 678, tag: "네트워크", difficulty: "Lv.3", question: "OSI 7계층 중 4계층인 전송 계층의 기본 데이터 가공 전송 단위의 영문 명칭은?", answer: "Segment", explanation: "세그먼트 전송 단위입니다." },
    { id: 679, tag: "OS", difficulty: "Lv.4", question: "현재 실행 대기열 버퍼 풀에 안착 중인 Ready 상태 프로세스 중 하나를 엄선하여 실제 연산 코어 프로세서에 할당해주는 스케줄러의 행위는?", answer: "디스패치", explanation: "Dispatch 처리 과정입니다." },
    { id: 680, tag: "C언어", difficulty: "Lv.2", question: "int x = 11 % 3; printf('%d', x); 의 최종 출력값은?", answer: "2", explanation: "정수 나눗셈 처리 후 발생하는 잔여 나머지 값을 연산합니다." },
    { id: 681, tag: "Java", difficulty: "Lv.4", question: "메서드 시그니처 선언부는 온전히 동일하나 내부 구현을 자식 맞춤형으로 덮어써서 구조적 확장 다형성을 지휘하는 객체지향 설계 원리는?", answer: "오버라이딩", explanation: "Overriding 재정의 개념 기출 연계입니다." },
    { id: 682, tag: "Python", difficulty: "Lv.3", question: "a = 'Python'; print(a.upper()); 의 결과 텍스트를 쓰시오.", answer: "PYTHON", explanation: "영문 소문자 전체 영역을 대문자로 일괄 변환 완료합니다." },
    { id: 683, tag: "SQL", difficulty: "Lv.5", question: "데이터베이스 릴레이션 무결성 규칙 중 외래키 값은 반드시 참조하는 상위 테이블 기본키 값과 연동 일치하거나 완전히 NULL 이어야 함을 뜻하는 제약은?", answer: "참조 무결성", explanation: "Referential Integrity 규칙 규칙입니다." },
    { id: 684, tag: "네트워크", difficulty: "Lv.4", question: "IP 논리 주소 신호를 실제 장비 이더넷 하드웨어의 고유 물리적 주소(MAC)로 1:1 디코딩 매칭하는 프로토콜 약어는?", answer: "ARP", explanation: "Address Resolution Protocol 핵심 기출 적중 유형입니다." },
    { id: 685, tag: "Linux", difficulty: "Lv.1", question: "리눅스 내에서 텍스트 파일의 전체 문자열 내용 스트림을 터미널 창에 지체 없이 바로 연속 출력해주는 명령어는?", answer: "cat", explanation: "concatenate 약자 기본기 문제입니다." },
    { id: 686, tag: "C언어", difficulty: "Lv.4", question: "int a = 5; int *p = &a; (*p)++; printf('%d', a); 의 결과값은?", answer: "6", explanation: "포인터 역참조 괄호 증가 처리를 행하여 원본 할당 공간의 값을 1 올립니다." },
    { id: 687, tag: "Java", difficulty: "Lv.2", question: "자바 내에서 문장 구문의 주석 처리를 행하기 위해 문두 영역에 고정 배치하는 라인 주석 기호는?", answer: "//", explanation: "단일 라인 슬래시 두 개 주석 기호 처리입니다." },
    { id: 688, tag: "Python", difficulty: "Lv.1", question: "print('A' + 'B'); 의 단순 결합 텍스트 출력 결과를 쓰시오.", answer: "AB", explanation: "파이썬 문자열 병합 연산의 기본 출력 결과물입니다." },
    { id: 689, tag: "SQL", difficulty: "Lv.4", question: "데이터베이스 테이블 내의 유일 논리 행 데이터 영역을 온전히 정의 지휘 제어하는 DCL 분류군의 풀 네임 약어는?", answer: "DCL", explanation: "Data Control Language의 분류 약어 명칭입니다." },
    { id: 690, tag: "네트워크", difficulty: "Lv.3", question: "OSI 7계층 중 2계층의 규격 데이터 기본 전송 패키지 단위 명칭은?", answer: "프레임", explanation: "Frame 전송 단위 기출 연계 검증 완료입니다." },
    { id: 691, tag: "Linux", difficulty: "Lv.2", question: "지정된 타겟 파일의 소유 권한 모드를 8진수 기반 코드로 강제 재조정할 때 호출하는 명령어는?", answer: "chmod", explanation: "Change Mode 약자 명령어입니다." },
    { id: 692, tag: "C언어", difficulty: "Lv.3", question: "printf('%x', 11); 실행 시 하드웨어 터미널에 송출되는 16진수 소문자 값은?", answer: "b", explanation: "10진수 11을 소문자 포맷 16진수로 투영 출력하면 알파벳 b가 됩니다." },
    { id: 693, tag: "Java", difficulty: "Lv.3", question: "동일 클래스 구역 내에서 메서드 이름은 완벽하게 공유하되 파라미터 인자의 구성 개수 및 타입을 상이하게 가져가는 오버로딩 기법의 영문 명칭은?", answer: "Overloading", explanation: "적재 다중 정의 기법입니다." },
    { id: 694, tag: "Python", difficulty: "Lv.4", question: "print(len('CBT')); 의 연산 길이 결과 값을 정수로 쓰시오.", answer: "3", explanation: "순수 글자 공간의 길이를 계산합니다." },
    { id: 695, tag: "SQL", difficulty: "Lv.2", question: "테이블 내의 조건 대상 타겟 행 전체를 완벽하게 선별 제거해내는 데이터 조작어(DML) 명령어는?", answer: "DELETE", explanation: "행 삭제 DML 구문 명령어입니다." },
    { id: 696, tag: "네트워크", difficulty: "Lv.2", question: "인터넷 포트 통신 체계 내에서 하이퍼텍스트 웹 문서를 규격 송수신하는 기본 프로토콜 약어는?", answer: "HTTP", explanation: "웹 통신 규약 약어 명칭입니다." },
    { id: 697, tag: "OS", difficulty: "Lv.4", question: "컴퓨터 전원 인가 시 하드디스크 내의 운영체제 핵심 커널 소스 데이터를 주기억장치 공간으로 온전히 올려 기동을 지휘하는 프로세스는?", answer: "부트스트랩", explanation: "초기 부팅 유도 로더 과정 명칭입니다." },
    { id: 698, tag: "C언어", difficulty: "Lv.1", question: "C언어 반복문 구역 제어 체계 중 조건식이 '참(1)'을 만족하는 무한 사이클 동안 블록 내부를 연속 지휘하는 문법 키워드는?", answer: "while", explanation: "와일 반복 제어 구문입니다." },
    { id: 699, tag: "Java", difficulty: "Lv.4", question: "자바 가상 머신(JVM) 구조 내에서 발생한 산술 및 참조 오류 예외 스트림을 처리하기 위해 catch 구문과 연동하는 선두 제어 블록은?", answer: "try", explanation: "트라이 예외 감시 구역 블록 명칭입니다." },
    { id: 700, tag: "SQL", difficulty: "Lv.4", question: "데이터베이스 테이블 생성 스키마를 설계 조율할 때, 특정 속성 행 컬럼의 값이 절대 빈 공백으로 남지 않도록 강제 유도하는 무결성 제약 명칭은?", answer: "NOT NULL", explanation: "공백 허용 불가를 지시하는 속성 제약조건 명칭입니다." },
